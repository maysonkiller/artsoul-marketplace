<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unified-styles.css?v=2">
    <link rel="stylesheet" href="button-effects.css?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('artsoul_theme') || 'classic';
            document.documentElement.className = theme;
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.className = theme;
                });
            } else {
                document.body.className = theme;
            }
        })();
    </script>
    <script src="theme-sync.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script src="avatar-dropdown.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <script type="module" src="contracts-integration.js"></script>
    <style>
        /* Future mode text glow effect */
        .future h1,
        .future h3,
        .future .font-bold {
            animation: textGlow 3s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 245, 255, 0.5), 0 0 20px rgba(0, 245, 255, 0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(191, 0, 255, 0.6), 0 0 40px rgba(191, 0, 255, 0.4), 0 0 60px rgba(0, 245, 255, 0.3);
            }
        }

        /* Future mode button glow */
        .future .btn-main,
        .future .btn-secondary {
            position: relative;
            overflow: hidden;
        }

        .future .btn-main::before,
        .future .btn-secondary::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 245, 255, 0.3), transparent);
            animation: buttonScan 3s linear infinite;
        }

        @keyframes buttonScan {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Avatar button glow in future mode */
        .future .avatar-button {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
            animation: avatarPulse 2s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
            }
            50% {
                box-shadow: 0 0 30px rgba(191, 0, 255, 0.6), 0 0 40px rgba(0, 245, 255, 0.4);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function GalleryPage() {
            const [theme, setTheme] = useState('classic');
            const [artworks, setArtworks] = useState([]);
            const [filteredArtworks, setFilteredArtworks] = useState([]);
            const [loading, setLoading] = useState(true);

            // Filters
            const [statusFilter, setStatusFilter] = useState('all');
            const [sortBy, setSortBy] = useState('newest');
            const [minPrice, setMinPrice] = useState('');
            const [maxPrice, setMaxPrice] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            const isClassic = theme === 'classic';

            useEffect(() => {
                const savedTheme = window.ThemeSync?.getTheme() || 'classic';
                setTheme(savedTheme);
                window.setThemeReact = (newTheme) => setTheme(newTheme);
            }, []);

            useEffect(() => {
                loadArtworks();
            }, []);

            useEffect(() => {
                applyFilters();
            }, [artworks, statusFilter, sortBy, minPrice, maxPrice, searchQuery]);

            async function loadArtworks() {
                try {
                    const data = await window.ArtSoulDB.getAllArtworks();
                    setArtworks(data || []);
                    setLoading(false);
                } catch (error) {
                    console.error('Error loading artworks:', error);
                    setLoading(false);
                }
            }

            function applyFilters() {
                let filtered = [...artworks];

                // Status filter
                if (statusFilter !== 'all') {
                    filtered = filtered.filter(art => art.status === statusFilter);
                }

                // Price filter
                if (minPrice) {
                    filtered = filtered.filter(art => art.creator_value >= parseFloat(minPrice));
                }
                if (maxPrice) {
                    filtered = filtered.filter(art => art.creator_value <= parseFloat(maxPrice));
                }

                // Search filter
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    filtered = filtered.filter(art =>
                        art.title?.toLowerCase().includes(query) ||
                        art.description?.toLowerCase().includes(query)
                    );
                }

                // Sort
                switch (sortBy) {
                    case 'newest':
                        filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                        break;
                    case 'oldest':
                        filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                        break;
                    case 'price_high':
                        filtered.sort((a, b) => (b.creator_value || 0) - (a.creator_value || 0));
                        break;
                    case 'price_low':
                        filtered.sort((a, b) => (a.creator_value || 0) - (b.creator_value || 0));
                        break;
                    case 'ai_value':
                        filtered.sort((a, b) => (b.system_value || 0) - (a.system_value || 0));
                        break;
                }

                setFilteredArtworks(filtered);
            }

            function clearFilters() {
                setStatusFilter('all');
                setSortBy('newest');
                setMinPrice('');
                setMaxPrice('');
                setSearchQuery('');
            }

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-2xl opacity-50">Loading gallery...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="sticky top-0 z-50 backdrop-blur-xl" style={{
                        background: isClassic ? 'rgba(1, 1, 1, 0.95)' : 'rgba(0, 0, 0, 0.8)',
                        borderBottom: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                        boxShadow: isClassic ? 'none' : '0 0 20px rgba(0, 245, 255, 0.3)'
                    }}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <a href="index.html" className="text-2xl font-bold" style={{
                                    color: isClassic ? '#a9ddd3' : '#00f5ff'
                                }}>ArtSoul</a>
                                <div className="flex items-center gap-3">
                                    <div id="networkBadge"></div>
                                    <div id="navButtons"></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        <h1 className="text-4xl font-bold mb-8" style={{
                            color: isClassic ? '#a9ddd3' : '#00f5ff'
                        }}>Gallery</h1>

                        {/* Filters */}
                        <div className="rounded-xl p-6 mb-8" style={{
                            background: isClassic ? 'rgba(232, 227, 213, 0.03)' : 'rgba(0, 245, 255, 0.05)',
                            border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                            boxShadow: isClassic ? 'none' : '0 0 20px rgba(0, 245, 255, 0.1)'
                        }}>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                                {/* Search */}
                                <input
                                    type="text"
                                    placeholder="Search artworks..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="px-4 py-2 rounded-lg"
                                    style={{
                                        background: isClassic ? 'rgba(232, 227, 213, 0.05)' : 'rgba(0, 245, 255, 0.05)',
                                        border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                                        color: isClassic ? '#a9ddd3' : '#00f5ff'
                                    }}
                                />

                                {/* Status Filter */}
                                <select
                                    value={statusFilter}
                                    onChange={(e) => setStatusFilter(e.target.value)}
                                    className="px-4 py-2 rounded-lg"
                                    style={{
                                        background: isClassic ? 'rgba(232, 227, 213, 0.05)' : 'rgba(0, 245, 255, 0.05)',
                                        border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                                        color: isClassic ? '#a9ddd3' : '#00f5ff'
                                    }}
                                >
                                    <option value="all">All Status</option>
                                    <option value="draft">Draft</option>
                                    <option value="auction">Live Auction</option>
                                    <option value="sold">Sold</option>
                                </select>

                                {/* Sort */}
                                <select
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                    className="px-4 py-2 rounded-lg"
                                    style={{
                                        background: isClassic ? 'rgba(232, 227, 213, 0.05)' : 'rgba(0, 245, 255, 0.05)',
                                        border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                                        color: isClassic ? '#a9ddd3' : '#00f5ff'
                                    }}
                                >
                                    <option value="newest">Newest First</option>
                                    <option value="oldest">Oldest First</option>
                                    <option value="price_high">Price: High to Low</option>
                                    <option value="price_low">Price: Low to High</option>
                                    <option value="ai_value">AI Value: High to Low</option>
                                </select>

                                {/* Clear Filters */}
                                <button
                                    onClick={clearFilters}
                                    className="btn-secondary"
                                >
                                    Clear Filters
                                </button>
                            </div>

                            {/* Price Range */}
                            <div className="grid grid-cols-2 gap-4">
                                <input
                                    type="number"
                                    step="0.01"
                                    placeholder="Min Price (ETH)"
                                    value={minPrice}
                                    onChange={(e) => setMinPrice(e.target.value)}
                                    className="px-4 py-2 rounded-lg"
                                    style={{
                                        background: isClassic ? 'rgba(232, 227, 213, 0.05)' : 'rgba(0, 245, 255, 0.05)',
                                        border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                                        color: isClassic ? '#a9ddd3' : '#00f5ff'
                                    }}
                                />
                                <input
                                    type="number"
                                    step="0.01"
                                    placeholder="Max Price (ETH)"
                                    value={maxPrice}
                                    onChange={(e) => setMaxPrice(e.target.value)}
                                    className="px-4 py-2 rounded-lg"
                                    style={{
                                        background: isClassic ? 'rgba(232, 227, 213, 0.05)' : 'rgba(0, 245, 255, 0.05)',
                                        border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                                        color: isClassic ? '#a9ddd3' : '#00f5ff'
                                    }}
                                />
                            </div>

                            {/* Results Count */}
                            <div className="mt-4 text-sm opacity-70">
                                Showing {filteredArtworks.length} of {artworks.length} artworks
                            </div>
                        </div>

                        {/* Gallery Grid */}
                        {filteredArtworks.length === 0 ? (
                            <div className="text-center py-20">
                                <div className="text-xl opacity-50">No artworks found</div>
                                <div className="text-sm opacity-30 mt-2">Try adjusting your filters</div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {filteredArtworks.map(artwork => (
                                    <div
                                        key={artwork.id}
                                        onClick={() => window.location.href = `artwork.html?id=${artwork.id}`}
                                        className="rounded-xl overflow-hidden cursor-pointer transition-all hover:scale-105"
                                        style={{
                                            background: isClassic ? 'rgba(232, 227, 213, 0.03)' : 'rgba(0, 245, 255, 0.05)',
                                            border: isClassic ? '1px solid #a9ddd3' : '1px solid rgba(0, 245, 255, 0.3)',
                                            boxShadow: isClassic ? 'none' : '0 0 15px rgba(0, 245, 255, 0.1)'
                                        }}
                                        onMouseEnter={(e) => {
                                            if (!isClassic) {
                                                e.currentTarget.style.borderColor = '#bf00ff';
                                                e.currentTarget.style.boxShadow = '0 0 30px rgba(191, 0, 255, 0.4)';
                                            } else {
                                                e.currentTarget.style.borderColor = '#e8e3d5';
                                            }
                                        }}
                                        onMouseLeave={(e) => {
                                            if (!isClassic) {
                                                e.currentTarget.style.borderColor = 'rgba(0, 245, 255, 0.3)';
                                                e.currentTarget.style.boxShadow = '0 0 15px rgba(0, 245, 255, 0.1)';
                                            } else {
                                                e.currentTarget.style.borderColor = '#a9ddd3';
                                            }
                                        }}
                                    >
                                        {/* Image */}
                                        <div className="aspect-square overflow-hidden">
                                            {artwork.file_url ? (
                                                <img src={artwork.file_url} alt={artwork.title} className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center" style={{
                                                    background: isClassic ? 'rgba(232, 227, 213, 0.05)' : 'linear-gradient(135deg, rgba(191, 0, 255, 0.2), rgba(0, 245, 255, 0.2))'
                                                }}>
                                                    <div className="text-4xl opacity-20">No Image</div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Info */}
                                        <div className="p-4">
                                            <h3 className="font-bold text-lg mb-2 truncate" style={{
                                                color: isClassic ? '#a9ddd3' : '#00f5ff'
                                            }}>{artwork.title}</h3>
                                            <p className="text-sm opacity-70 mb-3 line-clamp-2">{artwork.description}</p>

                                            {/* Status Badge */}
                                            <div className="flex items-center justify-between mb-3">
                                                <span className="px-2 py-1 rounded text-xs font-medium" style={{
                                                    background: artwork.status === 'auction'
                                                        ? (isClassic ? '#4ade80' : '#00f5ff')
                                                        : artwork.status === 'sold'
                                                        ? (isClassic ? '#6b7280' : '#bf00ff')
                                                        : (isClassic ? '#60a5fa' : '#f97316'),
                                                    color: '#000000'
                                                }}>
                                                    {artwork.status === 'auction' ? 'Live' : artwork.status === 'sold' ? 'Sold' : 'Draft'}
                                                </span>
                                            </div>

                                            {/* Values */}
                                            <div className="space-y-1 text-sm">
                                                <div className="flex justify-between">
                                                    <span className="opacity-70">Creator:</span>
                                                    <span className="font-bold">{artwork.creator_value || '0'} ETH</span>
                                                </div>
                                                {artwork.system_value && (
                                                    <div className="flex justify-between">
                                                        <span className="opacity-70">AI Value:</span>
                                                        <span className="font-bold" style={{
                                                            color: isClassic ? '#a9ddd3' : '#00f5ff'
                                                        }}>{artwork.system_value} ETH</span>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Creator */}
                                            <div className="mt-3 pt-3" style={{
                                                borderTop: isClassic ? '1px solid rgba(169, 221, 211, 0.3)' : '1px solid rgba(0, 245, 255, 0.2)'
                                            }}>
                                                <div className="text-xs opacity-50">
                                                    {artwork.creator_id?.slice(0, 6)}...{artwork.creator_id?.slice(-4)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        ReactDOM.render(<GalleryPage />, document.getElementById('app'));
    </script>
</body>
</html>
