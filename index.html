<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>
    <link rel="icon" type="image/jpeg" href="https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #e8e3d5;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- Classic Mode --- */
        body.classic { background: var(--bg-classic); color: var(--text-classic); }
        .classic header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid var(--accent-classic); }
        .classic .btn-main { background: var(--text-classic); color: var(--bg-classic); border: 1px solid var(--text-classic); }
        .classic .btn-main:hover { background: transparent; color: var(--text-classic); }
        .classic .card { background: rgba(232, 227, 213, 0.03); border: 1px solid var(--accent-classic); position: relative; transition: all 0.5s ease-out; overflow: hidden; animation: levitateClassic 6s ease-in-out infinite; }
        .classic .card:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(169, 221, 211, 0.4); border-color: var(--text-classic); }

        /* --- Future Mode --- */
        body.future { background: #000000; color: var(--accent-future); }
        .future header { background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--accent-future); box-shadow: 0 0 20px rgba(0, 245, 255, 0.3); }
        .future .btn-main { background: linear-gradient(135deg, var(--accent-future) 0%, var(--neon-purple) 100%); color: #000000; clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); border: none; font-weight: 600; }
        .future .btn-main:hover { animation: neonPulse 0.3s infinite; transform: scale(1.05); filter: brightness(1.3); }
        .future .card { background: rgba(0, 245, 255, 0.05); border: 1px solid var(--accent-future); backdrop-filter: blur(10px); position: relative; transition: all 0.3s ease-out; overflow: hidden; animation: levitateFuture 8s ease-in-out infinite; }
        .future .card:hover { transform: translateY(-12px); box-shadow: 0 0 30px var(--neon-purple), 0 0 60px var(--accent-future); border-color: var(--neon-purple); animation-play-state: paused; }

        /* Smoke Effects */
        .card:hover::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; pointer-events: none; z-index: 1;
        }
        .classic .card:hover::after {
            background: linear-gradient(to top, rgba(169, 221, 211, 0.2), transparent);
            animation: smoke 2.5s ease-in-out infinite;
        }
        .future .card:hover::after {
            background: linear-gradient(to top, rgba(191, 0, 255, 0.25), rgba(0, 245, 255, 0.15), transparent);
            animation: smoke 2s ease-in-out infinite;
        }

        @keyframes smoke {
            0%, 100% { transform: translateY(0) scaleX(1); opacity: 0.3; }
            50% { transform: translateY(-15px) scaleX(1.1); opacity: 0.6; }
        }

        /* Animations */
        @keyframes levitateClassic { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        @keyframes levitateFuture { 0%, 100% { transform: translateY(0px) rotateZ(0deg); } 50% { transform: translateY(-15px) rotateZ(1deg); } }
        @keyframes neonPulse { 0%, 100% { box-shadow: 0 0 20px var(--accent-future), 0 0 60px var(--neon-purple); } 50% { box-shadow: 0 0 40px var(--accent-future), 0 0 90px var(--neon-purple); } }

        /* Network & Badge */
        .network-badge { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .classic .network-badge { background: rgba(232, 227, 213, 0.1); border: 1px solid var(--accent-classic); }
        .future .network-badge { background: rgba(0, 245, 255, 0.1); border: 1px solid var(--accent-future); box-shadow: 0 0 10px rgba(0, 245, 255, 0.2); }

        .theme-btn { padding: 0.25rem 0.75rem; border-radius: 0.375rem; font-size: 0.75rem; transition: 0.3s; }
        .active-classic { background: var(--text-classic); color: var(--bg-classic); }
        .active-future { background: linear-gradient(to right, var(--accent-future), var(--neon-purple)); color: #000; }
        
        .gallery { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1rem; max-width: 1400px; margin: 0 auto 100px; }
        @media (max-width: 1024px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 640px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body class="classic">
    <header>
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-2xl font-light tracking-widest">ArtSoul</a>
                <div class="flex bg-white/5 p-1 rounded-lg gap-1">
                    <button onclick="setTheme('classic')" id="classicBtn" class="theme-btn active-classic">Classic</button>
                    <button onclick="setTheme('future')" id="futureBtn" class="theme-btn">Future</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="networkBadge"></div>
                <div id="navButtons">
                    <button onclick="window.openConnectModal()" class="btn-main">Get Started</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-light mb-4">Decentralized Art</h1>
            <p class="opacity-60">Community-driven value estimation</p>
        </div>

        <div class="gallery">
            <div class="card rounded-xl overflow-hidden" onclick="viewArt(1)">
                <div class="aspect-square bg-gradient-to-br from-purple-900 to-blue-900"></div>
                <div class="p-4">
                    <h3 class="text-sm font-bold">Abstract Dreams</h3>
                    <p class="text-xs opacity-50 mb-3">@artist_one</p>
                    <button class="w-full py-2 border border-current rounded text-xs hover:bg-white/10 transition">View Artwork</button>
                </div>
            </div>
            </div>
    </main>

    <script>
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);
            document.getElementById('classicBtn').className = `theme-btn ${theme === 'classic' ? 'active-classic' : ''}`;
            document.getElementById('futureBtn').className = `theme-btn ${theme === 'future' ? 'active-future' : ''}`;
        }

        function viewArt(id) { alert("Artwork details coming soon!"); }

        window.onload = () => {
            const saved = localStorage.getItem('theme') || 'classic';
            setTheme(saved);
        }
    </script>

    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.7.11?bundle'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.7.11?bundle'
        import { mainnet, polygon, bsc, base, arbitrum, optimism } from 'https://esm.sh/@reown/appkit/networks@1.7.11?bundle'

        const projectId = '9fdc97f91c02d46a28ca9d185a9e58f2';

        const modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks: [mainnet, polygon, bsc, base, arbitrum, optimism],
            projectId,
            themeMode: 'dark',
            features: { analytics: true, socials: ['google', 'x', 'discord', 'apple'] }
        });

        window.openConnectModal = () => modal.open();

        function updateUI() {
            const account = modal.getAccount();
            const network = modal.getNetworkData();
            const badge = document.getElementById('networkBadge');
            const nav = document.getElementById('navButtons');

            if (account.isConnected) {
                badge.innerHTML = `
                    <div class="network-badge" onclick="window.openConnectModal()">
                        <span class="network-name">${network?.name || 'Network'}</span>
                        <span class="balance-amount">${account.address.slice(0,6)}...</span>
                    </div>`;
                nav.innerHTML = `
                    <a href="profile.html" class="relative">
                        <div class="w-10 h-10 rounded-full border border-current flex items-center justify-center overflow-hidden bg-white/10">
                            <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${account.address}" alt="avatar">
                        </div>
                    </a>`;
            } else {
                badge.innerHTML = '';
                nav.innerHTML = `<button onclick="window.openConnectModal()" class="btn-main">Get Started</button>`;
            }
        }

        modal.subscribeAccount(updateUI);
        modal.subscribeNetwork(updateUI);
    </script>
</body>
</html>
