<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>
    <link rel="icon" type="image/jpeg" href="https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #e8e3d5;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }

        /* --- CLASSIC MODE --- */
        body.classic { background: var(--bg-classic); color: var(--text-classic); }
        .classic header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid var(--accent-classic); }
        .classic .btn-main { background: var(--text-classic); color: var(--bg-classic); border: 1px solid var(--text-classic); }
        .classic .card { background: rgba(232, 227, 213, 0.03); border: 1px solid var(--accent-classic); transition: all 0.5s ease-out; }
        .classic .card:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(169, 221, 211, 0.4); border-color: var(--text-classic); }

        /* --- FUTURE MODE --- */
        body.future { background: #000000; color: var(--accent-future); }
        .future header { background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--accent-future); box-shadow: 0 0 20px rgba(0, 245, 255, 0.3); }
        .future .btn-main { background: linear-gradient(135deg, var(--accent-future) 0%, var(--neon-purple) 100%); color: #000000; clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); border: none; }
        .future .card { background: rgba(0, 245, 255, 0.05); border: 1px solid var(--accent-future); backdrop-filter: blur(10px); transition: all 0.3s ease-out; }
        .future .card:hover { transform: translateY(-12px); border-color: var(--neon-purple); box-shadow: 0 0 30px var(--neon-purple), 0 0 10px var(--accent-future); }

        /* АНИМИРОВАННАЯ СЕТКА (Future) */
        .future::before {
            content: ''; position: fixed; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 245, 255, 0.03) 50%, transparent 100%),
                        linear-gradient(0deg, transparent 0%, rgba(191, 0, 255, 0.03) 50%, transparent 100%);
            background-size: 100px 100px; animation: gridMove 20s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }

        /* ГАЛЛЕРЕЯ (Твои 6 колонок) */
        .gallery { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1rem; max-width: 1400px; margin: 0 auto 150px; }
        @media (max-width: 1200px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .gallery { grid-template-columns: repeat(2, 1fr); } }

        /* Твои спецэффекты (Дым и Анаграмма) */
        .card:hover::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; pointer-events: none; }
        .classic .card:hover::after { background: linear-gradient(to top, rgba(169, 221, 211, 0.2), transparent); animation: smoke 2.5s infinite; }
        .future .card:hover::after { background: linear-gradient(to top, rgba(191, 0, 255, 0.25), transparent); animation: smoke 2s infinite; }
        @keyframes smoke { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-10px); opacity: 0.6; } }

        .card-letter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; font-weight: 700; opacity: 0; transition: 0.5s; pointer-events: none; }
        .card-morph .card-letter { opacity: 1; }
        .card-morph { position: fixed !important; z-index: 1000 !important; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }

        /* Кнопка сети и профиль */
        .network-badge { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid currentColor; cursor: pointer; font-size: 0.875rem; }
    </style>
</head>
<body class="classic">
    <header class="sticky top-0 z-50 backdrop-blur-xl">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-2xl font-light logo-interactive" onmouseenter="morphToAnagram()" onmouseleave="resetMorph()">ArtSoul</a>
                <div class="flex bg-white/10 p-1 rounded-lg">
                    <button onclick="setTheme('classic')" id="classicBtn" class="px-3 py-1 text-xs rounded active-classic">Classic</button>
                    <button onclick="setTheme('future')" id="futureBtn" class="px-3 py-1 text-xs rounded">Future</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="networkBadge"></div>
                <div id="navButtons">
                    <button id="connectBtn" class="btn-main px-6 py-2 rounded-md transition-all">Get Started</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 relative z-10">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-light mb-4">Decentralized Art Marketplace</h1>
            <p class="text-xl opacity-70">Where community determines value</p>
        </div>

        <div class="gallery" id="galleryGrid">
            <div class="card rounded-xl overflow-hidden relative" data-letter="A">
                <div class="aspect-square bg-gradient-to-br from-purple-900 to-blue-900"></div>
                <div class="card-letter">A</div>
                <div class="p-3">
                    <h3 class="text-sm font-medium">Abstract Dreams</h3>
                    <p class="text-xs opacity-60 mb-2">@artist_one</p>
                    <button class="w-full py-1.5 rounded text-xs border border-current">View</button>
                </div>
            </div>
            </div>

        <div class="max-w-4xl mx-auto mt-24 p-8 rounded-xl border border-current bg-white/5">
            <h2 class="text-3xl font-light mb-8 text-center">About ArtSoul</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="text-center">
                    <div class="mb-4">🌐</div>
                    <h3 class="font-bold">Multi-Chain</h3>
                    <p class="text-sm opacity-70">8 networks integrated</p>
                </div>
                <div class="text-center">
                    <div class="mb-4">🎨</div>
                    <h3 class="font-bold">Open Gallery</h3>
                    <p class="text-sm opacity-70">No auth required to browse</p>
                </div>
                <div class="text-center">
                    <div class="mb-4">🔐</div>
                    <h3 class="font-bold">Social Auth</h3>
                    <p class="text-sm opacity-70">Web3 + Web2 login</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);
            document.getElementById('classicBtn').className = theme === 'classic' ? 'px-3 py-1 text-xs rounded active-classic' : 'px-3 py-1 text-xs rounded';
            document.getElementById('futureBtn').className = theme === 'future' ? 'px-3 py-1 text-xs rounded active-future' : 'px-3 py-1 text-xs rounded';
        }
        
        // Логика анаграммы (возвращена)
        let morphActive = false;
        let originalPositions = [];
        function morphToAnagram() {
            if (morphActive) return; morphActive = true;
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                originalPositions.push({top: rect.top, left: rect.left, width: rect.width, height: rect.height});
                card.classList.add('card-morph');
            });
        }
        function resetMorph() {
            morphActive = false;
            document.querySelectorAll('.card').forEach(card => card.classList.remove('card-morph'));
            originalPositions = [];
        }
    </script>

    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.7.11?bundle'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.7.11?bundle'
        import { mainnet, polygon, bsc, base, arbitrum, optimism } from 'https://esm.sh/@reown/appkit/networks@1.7.11?bundle'

        const projectId = '9fdc97f91c02d46a28ca9d185a9e58f2';

        const modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks: [mainnet, polygon, bsc, base, arbitrum, optimism],
            projectId,
            features: { socials: ['google', 'x', 'discord', 'apple'] }
        });

        const connectBtn = document.getElementById('connectBtn');
        const networkBadge = document.getElementById('networkBadge');
        const navButtons = document.getElementById('navButtons');

        // ГЛАВНОЕ ИСПРАВЛЕНИЕ: Прямое открытие модалки
        connectBtn.addEventListener('click', () => modal.open());

        function updateUI() {
            const account = modal.getAccount();
            const network = modal.getNetworkData();

            if (account.isConnected) {
                networkBadge.innerHTML = `
                    <div class="network-badge" onclick="modal.open({ view: 'Networks' })">
                        <span>${network?.name || 'Chain'}</span>
                        <span class="opacity-50">|</span>
                        <span>${account.address.slice(0, 6)}...</span>
                    </div>`;
                navButtons.innerHTML = `
                    <a href="profile.html" class="w-10 h-10 rounded-full border border-current flex items-center justify-center overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${account.address}" alt="avatar">
                    </a>`;
            } else {
                networkBadge.innerHTML = '';
                navButtons.innerHTML = `<button id="connectBtn" class="btn-main px-6 py-2 rounded-md">Get Started</button>`;
                // Перенавешиваем событие, если кнопка перерисовалась
                document.getElementById('connectBtn').onclick = () => modal.open();
            }
        }

        modal.subscribeAccount(updateUI);
        modal.subscribeNetwork(updateUI);
        updateUI();
    </script>
</body>
</html>
