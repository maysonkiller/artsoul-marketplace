<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="og:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="og:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="og:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="twitter:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="twitter:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="twitter:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Web3Modal AppKit -->
    <script type="module" src="./app.js"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes lightning {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes hologramAppear {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .animate-fadeIn { animation: fadeIn 0.8s ease-out; }
        .animate-lightning { animation: lightning 0.3s ease-out; }

        .icon-abstract {
            stroke-width: 0.75px;
            transition: all 0.3s ease;
        }

        .hologram-tooltip {
            animation: hologramAppear 0.4s ease-out;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5), inset 0 0 20px rgba(6, 182, 212, 0.1);
        }

        .classic-tooltip {
            animation: fadeIn 0.3s ease-out;
        }

        .btn-lightning:active::after {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.4) 0%, transparent 70%);
            animation: lightning 0.3s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- Main App -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Network configurations
        const NETWORKS = {
            1: { name: 'Ethereum', symbol: '⟠', color: '#627EEA' },
            137: { name: 'Polygon', symbol: '⬡', color: '#8247E5' },
            56: { name: 'BSC', symbol: '◆', color: '#F3BA2F' },
            8453: { name: 'Base', symbol: '◬', color: '#0052FF' },
            42161: { name: 'Arbitrum', symbol: '◉', color: '#28A0F0' },
            10: { name: 'Optimism', symbol: '◎', color: '#FF0420' },
            11155111: { name: 'Sepolia', symbol: '⟠', color: '#627EEA' },
            2025: { name: 'Rialo Playground', symbol: '◈', color: '#00D4FF' }
        };

        const REQUIRED_CHAIN_ID = 137;

        // Abstract SVG Icons
        const AbstractIcon = ({ type, className = "" }) => {
            const icons = {
                gallery: (
                    <svg viewBox="0 0 24 24" fill="none" className={`w-6 h-6 ${className}`}>
                        <path d="M3 3L21 3M3 21L21 21M3 3L3 21M21 3L21 21M8 8L16 16M16 8L8 16"
                              stroke="currentColor" className="icon-abstract" />
                    </svg>
                ),
                upload: (
                    <svg viewBox="0 0 24 24" fill="none" className={`w-6 h-6 ${className}`}>
                        <path d="M12 3L12 21M12 3L6 9M12 3L18 9M3 15L3 21L21 21L21 15"
                              stroke="currentColor" className="icon-abstract" />
                    </svg>
                ),
                profile: (
                    <svg viewBox="0 0 24 24" fill="none" className={`w-6 h-6 ${className}`}>
                        <circle cx="12" cy="12" r="9" stroke="currentColor" className="icon-abstract" />
                        <path d="M12 6L12 12L16 16" stroke="currentColor" className="icon-abstract" />
                    </svg>
                ),
                docs: (
                    <svg viewBox="0 0 24 24" fill="none" className={`w-6 h-6 ${className}`}>
                        <path d="M4 4L20 4L20 20L4 20L4 4M8 8L16 8M8 12L16 12M8 16L12 16"
                              stroke="currentColor" className="icon-abstract" />
                    </svg>
                ),
                network: (
                    <svg viewBox="0 0 24 24" fill="none" className={`w-6 h-6 ${className}`}>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" className="icon-abstract" />
                        <path d="M12 3L12 9M12 15L12 21M3 12L9 12M15 12L21 12M6 6L9 9M15 15L18 18M18 6L15 9M9 15L6 18"
                              stroke="currentColor" className="icon-abstract" />
                    </svg>
                )
            };
            return icons[type] || null;
        };

        // Tooltip Component
        const Tooltip = ({ text, children, isClassic }) => {
            const [show, setShow] = useState(false);

            return (
                <div className="relative inline-block"
                     onMouseEnter={() => setShow(true)}
                     onMouseLeave={() => setShow(false)}>
                    {children}
                    {show && (
                        <div className={`absolute top-full mt-2 left-1/2 transform -translate-x-1/2 whitespace-nowrap z-50 ${
                            isClassic
                                ? 'classic-tooltip text-xs text-gray-700 bg-white px-3 py-1 rounded shadow-lg border border-gray-200'
                                : 'hologram-tooltip text-xs text-cyan-300 bg-gray-900/80 px-4 py-2 rounded-lg border border-cyan-500/50'
                        }`}>
                            {text}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'classic');
            const [connected, setConnected] = useState(false);
            const [address, setAddress] = useState('');
            const [chainId, setChainId] = useState(null);
            const [showNetworkModal, setShowNetworkModal] = useState(false);

            const isClassic = theme === 'classic';

            useEffect(() => {
                const handleWalletChange = (event) => {
                    const state = event.detail;
                    setConnected(state.isConnected || false);
                    setAddress(state.address || '');
                    setChainId(state.chainId || null);

                    if (state.isConnected && state.chainId && state.chainId !== REQUIRED_CHAIN_ID) {
                        setShowNetworkModal(true);
                    } else {
                        setShowNetworkModal(false);
                    }
                };

                window.addEventListener('walletStateChange', handleWalletChange);
                return () => window.removeEventListener('walletStateChange', handleWalletChange);
            }, []);

            const handleConnect = async () => {
                if (window.web3Modal) {
                    try {
                        await window.web3Modal.open();
                    } catch (error) {
                        console.error('Failed to open modal:', error);
                    }
                }
            };

            const handleDisconnect = async () => {
                if (window.web3Modal) {
                    await window.web3Modal.disconnect();
                }
            };

            const switchNetwork = async (targetChainId) => {
                if (window.web3Modal) {
                    try {
                        await window.web3Modal.switchNetwork(targetChainId);
                        setShowNetworkModal(false);
                    } catch (error) {
                        console.error('Failed to switch network:', error);
                    }
                }
            };

            const openNetworkSelector = async () => {
                if (window.web3Modal) {
                    await window.web3Modal.open({ view: 'Networks' });
                }
            };

            const bgClass = isClassic
                ? 'bg-gray-50 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-teal-900 to-gray-900 text-teal-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${
                        isClassic
                            ? 'bg-white/90 border-b'
                            : 'bg-black/50 border-b border-cyan-500/20'
                    }`} style={isClassic ? { borderColor: '#a9ddd3' } : {}}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className={`text-2xl font-light tracking-wide ${
                                        isClassic ? 'text-gray-900' : 'text-cyan-400'
                                    }`}>
                                        ArtSoul
                                    </a>

                                    <div className={`flex gap-1 p-1 rounded-lg ${
                                        isClassic ? 'bg-gray-100' : 'bg-gray-800/50'
                                    }`}>
                                        <button
                                            onClick={() => {
                                                setTheme('classic');
                                                localStorage.setItem('theme', 'classic');
                                            }}
                                            className={`px-3 py-1 rounded text-xs font-medium transition-all ${
                                                theme === 'classic'
                                                    ? 'bg-white text-gray-900 shadow'
                                                    : 'text-gray-500 hover:text-gray-900'
                                            }`}
                                        >
                                            Classic
                                        </button>
                                        <button
                                            onClick={() => {
                                                setTheme('future');
                                                localStorage.setItem('theme', 'future');
                                            }}
                                            className={`px-3 py-1 rounded text-xs font-medium transition-all ${
                                                theme === 'future'
                                                    ? 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white shadow-lg'
                                                    : 'text-gray-500 hover:text-gray-300'
                                            }`}
                                        >
                                            Future
                                        </button>
                                    </div>
                                </div>

                                <div className="flex items-center gap-3">
                                    {!connected ? (
                                        <button
                                            onClick={handleConnect}
                                            className={`relative px-6 py-2 rounded-lg font-medium transition-all ${
                                                isClassic
                                                    ? 'bg-black text-white hover:bg-gray-800'
                                                    : 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:shadow-xl btn-lightning'
                                            }`}
                                        >
                                            {isClassic ? 'Get Started' : 'Initialize Link'}
                                        </button>
                                    ) : (
                                        <>
                                            <Tooltip text="Gallery" isClassic={isClassic}>
                                                <a href="gallery.html" className={`p-2 rounded-lg transition-all ${
                                                    isClassic ? 'hover:bg-gray-100' : 'hover:bg-gray-800'
                                                }`}>
                                                    <AbstractIcon type="gallery" />
                                                </a>
                                            </Tooltip>

                                            <Tooltip text="Upload" isClassic={isClassic}>
                                                <a href="upload.html" className={`p-2 rounded-lg transition-all ${
                                                    isClassic ? 'hover:bg-gray-100' : 'hover:bg-gray-800'
                                                }`}>
                                                    <AbstractIcon type="upload" />
                                                </a>
                                            </Tooltip>

                                            <Tooltip text="Profile" isClassic={isClassic}>
                                                <a href="profile.html" className={`p-2 rounded-lg transition-all ${
                                                    isClassic ? 'hover:bg-gray-100' : 'hover:bg-gray-800'
                                                }`}>
                                                    <AbstractIcon type="profile" />
                                                </a>
                                            </Tooltip>

                                            {chainId && (
                                                <Tooltip text={NETWORKS[chainId]?.name || 'Unknown'} isClassic={isClassic}>
                                                    <button
                                                        onClick={openNetworkSelector}
                                                        className={`p-2 rounded-lg transition-all ${
                                                            isClassic ? 'hover:bg-gray-100' : 'hover:bg-gray-800'
                                                        }`}
                                                    >
                                                        <AbstractIcon type="network" />
                                                    </button>
                                                </Tooltip>
                                            )}

                                            <button
                                                onClick={handleDisconnect}
                                                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                                    isClassic
                                                        ? 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                        : 'bg-gray-800 text-cyan-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {address.slice(0, 6)}...{address.slice(-4)}
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Network Warning Modal */}
                    {showNetworkModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm p-4">
                            <div className={`max-w-md w-full rounded-xl p-8 ${
                                isClassic ? 'bg-white' : 'bg-gray-900 border border-red-500/50'
                            }`}>
                                <div className="text-center mb-6">
                                    <div className="text-6xl mb-4">⚠</div>
                                    <h2 className={`text-2xl font-bold mb-2 ${
                                        isClassic ? 'text-gray-900' : 'text-red-400'
                                    }`}>
                                        Wrong Network
                                    </h2>
                                    <p className={`text-sm ${
                                        isClassic ? 'text-gray-600' : 'text-gray-400'
                                    }`}>
                                        Please switch to {NETWORKS[REQUIRED_CHAIN_ID].name}
                                    </p>
                                </div>

                                <div className={`p-4 rounded-lg mb-6 ${
                                    isClassic ? 'bg-gray-50' : 'bg-gray-800/50'
                                }`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <span className={`text-sm ${
                                            isClassic ? 'text-gray-600' : 'text-gray-400'
                                        }`}>Current:</span>
                                        <span className={`font-bold ${
                                            isClassic ? 'text-red-600' : 'text-red-400'
                                        }`}>
                                            {NETWORKS[chainId]?.name}
                                        </span>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className={`text-sm ${
                                            isClassic ? 'text-gray-600' : 'text-gray-400'
                                        }`}>Required:</span>
                                        <span className={`font-bold ${
                                            isClassic ? 'text-green-600' : 'text-green-400'
                                        }`}>
                                            {NETWORKS[REQUIRED_CHAIN_ID].name}
                                        </span>
                                    </div>
                                </div>

                                <button
                                    onClick={() => switchNetwork(REQUIRED_CHAIN_ID)}
                                    className={`w-full py-4 rounded-lg font-bold mb-3 ${
                                        isClassic
                                            ? 'bg-black text-white hover:bg-gray-800'
                                            : 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white'
                                    }`}
                                >
                                    Switch to {NETWORKS[REQUIRED_CHAIN_ID].name}
                                </button>

                                <button
                                    onClick={openNetworkSelector}
                                    className={`w-full py-3 rounded-lg font-medium mb-3 ${
                                        isClassic
                                            ? 'bg-gray-100 text-gray-700'
                                            : 'bg-gray-800 text-cyan-400'
                                    }`}
                                >
                                    Choose Different Network
                                </button>

                                <button
                                    onClick={() => setShowNetworkModal(false)}
                                    className={`w-full py-2 rounded-lg text-sm ${
                                        isClassic
                                            ? 'text-gray-600 hover:bg-gray-50'
                                            : 'text-gray-400 hover:bg-gray-800'
                                    }`}
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-24">
                        <div className="max-w-4xl mx-auto text-center">
                            <h1 className={`text-6xl font-light mb-6 animate-fadeIn ${
                                isClassic ? 'text-gray-900' : 'text-cyan-400'
                            }`}>
                                Decentralized Art Marketplace
                            </h1>
                            <p className={`text-xl font-light mb-12 animate-fadeIn ${
                                isClassic ? 'text-gray-600' : 'text-teal-300'
                            }`}>
                                Where community determines value
                            </p>

                            {/* Features Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
                                <div className={`p-8 rounded-xl transition-all ${
                                    isClassic
                                        ? 'bg-white border hover:shadow-lg'
                                        : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/20 hover:border-cyan-500/50'
                                }`} style={isClassic ? { borderColor: '#a9ddd3' } : {}}>
                                    <AbstractIcon type="network" className={isClassic ? 'text-gray-900 mx-auto mb-4' : 'text-cyan-400 mx-auto mb-4'} />
                                    <h3 className={`text-lg font-medium mb-2 ${
                                        isClassic ? 'text-gray-900' : 'text-cyan-400'
                                    }`}>
                                        Multi-Chain
                                    </h3>
                                    <p className={`text-sm font-light ${
                                        isClassic ? 'text-gray-600' : 'text-gray-400'
                                    }`}>
                                        8 networks including Rialo Playground
                                    </p>
                                </div>

                                <div className={`p-8 rounded-xl transition-all ${
                                    isClassic
                                        ? 'bg-white border hover:shadow-lg'
                                        : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/20 hover:border-cyan-500/50'
                                }`} style={isClassic ? { borderColor: '#a9ddd3' } : {}}>
                                    <AbstractIcon type="gallery" className={isClassic ? 'text-gray-900 mx-auto mb-4' : 'text-cyan-400 mx-auto mb-4'} />
                                    <h3 className={`text-lg font-medium mb-2 ${
                                        isClassic ? 'text-gray-900' : 'text-cyan-400'
                                    }`}>
                                        Open Gallery
                                    </h3>
                                    <p className={`text-sm font-light ${
                                        isClassic ? 'text-gray-600' : 'text-gray-400'
                                    }`}>
                                        Browse art without authentication
                                    </p>
                                </div>

                                <div className={`p-8 rounded-xl transition-all ${
                                    isClassic
                                        ? 'bg-white border hover:shadow-lg'
                                        : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/20 hover:border-cyan-500/50'
                                }`} style={isClassic ? { borderColor: '#a9ddd3' } : {}}>
                                    <AbstractIcon type="docs" className={isClassic ? 'text-gray-900 mx-auto mb-4' : 'text-cyan-400 mx-auto mb-4'} />
                                    <h3 className={`text-lg font-medium mb-2 ${
                                        isClassic ? 'text-gray-900' : 'text-cyan-400'
                                    }`}>
                                        Social Auth
                                    </h3>
                                    <p className={`text-sm font-light ${
                                        isClassic ? 'text-gray-600' : 'text-gray-400'
                                    }`}>
                                        Google, X, Apple, Discord, Wallets
                                    </p>
                                </div>
                            </div>

                            {/* Roadmap */}
                            <div className={`mt-24 p-8 rounded-xl ${
                                isClassic
                                    ? 'bg-white border'
                                    : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/20'
                            }`} style={isClassic ? { borderColor: '#a9ddd3' } : {}}>
                                <h2 className={`text-3xl font-light mb-8 ${
                                    isClassic ? 'text-gray-900' : 'text-cyan-400'
                                }`}>
                                    Roadmap
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                                    <div>
                                        <h3 className={`font-medium mb-2 ${
                                            isClassic ? 'text-gray-900' : 'text-teal-400'
                                        }`}>Q2 2026</h3>
                                        <ul className={`text-sm space-y-1 font-light ${
                                            isClassic ? 'text-gray-600' : 'text-gray-400'
                                        }`}>
                                            <li>MVP platform</li>
                                            <li>Basic UI/UX</li>
                                            <li>Upload system</li>
                                            <li>Profiles</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h3 className={`font-medium mb-2 ${
                                            isClassic ? 'text-gray-900' : 'text-teal-400'
                                        }`}>Q3 2026</h3>
                                        <ul className={`text-sm space-y-1 font-light ${
                                            isClassic ? 'text-gray-600' : 'text-gray-400'
                                        }`}>
                                            <li>Web3 integration</li>
                                            <li>Smart contracts</li>
                                            <li>Multi-chain</li>
                                            <li>IPFS</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h3 className={`font-medium mb-2 ${
                                            isClassic ? 'text-gray-900' : 'text-teal-400'
                                        }`}>Q4 2026</h3>
                                        <ul className={`text-sm space-y-1 font-light ${
                                            isClassic ? 'text-gray-600' : 'text-gray-400'
                                        }`}>
                                            <li>Social features</li>
                                            <li>Music player</li>
                                            <li>Mobile version</li>
                                            <li>Developer API</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h3 className={`font-medium mb-2 ${
                                            isClassic ? 'text-gray-900' : 'text-teal-400'
                                        }`}>2027</h3>
                                        <ul className={`text-sm space-y-1 font-light ${
                                            isClassic ? 'text-gray-600' : 'text-gray-400'
                                        }`}>
                                            <li>DAO launch</li>
                                            <li>Governance</li>
                                            <li>Gallery partnerships</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="pb-8 text-center">
                        <Tooltip text="Documentation" isClassic={isClassic}>
                            <a href="docs.html" className="inline-block p-2">
                                <AbstractIcon type="docs" className={isClassic ? 'text-gray-600' : 'text-cyan-400'} />
                            </a>
                        </Tooltip>
                        <p className={`text-xs mt-4 font-light ${
                            isClassic ? 'text-gray-500' : 'text-teal-300'
                        }`}>
                            Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className="hover:underline">@maysonkiller23</a>
                        </p>
                    </footer>

                    {/* Background Effects - Future Mode Only */}
                    {!isClassic && (
                        <div className="fixed inset-0 pointer-events-none overflow-hidden -z-10">
                            <div className="absolute inset-0 bg-gradient-to-br from-teal-900/20 via-transparent to-cyan-900/20" />
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl" />
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500/5 rounded-full blur-3xl" />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
