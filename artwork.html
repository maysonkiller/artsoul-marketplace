<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <!-- Open Graph / Twitter Card meta tags -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ArtSoul Marketplace">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@ArtSoul">
    <meta id="og-title" property="og:title" content="Artwork - ArtSoul">
    <meta id="og-description" property="og:description" content="View this artwork on ArtSoul Marketplace">
    <meta id="og-image" property="og:image" content="">
    <meta id="og-url" property="og:url" content="">
    <meta id="twitter-title" name="twitter:title" content="Artwork - ArtSoul">
    <meta id="twitter-description" name="twitter:description" content="View this artwork on ArtSoul Marketplace">
    <meta id="twitter-image" name="twitter:image" content="">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unified-styles.css?v=2">
    <link rel="stylesheet" href="button-effects.css?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('artsoul_theme') || 'classic';
            document.documentElement.className = theme;
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.className = theme;
                });
            } else {
                document.body.className = theme;
            }
        })();
    </script>
    <script src="theme-sync.js"></script>
    <script src="modal-system.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script src="avatar-dropdown.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <script type="module" src="contracts-integration.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #a9ddd3;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        /* Gradient flow animation for Future mode */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .future h1,
        .future h2,
        .future h3 {
            background: linear-gradient(90deg, var(--accent-future), var(--neon-purple), var(--accent-future));
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s linear infinite;
        }

        /* Logo styles */
        .classic img[alt="ArtSoul"] {
            filter: drop-shadow(0 0 8px rgba(169, 221, 211, 0.4));
        }

        .future img[alt="ArtSoul"] {
            filter: drop-shadow(0 0 15px rgba(0, 245, 255, 0.6)) drop-shadow(0 0 30px rgba(191, 0, 255, 0.4));
        }

        /* Input styles */
        input, textarea {
            background: transparent;
            border: 1px solid currentColor;
            color: inherit;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-future);
        }

        .classic input:focus, .classic textarea:focus {
            border-color: var(--accent-classic);
        }

        /* Glow pulse animation for Future mode */
        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 245, 255, 0.6), 0 0 40px rgba(191, 0, 255, 0.4);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Media Viewer Component - supports images, videos, audio, GIFs
        function MediaViewer({ url, fileType, title }) {
            const getMediaType = () => {
                if (!fileType) return 'image';

                const type = fileType.toLowerCase();

                // Video formats
                if (type === 'video' || ['mp4', 'webm', 'ogg', 'mov', 'avi', 'mkv'].includes(type)) {
                    return 'video';
                }

                // Audio formats
                if (type === 'audio' || ['mp3', 'wav', 'ogg', 'aac', 'm4a', 'flac'].includes(type)) {
                    return 'audio';
                }

                // Image formats (including GIF)
                return 'image';
            };

            const mediaType = getMediaType();
            const sanitizedTitle = window.ArtSoulSecurity?.sanitizeText(title) || 'Artwork';

            if (mediaType === 'video') {
                return (
                    <video
                        src={url}
                        controls
                        loop
                        playsInline
                        className="w-full h-full object-contain bg-black"
                        style={{ maxHeight: '100%' }}
                    >
                        Your browser does not support video playback.
                    </video>
                );
            }

            if (mediaType === 'audio') {
                return (
                    <div className="w-full h-full flex flex-col items-center justify-center bg-black p-8">
                        <div className="mb-8 text-center">
                            <div className="text-6xl mb-4">🎵</div>
                            <div className="text-xl opacity-70">{sanitizedTitle}</div>
                        </div>
                        <audio
                            src={url}
                            controls
                            className="w-full max-w-md"
                            style={{
                                filter: 'invert(1) hue-rotate(180deg)',
                                borderRadius: '0.5rem'
                            }}
                        >
                            Your browser does not support audio playback.
                        </audio>
                    </div>
                );
            }

            // Default: image (including GIF)
            return (
                <img
                    src={url}
                    alt={sanitizedTitle}
                    className="w-full h-full object-contain bg-black"
                />
            );
        }

        function ArtworkPage() {
            const [theme, setTheme] = useState('classic');
            const [artwork, setArtwork] = useState(null);
            const [auction, setAuction] = useState(null);
            const [creatorProfile, setCreatorProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [bidAmount, setBidAmount] = useState('');
            const [timeLeft, setTimeLeft] = useState('');
            const [userVote, setUserVote] = useState(null);
            const [voteValue, setVoteValue] = useState('');

            const isClassic = theme === 'classic';
            const artworkId = new URLSearchParams(window.location.search).get('id');

            useEffect(() => {
                const savedTheme = window.ThemeSync?.getTheme() || 'classic';
                setTheme(savedTheme);
                window.setThemeReact = (newTheme) => setTheme(newTheme);
            }, []);

            useEffect(() => {
                // Initialize avatar dropdown and network badge
                const initUI = async () => {
                    // Wait for scripts to load (check every 100ms, max 5 seconds)
                    let attempts = 0;
                    const maxAttempts = 50;

                    while (attempts < maxAttempts) {
                        if (window.AvatarDropdown && window.NetworkBadge && window.web3Modal) {
                            break;
                        }
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }

                    if (attempts >= maxAttempts) {
                        console.warn('Scripts not loaded after 5 seconds');
                        return;
                    }

                    // Initialize network badge
                    if (window.NetworkBadge) {
                        window.NetworkBadge.init();
                    }

                    // Initialize avatar dropdown (will show connect button if not connected)
                    if (window.AvatarDropdown) {
                        const state = window.web3Modal.getState();
                        if (state?.address) {
                            await window.AvatarDropdown.init(state.address);
                        } else {
                            // Show connect button
                            await window.AvatarDropdown.init(null);
                        }
                    }
                };

                initUI();

                // Listen for wallet connection changes
                const unsubscribe = window.web3Modal?.subscribeState((state) => {
                    if (window.AvatarDropdown) {
                        window.AvatarDropdown.init(state?.address || null);
                    }
                });

                return () => {
                    if (unsubscribe) unsubscribe();
                };
            }, []);

            useEffect(() => {
                if (artworkId && !artwork) {
                    loadArtwork();
                }
            }, [artworkId]);

            useEffect(() => {
                if (auction && !auction.ended) {
                    const interval = setInterval(updateTimeLeft, 1000);
                    return () => clearInterval(interval);
                }
            }, [auction]);

            async function loadArtwork() {
                try {
                    console.log('[Artwork] Loading artwork:', artworkId);
                    // Load from Supabase
                    const data = await window.ArtSoulDB.getArtwork(artworkId);
                    console.log('[Artwork] Loaded data:', data);
                    setArtwork(data);

                    // Update meta tags for social sharing
                    const pageUrl = window.location.href;
                    document.getElementById('og-title').setAttribute('content', data.title + ' - ArtSoul');
                    document.getElementById('og-description').setAttribute('content', data.description || 'View this artwork on ArtSoul Marketplace');
                    document.getElementById('og-image').setAttribute('content', data.file_url);
                    document.getElementById('og-url').setAttribute('content', pageUrl);
                    document.getElementById('twitter-title').setAttribute('content', data.title + ' - ArtSoul');
                    document.getElementById('twitter-description').setAttribute('content', data.description || 'View this artwork on ArtSoul Marketplace');
                    document.getElementById('twitter-image').setAttribute('content', data.file_url);
                    document.title = data.title + ' - ArtSoul';

                    // Load creator profile
                    if (data.creator_id) {
                        try {
                            const profile = await window.ArtSoulDB.getProfile(data.creator_id);
                            setCreatorProfile(profile);
                        } catch (error) {
                            console.warn('Could not load creator profile:', error);
                        }
                    }

                    // Check if user already voted
                    const walletAddress = window.getCurrentWalletAddress?.();
                    if (walletAddress) {
                        try {
                            const existingVote = await window.ArtSoulDB.getUserVote(artworkId, walletAddress);
                            if (existingVote) {
                                setUserVote(existingVote);
                            }
                        } catch (error) {
                            console.warn('Could not load user vote:', error);
                        }
                    }

                    // Load blockchain data if available
                    if (data.blockchain_id && window.ArtSoulContracts) {
                        try {
                            const provider = await window.web3Modal?.getWalletProvider();
                            if (provider) {
                                await window.ArtSoulContracts.init(provider);
                                const blockchainArtwork = await window.ArtSoulContracts.getArtwork(data.blockchain_id);

                                // Load auction if status is AUCTION
                                if (blockchainArtwork.status === 1) {
                                    const auctionData = await window.ArtSoulContracts.getAuction(data.blockchain_id);
                                    setAuction(auctionData);
                                }
                            }
                        } catch (error) {
                            console.error('Error loading blockchain data:', error);
                        }
                    }

                    setLoading(false);
                } catch (error) {
                    console.error('Error loading artwork:', error);
                    alert('Failed to load artwork');
                    setLoading(false);
                }
            }

            function updateTimeLeft() {
                if (!auction || auction.ended) return;

                const now = Math.floor(Date.now() / 1000);
                const remaining = auction.endTime - now;

                if (remaining <= 0) {
                    setTimeLeft('Auction ended');
                    return;
                }

                const days = Math.floor(remaining / 86400);
                const hours = Math.floor((remaining % 86400) / 3600);
                const minutes = Math.floor((remaining % 3600) / 60);
                const seconds = remaining % 60;

                setTimeLeft(`${days}d ${hours}h ${minutes}m ${seconds}s`);
            }

            async function handlePlaceBid() {
                if (!bidAmount || parseFloat(bidAmount) <= 0) {
                    alert('Please enter a valid bid amount');
                    return;
                }

                const minBid = auction.highestBid === '0.0'
                    ? parseFloat(auction.startingPrice)
                    : parseFloat(auction.highestBid) * 1.05;

                if (parseFloat(bidAmount) < minBid) {
                    alert(`Minimum bid is ${minBid.toFixed(4)} ETH`);
                    return;
                }

                try {
                    const provider = await window.web3Modal?.getWalletProvider();
                    if (!provider) {
                        alert('Please connect your wallet');
                        return;
                    }

                    await window.ArtSoulContracts.init(provider);
                    await window.ArtSoulContracts.placeBid(artwork.blockchain_id, bidAmount);

                    alert('Bid placed successfully!');
                    loadArtwork(); // Reload to show new bid
                } catch (error) {
                    console.error('Bid failed:', error);

                    let errorMessage = 'Failed to place bid: ';

                    if (error.code === 'INSUFFICIENT_FUNDS' || error.message?.includes('insufficient funds')) {
                        errorMessage = 'Insufficient funds!\n\nYou need more ETH to place this bid.\nPlease add funds to your wallet or try a lower bid amount.';
                    } else if (error.message?.includes('user rejected') || error.message?.includes('User rejected')) {
                        errorMessage = 'Transaction was rejected';
                    } else {
                        errorMessage += error.message || 'Unknown error';
                    }

                    alert(errorMessage);
                }
            }

            async function handleEndAuction() {
                if (!confirm('End this auction?')) return;

                try {
                    const provider = await window.web3Modal?.getWalletProvider();
                    if (!provider) {
                        alert('Please connect your wallet');
                        return;
                    }

                    await window.ArtSoulContracts.init(provider);

                    // Get auction details to find the winner
                    const auctionData = await window.ArtSoulContracts.getAuction(artwork.blockchain_id);

                    // End auction on blockchain
                    await window.ArtSoulContracts.endAuction(artwork.blockchain_id);

                    // Transfer ownership in database if there was a winner
                    if (auctionData.highestBidder && auctionData.highestBidder !== '0x0000000000000000000000000000000000000000') {
                        await window.ArtSoulDB.updateArtwork(artwork.id, {
                            owner_address: auctionData.highestBidder.toLowerCase(),
                            status: 'sold'
                        });
                    } else {
                        // No bids - mark as auction failed
                        await window.ArtSoulDB.updateArtwork(artwork.id, {
                            status: 'draft'
                        });
                    }

                    alert('Auction ended!');
                    loadArtwork();
                } catch (error) {
                    console.error('End auction failed:', error);
                    alert('Failed to end auction: ' + (error.message || 'Unknown error'));
                }
            }

            async function handleVote() {
                // Check if already voted
                if (userVote) {
                    alert('You have already voted on this artwork. Votes cannot be changed.');
                    return;
                }

                // Validate vote value
                if (!voteValue || parseFloat(voteValue) <= 0) {
                    alert('Please enter a valid valuation in ETH');
                    return;
                }

                // Check wallet connection
                const walletAddress = window.getCurrentWalletAddress?.();
                if (!walletAddress) {
                    alert('Please connect your wallet to vote');
                    return;
                }

                // Check authentication
                const isAuth = await window.SupabaseAuth?.isAuthenticated();
                if (!isAuth) {
                    const authenticated = await window.ensureAuthenticated?.();
                    if (!authenticated) return;
                }

                try {
                    const userValue = parseFloat(voteValue);
                    const creatorValue = parseFloat(artwork.creator_value) || 0;

                    // Determine vote type based on comparison
                    let voteType;
                    if (userValue > creatorValue * 1.1) {
                        voteType = 'undervalued';
                    } else if (userValue < creatorValue * 0.9) {
                        voteType = 'overvalued';
                    } else {
                        voteType = 'fair';
                    }

                    // Save vote to database
                    await window.ArtSoulDB.saveVote({
                        artwork_id: artwork.id,
                        voter_address: walletAddress,
                        vote_type: voteType
                    });

                    // Recalculate community value
                    const votes = await window.ArtSoulDB.getVotes(artwork.id);
                    const communityValue = calculateCommunityValue(votes, artwork.creator_value);

                    // Update artwork with new community value
                    await window.ArtSoulDB.updateArtwork(artwork.id, {
                        community_value: communityValue
                    });

                    alert('Vote recorded! Community Value updated.');
                    loadArtwork();
                } catch (error) {
                    console.error('Vote failed:', error);
                    alert('Failed to record vote: ' + (error.message || 'Unknown error'));
                }
            }

            function calculateCommunityValue(votes, creatorValue) {
                if (!votes || votes.length === 0) return null;

                const baseValue = parseFloat(creatorValue) || 0;
                let totalAdjustment = 0;

                votes.forEach(vote => {
                    if (vote.vote_type === 'undervalued') {
                        totalAdjustment += 0.1; // +10%
                    } else if (vote.vote_type === 'overvalued') {
                        totalAdjustment -= 0.1; // -10%
                    }
                    // 'fair' votes don't change the value
                });

                const avgAdjustment = totalAdjustment / votes.length;
                const communityValue = baseValue * (1 + avgAdjustment);

                return Math.max(0, communityValue).toFixed(4);
            }

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-2xl opacity-50">Loading...</div>
                    </div>
                );
            }

            if (!artwork) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="text-2xl mb-4">Artwork not found</div>
                            <a href="gallery.html" className="btn-main">Back to Gallery</a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-xl ${isClassic ? 'bg-gray-900/95 border-b border-gray-700' : 'bg-black/80 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <a href="index.html" className="flex items-center">
                                    <img
                                        src="ARTSOULlogo.png"
                                        alt="ArtSoul"
                                        style={{
                                            height: '60px',
                                            width: 'auto',
                                            borderRadius: '12px',
                                            filter: isClassic ? 'drop-shadow(0 0 8px rgba(169, 221, 211, 0.4))' : 'none',
                                            boxShadow: isClassic ? 'none' : '0 0 20px rgba(0, 245, 255, 0.6), 0 0 40px rgba(191, 0, 255, 0.4)',
                                            animation: isClassic ? 'logoLevitate 4s ease-in-out infinite' : 'logoBorderGlow 3s ease-in-out infinite, logoLevitate 4s ease-in-out infinite'
                                        }}
                                    />
                                </a>
                                <div className="flex items-center gap-3">
                                    <div id="networkBadge"></div>
                                    <div id="navButtons"></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="py-0 lg:py-12">
                        <div className="grid grid-cols-1 lg:grid-cols-[1fr_500px] gap-0">
                            {/* Artwork Media Viewer */}
                            <div className="w-full h-[60vh] lg:h-screen lg:sticky lg:top-0 bg-black flex items-center justify-center p-4 lg:p-8">
                                <div className={`relative w-full h-full rounded-xl overflow-hidden ${
                                    isClassic
                                        ? 'border-2 border-gray-700 shadow-2xl'
                                        : 'border-2 border-cyan-500/30 shadow-2xl shadow-cyan-500/20'
                                }`}
                                style={!isClassic ? {
                                    boxShadow: '0 0 40px rgba(0, 245, 255, 0.3), 0 0 80px rgba(191, 0, 255, 0.2)',
                                    animation: 'glow-pulse 3s ease-in-out infinite'
                                } : {}}
                                >
                                    {artwork.file_url && window.ArtSoulSecurity?.isValidStorageUrl(artwork.file_url) ? (
                                        <MediaViewer
                                            url={artwork.file_url}
                                            fileType={artwork.file_type}
                                            title={artwork.title}
                                        />
                                    ) : (
                                        <div className="w-full h-full flex items-center justify-center bg-black">
                                            <div className="text-2xl opacity-50">Invalid media URL</div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Artwork Info */}
                            <div className="space-y-6 px-4 lg:px-8 py-6 lg:py-12 overflow-y-auto">
                                <div>
                                    <h1 className="text-4xl font-bold mb-2">{artwork.title}</h1>
                                    <p className="opacity-70">{artwork.description}</p>
                                </div>

                                {/* Creator */}
                                <div className={`p-6 rounded-xl ${isClassic ? 'bg-gray-800' : 'bg-cyan-900/20 border border-cyan-500/30'}`}>
                                    <div className="flex items-center gap-6">
                                        {/* Avatar and Creator Info */}
                                        <a
                                            href={`profile.html?address=${artwork.creator_id}`}
                                            className="flex items-center gap-3 hover:opacity-80 transition-opacity"
                                        >
                                            <img
                                                src={creatorProfile?.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${artwork.creator_id}`}
                                                alt="Creator"
                                                className={`w-16 h-16 rounded-full border-2 ${
                                                    isClassic ? 'border-current' : 'border-cyan-400'
                                                }`}
                                                style={!isClassic ? {
                                                    boxShadow: '0 0 20px rgba(0, 245, 255, 0.5)',
                                                    animation: 'glow-pulse 2s ease-in-out infinite'
                                                } : {}}
                                            />
                                            <div>
                                                <div className="text-xs opacity-50 mb-1">Created by</div>
                                                <div className="font-semibold text-lg">
                                                    {creatorProfile?.username || `${artwork.creator_id?.slice(0, 6)}...${artwork.creator_id?.slice(-4)}`}
                                                </div>
                                                <div className="text-xs opacity-50 font-mono">
                                                    {artwork.creator_id?.slice(0, 10)}...{artwork.creator_id?.slice(-8)}
                                                </div>
                                            </div>
                                        </a>

                                        {/* Share Button */}
                                        <div className="ml-auto flex flex-col items-center gap-2">
                                            <button
                                                onClick={() => {
                                                    const text = `Check out "${artwork.title}" by ${creatorProfile?.username || 'artist'} on ArtSoul Marketplace!`;
                                                    const url = window.location.href;
                                                    const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
                                                    window.open(twitterUrl, '_blank', 'width=550,height=420');
                                                }}
                                                className={`hover:opacity-70 transition-all flex items-center justify-center rounded-lg ${
                                                    isClassic ? 'bg-gray-700 hover:bg-gray-600' : 'bg-cyan-900/30 hover:bg-cyan-900/50'
                                                }`}
                                                style={!isClassic ? {
                                                    width: '80px',
                                                    height: '80px',
                                                    boxShadow: '0 0 20px rgba(0, 245, 255, 0.3)',
                                                    animation: 'glow-pulse 2s ease-in-out infinite'
                                                } : {
                                                    width: '80px',
                                                    height: '80px'
                                                }}
                                                title="Share on X"
                                            >
                                                <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                                </svg>
                                            </button>
                                            <div className="text-xs opacity-50 text-center">Share on X</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Auction Info */}
                                {auction && (
                                    <div className={`p-6 rounded-xl ${isClassic ? 'bg-gray-800' : 'bg-cyan-900/20 border border-cyan-500/30'}`}>
                                        <h3 className="text-2xl font-bold mb-4">Live Auction</h3>

                                        <div className="space-y-3">
                                            <div className="flex justify-between">
                                                <span className="opacity-70">Starting Price:</span>
                                                <span className="font-bold">{auction.startingPrice} ETH</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="opacity-70">Current Bid:</span>
                                                <span className="font-bold text-2xl">{auction.highestBid === '0.0' ? 'No bids yet' : `${auction.highestBid} ETH`}</span>
                                            </div>
                                            {auction.highestBidder !== '0x0000000000000000000000000000000000000000' && (
                                                <div className="flex justify-between">
                                                    <span className="opacity-70">Highest Bidder:</span>
                                                    <span className="font-mono text-sm">{auction.highestBidder.slice(0, 10)}...</span>
                                                </div>
                                            )}
                                            <div className="flex justify-between">
                                                <span className="opacity-70">Time Left:</span>
                                                <span className="font-bold">{timeLeft}</span>
                                            </div>
                                        </div>

                                        {/* Bid Input */}
                                        {!auction.ended && (
                                            <div className="mt-6 space-y-3">
                                                <input
                                                    type="number"
                                                    step="0.001"
                                                    placeholder="Enter bid amount (ETH)"
                                                    value={bidAmount}
                                                    onChange={(e) => setBidAmount(e.target.value)}
                                                    className={`w-full px-4 py-3 rounded-lg ${isClassic ? 'bg-gray-700 border border-gray-600' : 'bg-gray-800/50 border border-cyan-500/30'}`}
                                                />
                                                <button onClick={handlePlaceBid} className="btn-main w-full">
                                                    Place Bid
                                                </button>
                                                <div className="text-sm opacity-50 text-center">
                                                    Minimum: {auction.highestBid === '0.0' ? auction.startingPrice : (parseFloat(auction.highestBid) * 1.05).toFixed(4)} ETH
                                                </div>
                                            </div>
                                        )}

                                        {/* End Auction (for creator) */}
                                        {auction.ended === false && Date.now() / 1000 >= auction.endTime && (
                                            <button onClick={handleEndAuction} className="btn-secondary w-full mt-4">
                                                End Auction
                                            </button>
                                        )}
                                    </div>
                                )}

                                {/* Valuation */}
                                <div className={`p-6 rounded-xl ${isClassic ? 'bg-gray-800' : 'bg-cyan-900/20 border border-cyan-500/30'}`}>
                                    <h3 className="text-xl font-bold mb-4">Valuation</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between">
                                            <span className="opacity-70">Creator Value:</span>
                                            <span className="font-bold">{artwork.creator_value || '0'} ETH</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="opacity-70">Community Value:</span>
                                            <span className="font-bold">{artwork.community_value ? `${artwork.community_value} ETH` : 'Not rated yet'}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Community Voting */}
                                <div className={`p-6 rounded-xl ${isClassic ? 'bg-gray-800' : 'bg-cyan-900/20 border border-cyan-500/30'}`}>
                                    <h3 className="text-xl font-bold mb-4">Community Voting</h3>

                                    {userVote ? (
                                        <div className="text-center py-4">
                                            <p className="text-lg mb-2">You voted: {userVote.vote_type}</p>
                                            <p className="text-sm opacity-50">Votes cannot be changed</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm opacity-70 mb-2">
                                                    Your Valuation (ETH)
                                                </label>
                                                <input
                                                    type="number"
                                                    step="0.001"
                                                    placeholder="Enter your valuation"
                                                    value={voteValue}
                                                    onChange={(e) => setVoteValue(e.target.value)}
                                                    className={`w-full px-4 py-3 rounded-lg ${isClassic ? 'bg-gray-700 border border-gray-600' : 'bg-gray-800/50 border border-cyan-500/30'}`}
                                                />
                                            </div>
                                            <button onClick={handleVote} className="btn-main w-full">
                                                Submit Vote
                                            </button>
                                            <p className="text-xs text-center opacity-50">
                                                Creator Value: {artwork.creator_value || '0'} ETH
                                            </p>
                                        </div>
                                    )}
                                </div>

                                {/* Back Button */}
                                <a href="gallery.html" className="btn-secondary w-full block text-center">
                                    Back to Gallery
                                </a>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<ArtworkPage />, document.getElementById('app'));
    </script>
</body>
</html>
