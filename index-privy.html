<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="og:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="og:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="og:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="twitter:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="twitter:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="twitter:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Privy SDK -->
    <script src="https://unpkg.com/@privy-io/js-sdk@latest/dist/privy.umd.js"></script>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out; }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
        .neon-glow { text-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4, 0 0 30px #06b6d4; }
        .neon-border { box-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4; }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3); }
        .classic-hover { transition: all 0.2s ease; }
        .classic-hover:hover { transform: scale(1.05); }
        .particle { border-radius: 50%; position: absolute; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-30px) translateX(10px); } }
    </style>
</head>
<body>
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useRef } = React;

        // Privy Configuration
        const PRIVY_APP_ID = 'clxxx-your-privy-app-id'; // Replace with your Privy App ID

        // Initialize Privy
        let privyClient = null;

        const initPrivy = async () => {
            if (typeof Privy !== 'undefined') {
                privyClient = new Privy.PrivyClient({
                    appId: PRIVY_APP_ID,
                    config: {
                        appearance: {
                            theme: 'dark',
                            accentColor: '#06b6d4',
                            logo: 'https://maysonkiller.github.io/artsoul-marketplace/logo.png',
                        },
                        loginMethods: ['wallet', 'email', 'google', 'twitter'],
                        embeddedWallets: {
                            createOnLogin: 'users-without-wallets',
                        },
                    },
                });
                return privyClient;
            }
            return null;
        };

        // Network configurations
        const networks = {
            1: { name: 'Ethereum', icon: '⟠', color: '#627EEA', rpcUrl: 'https://eth-mainnet.g.alchemy.com/v2/' },
            137: { name: 'Polygon', icon: '⬡', color: '#8247E5', rpcUrl: 'https://polygon-rpc.com' },
            56: { name: 'BSC', icon: '◆', color: '#F3BA2F', rpcUrl: 'https://bsc-dataseed.binance.org' },
            42161: { name: 'Arbitrum', icon: '◉', color: '#28A0F0', rpcUrl: 'https://arb1.arbitrum.io/rpc' },
            10: { name: 'Optimism', icon: '◎', color: '#FF0420', rpcUrl: 'https://mainnet.optimism.io' },
            43114: { name: 'Avalanche', icon: '▲', color: '#E84142', rpcUrl: 'https://api.avax.network/ext/bc/C/rpc' },
            8453: { name: 'Base', icon: '◬', color: '#0052FF', rpcUrl: 'https://mainnet.base.org' },
        };

        const REQUIRED_CHAIN_ID = 137; // Polygon

        const mockArtworks = [
            { id: 1, title: 'Soul Flame', artist: 'Maysonkiller', type: 'NFT', description: 'A burning representation of the digital soul', currentBid: 0.5, bids: [0.3, 0.4, 0.5], image: 'artwork-sample.jpg' },
            { id: 2, title: 'Neon Dreams', artist: 'CryptoArtist', type: 'Digital Art', description: 'Futuristic cityscape in neon colors', currentBid: 1.2, bids: [0.8, 1.0, 1.2] },
            { id: 3, title: 'Silent Choir', artist: 'Maysonkiller', type: 'Video', description: 'An audiovisual journey through silence', currentBid: 0.8, bids: [0.5, 0.7, 0.8] },
            { id: 4, title: 'Cosmic Melancholy', artist: 'StarGazer', type: 'GIF', description: 'Animated loop of cosmic emotions', currentBid: 0.3, bids: [0.1, 0.2, 0.3] },
            { id: 5, title: 'Real Canvas #1', artist: 'TraditionalArt', type: 'Physical Art', description: 'Oil painting on canvas - tokenized', currentBid: 2.5, bids: [1.5, 2.0, 2.5] },
            { id: 6, title: 'Pixel Poetry', artist: 'DigitalPoet', type: 'Image', description: 'Generative pixel art with hidden meaning', currentBid: 0.6, bids: [0.4, 0.5, 0.6] },
        ];

        function App() {
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'classic');
            const [authenticated, setAuthenticated] = useState(false);
            const [user, setUser] = useState(null);
            const [walletAddress, setWalletAddress] = useState('');
            const [currentChainId, setCurrentChainId] = useState(null);
            const [showNetworkModal, setShowNetworkModal] = useState(false);
            const [filter, setFilter] = useState('all');
            const [bidAmount, setBidAmount] = useState('');
            const [selectedArtwork, setSelectedArtwork] = useState(null);
            const [allArtworks, setAllArtworks] = useState([]);
            const [timeLeft, setTimeLeft] = useState(86400);
            const [viewerOpen, setViewerOpen] = useState(false);
            const [viewerArtwork, setViewerArtwork] = useState(null);

            const isClassic = theme === 'classic';

            // Initialize Privy on mount
            useEffect(() => {
                const init = async () => {
                    const client = await initPrivy();
                    if (client) {
                        // Check if user is already authenticated
                        const authState = client.getAuthState();
                        if (authState.authenticated) {
                            setAuthenticated(true);
                            setUser(authState.user);
                            if (authState.user.wallet) {
                                setWalletAddress(authState.user.wallet.address);
                            }
                        }
                    }
                };
                init();
            }, []);

            // Load artworks
            useEffect(() => {
                const uploadedArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                const combined = [...mockArtworks, ...uploadedArtworks];
                setAllArtworks(combined);
                setSelectedArtwork(combined[0]);
            }, []);

            // Timer
            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // Check network on wallet change
            useEffect(() => {
                const checkNetwork = async () => {
                    if (window.ethereum && walletAddress) {
                        try {
                            const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                            const decimalChainId = parseInt(chainId, 16);
                            setCurrentChainId(decimalChainId);

                            if (decimalChainId !== REQUIRED_CHAIN_ID) {
                                setShowNetworkModal(true);
                            }
                        } catch (error) {
                            console.error('Error checking network:', error);
                        }
                    }
                };
                checkNetwork();
            }, [walletAddress]);

            const formatTime = (seconds) => {
                const days = Math.floor(seconds / (24 * 60 * 60));
                const hours = Math.floor((seconds % (24 * 60 * 60)) / (60 * 60));
                const mins = Math.floor((seconds % (60 * 60)) / 60);
                const secs = seconds % 60;
                return `${days}d ${hours}h ${mins}m ${secs}s`;
            };

            const handleConnect = async () => {
                if (!privyClient) {
                    alert('Privy is not initialized. Please refresh the page.');
                    return;
                }

                try {
                    await privyClient.login();
                    const authState = privyClient.getAuthState();
                    if (authState.authenticated) {
                        setAuthenticated(true);
                        setUser(authState.user);
                        if (authState.user.wallet) {
                            setWalletAddress(authState.user.wallet.address);
                        }
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Failed to connect. Please try again.');
                }
            };

            const handleDisconnect = async () => {
                if (privyClient) {
                    await privyClient.logout();
                    setAuthenticated(false);
                    setUser(null);
                    setWalletAddress('');
                    setCurrentChainId(null);
                }
            };

            const switchNetwork = async () => {
                if (!window.ethereum) {
                    alert('Please install MetaMask or another Web3 wallet');
                    return;
                }

                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: `0x${REQUIRED_CHAIN_ID.toString(16)}` }],
                    });
                    setCurrentChainId(REQUIRED_CHAIN_ID);
                    setShowNetworkModal(false);
                } catch (error) {
                    if (error.code === 4902) {
                        // Network not added, try to add it
                        try {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: `0x${REQUIRED_CHAIN_ID.toString(16)}`,
                                    chainName: networks[REQUIRED_CHAIN_ID].name,
                                    rpcUrls: [networks[REQUIRED_CHAIN_ID].rpcUrl],
                                    nativeCurrency: {
                                        name: 'MATIC',
                                        symbol: 'MATIC',
                                        decimals: 18
                                    }
                                }]
                            });
                            setCurrentChainId(REQUIRED_CHAIN_ID);
                            setShowNetworkModal(false);
                        } catch (addError) {
                            console.error('Error adding network:', addError);
                            alert('Failed to add network');
                        }
                    } else {
                        console.error('Error switching network:', error);
                        alert('Failed to switch network');
                    }
                }
            };

            const handlePlaceBid = () => {
                if (!authenticated) {
                    alert('Please connect your wallet first');
                    return;
                }
                if (currentChainId !== REQUIRED_CHAIN_ID) {
                    setShowNetworkModal(true);
                    return;
                }
                const bid = parseFloat(bidAmount);
                if (!bid || bid <= selectedArtwork.currentBid) {
                    alert(`Bid must be higher than current floor: ${selectedArtwork.currentBid} ETH`);
                    return;
                }
                alert(`Bid placed: ${bid} ETH on "${selectedArtwork.title}"`);
                setBidAmount('');
            };

            const filteredArtworks = filter === 'all'
                ? allArtworks
                : allArtworks.filter(art => art.type === filter);

            const bgClass = isClassic
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isClassic ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-3">
                                        <a href="index.html" className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            ArtSoul
                                        </a>
                                        <div className={`flex gap-2 p-1 rounded-lg ${isClassic ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                            <button
                                                onClick={() => {
                                                    setTheme('classic');
                                                    localStorage.setItem('theme', 'classic');
                                                }}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'classic'
                                                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {isClassic ? '📋 Classic' : '📋'}
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setTheme('future');
                                                    localStorage.setItem('theme', 'future');
                                                }}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'future'
                                                        ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {theme === 'future' ? '🚀 Future' : '🚀'}
                                            </button>
                                        </div>
                                    </div>
                                    <a
                                        href="docs.html#vision"
                                        className={`text-xs mt-1 hover:underline ${isClassic ? 'text-gray-600 hover:text-blue-600' : 'text-purple-300 hover:text-cyan-400'}`}
                                    >
                                        Decentralized Art Marketplace
                                    </a>
                                </div>

                                <div className="flex items-center gap-3 flex-wrap">
                                    <a
                                        href="upload.html"
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            isClassic
                                                ? 'bg-purple-600 text-white hover:bg-purple-700 shadow-lg classic-hover'
                                                : 'bg-gradient-to-r from-pink-500 to-purple-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {isClassic ? '📤' : '💫'} Upload
                                    </a>

                                    <a
                                        href="profile.html"
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            isClassic
                                                ? 'bg-gray-600 text-white hover:bg-gray-700 shadow-lg classic-hover'
                                                : 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {isClassic ? '👤' : '🎭'} Profile
                                    </a>

                                    <button
                                        onClick={authenticated ? handleDisconnect : handleConnect}
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            authenticated
                                                ? isClassic
                                                    ? 'bg-green-600 text-white shadow-lg classic-hover'
                                                    : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover-lift'
                                                : isClassic
                                                    ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg classic-hover'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {authenticated ? (
                                            <>
                                                {isClassic ? '✅' : '🔗'} {walletAddress ? `${walletAddress.slice(0, 6)}...${walletAddress.slice(-4)}` : 'Connected'}
                                            </>
                                        ) : (
                                            <>{isClassic ? '🔌 Connect' : '⚡ Connect'}</>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Network Switch Modal */}
                    {showNetworkModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm p-4">
                            <div className={`relative max-w-md w-full rounded-xl p-8 ${isClassic ? 'bg-white' : 'bg-gray-900 border border-red-500/50'}`}>
                                <div className="text-center mb-6">
                                    <div className="text-6xl mb-4">⚠️</div>
                                    <h2 className={`text-2xl font-bold mb-2 ${isClassic ? 'text-gray-900' : 'text-red-400'}`}>
                                        Wrong Network
                                    </h2>
                                    <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                        Please switch to {networks[REQUIRED_CHAIN_ID].name} to continue
                                    </p>
                                </div>

                                <div className={`p-4 rounded-lg mb-6 ${isClassic ? 'bg-gray-100' : 'bg-gray-800/50'}`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>Current Network:</span>
                                        <span className={`font-bold ${isClassic ? 'text-red-600' : 'text-red-400'}`}>
                                            {networks[currentChainId]?.icon} {networks[currentChainId]?.name || 'Unknown'}
                                        </span>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>Required Network:</span>
                                        <span className={`font-bold ${isClassic ? 'text-green-600' : 'text-green-400'}`}>
                                            {networks[REQUIRED_CHAIN_ID].icon} {networks[REQUIRED_CHAIN_ID].name}
                                        </span>
                                    </div>
                                </div>

                                <button
                                    onClick={switchNetwork}
                                    className={`w-full py-4 rounded-lg font-bold text-lg transform hover:scale-105 transition-all mb-3 ${
                                        isClassic
                                            ? 'bg-blue-600 text-white hover:bg-blue-700'
                                            : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl'
                                    }`}
                                >
                                    Switch to {networks[REQUIRED_CHAIN_ID].name}
                                </button>

                                <button
                                    onClick={() => setShowNetworkModal(false)}
                                    className={`w-full py-2 rounded-lg font-medium text-sm ${
                                        isClassic ? 'text-gray-600 hover:bg-gray-100' : 'text-gray-400 hover:bg-gray-800'
                                    }`}
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Main Content - Simplified for now */}
                    <main className="container mx-auto px-4 py-8">
                        <div className="text-center">
                            <h1 className={`text-4xl font-bold mb-4 ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                Welcome to ArtSoul
                            </h1>
                            <p className={`text-lg mb-8 ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                Decentralized Art Marketplace powered by Privy
                            </p>
                            {!authenticated && (
                                <button
                                    onClick={handleConnect}
                                    className={`px-8 py-4 rounded-lg font-bold text-xl transform hover:scale-105 ${
                                        isClassic
                                            ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg'
                                            : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                    }`}
                                >
                                    Connect with Privy
                                </button>
                            )}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="mt-16 pb-8 text-center">
                        <div className="mb-4">
                            <a
                                href="docs.html"
                                className={`inline-block px-6 py-3 rounded-lg font-medium transform hover:scale-105 ${
                                    isClassic
                                        ? 'bg-green-600 text-white hover:bg-green-700 shadow-lg'
                                        : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover:shadow-2xl'
                                }`}
                            >
                                {isClassic ? '📚' : '⚡'} Documentation
                            </a>
                        </div>
                        <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isClassic ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                        <p className={`text-xs mt-2 ${isClassic ? 'text-gray-500' : 'text-gray-500'}`}>
                            Multi-chain decentralized art auction platform
                        </p>
                    </footer>

                    {/* Background Effects for Future Theme */}
                    {!isClassic && (
                        <div className="fixed inset-0 pointer-events-none overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-br from-purple-900/20 via-transparent to-cyan-900/20" />
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse-slow" />
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl animate-pulse-slow" style={{animationDelay: '2s'}} />
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
