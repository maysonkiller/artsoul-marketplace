<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Artwork - ArtSoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010101; color: #e8e3d5; }
        header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid #a9ddd3; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
        .btn-main { background: #e8e3d5; color: #010101; border: 1px solid #e8e3d5; padding: 0.75rem 2rem; font-weight: 500; cursor: pointer; transition: all 0.3s; border-radius: 0.375rem; }
        .btn-main:hover { background: transparent; color: #e8e3d5; }
        .form-input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: rgba(232, 227, 213, 0.05); border: 1px solid #a9ddd3; color: #e8e3d5; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #e8e3d5; background: rgba(232, 227, 213, 0.1); }
        .upload-zone { border: 2px dashed #a9ddd3; background: rgba(232, 227, 213, 0.03); transition: all 0.3s; cursor: pointer; }
        .upload-zone:hover { border-color: #e8e3d5; background: rgba(232, 227, 213, 0.08); }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-light">ArtSoul</a>
                <a href="index.html" class="opacity-70 hover:opacity-100">Back to Gallery</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <h1 class="text-4xl font-light mb-8">Upload Masterpiece</h1>

        <div class="space-y-8">
            <div class="upload-zone rounded-xl p-12 text-center" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.gif" style="display: none;" onchange="handleFileSelect(event)">
                <svg viewBox="0 0 24 24" fill="none" class="w-16 h-16 mx-auto mb-4 opacity-50" stroke="currentColor">
                    <path d="M12 3L12 21M12 3L6 9M12 3L18 9M3 15L3 21L21 21L21 15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <p class="text-xl opacity-70 mb-2">Click or drag and drop your artwork</p>
                <p class="text-sm opacity-40">Supports JPG, PNG, MP4, GIF, MP3 (Max 100MB)</p>
                <p id="fileName" class="text-sm mt-4 opacity-70"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Title</label>
                    <input type="text" id="artTitle" class="form-input" placeholder="Name of your piece" required>
                </div>
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Creator Value (ETH)</label>
                    <input type="number" id="artPrice" step="0.01" class="form-input" placeholder="0.5" required>
                </div>
            </div>

            <div>
                <label class="block opacity-70 mb-2 font-medium">Description</label>
                <textarea id="artDescription" class="form-input h-32" placeholder="Describe your artwork..."></textarea>
            </div>

            <button onclick="handleUpload()" class="btn-main w-full">List on Marketplace</button>
        </div>
    </main>

    <script>
        let selectedFile = null;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            }
        }

        function handleUpload() {
            const title = document.getElementById('artTitle').value;
            const price = document.getElementById('artPrice').value;
            const description = document.getElementById('artDescription').value;

            if (!selectedFile) {
                alert('Please select a file to upload');
                return;
            }

            if (!title || !price) {
                alert('Please fill in title and price');
                return;
            }

            alert(`Minting feature coming soon!\n\nYour artwork:\nTitle: ${title}\nPrice: ${price} ETH\nFile: ${selectedFile.name}`);
        }
    </script>
</body>
</html>
