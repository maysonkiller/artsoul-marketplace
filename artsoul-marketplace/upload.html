<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Artwork - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #e8e3d5;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        .classic .btn-main {
            background: var(--text-classic);
            color: var(--bg-classic);
            border: 1px solid var(--text-classic);
            padding: 0.5rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .classic .btn-main:hover {
            background: transparent;
            color: var(--text-classic);
        }

        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .future .btn-main {
            background: linear-gradient(135deg, var(--accent-future) 0%, var(--neon-purple) 100%);
            color: #000000;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .future .btn-main:hover {
            animation: neonPulse 0.3s infinite;
            transform: scale(1.05);
            filter: brightness(1.3);
        }

        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--neon-purple);
            }
            50% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
            }
        }

        .theme-toggle {
            display: flex;
            gap: 0.5rem;
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .classic .theme-toggle {
            background: rgba(232, 227, 213, 0.1);
        }

        .future .theme-toggle {
            background: rgba(0, 245, 255, 0.1);
        }

        .theme-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: all 0.3s;
            color: currentColor;
        }

        .classic .theme-btn.active-classic {
            background: var(--accent-classic);
            color: var(--bg-classic);
        }

        .future .theme-btn.active-future {
            background: linear-gradient(135deg, var(--accent-future), var(--neon-purple));
            color: #000000;
        }

        .network-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .classic .network-badge {
            background: rgba(232, 227, 213, 0.1);
            border: 1px solid var(--accent-classic);
        }

        .future .network-badge {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent-future);
            position: relative;
            overflow: hidden;
        }

        .future .network-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent);
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            .network-badge {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        .upload-zone {
            transition: all 0.3s;
            cursor: pointer;
        }

        .classic .upload-zone {
            border: 2px dashed var(--accent-classic);
            background: rgba(232, 227, 213, 0.03);
        }

        .classic .upload-zone:hover {
            border-color: var(--text-classic);
            background: rgba(232, 227, 213, 0.08);
        }

        .future .upload-zone {
            border: 2px dashed var(--accent-future);
            background: rgba(0, 245, 255, 0.05);
        }

        .future .upload-zone:hover {
            border-color: var(--neon-purple);
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.3);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: inherit;
            transition: all 0.3s;
        }

        .classic .form-input {
            background: rgba(232, 227, 213, 0.05);
            border: 1px solid var(--accent-classic);
        }

        .classic .form-input:focus {
            outline: none;
            border-color: var(--text-classic);
            background: rgba(232, 227, 213, 0.1);
        }

        .future .form-input {
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid var(--accent-future);
        }

        .future .form-input:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.3);
        }

        .icon-svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .classic .tooltip-text {
            background: var(--text-classic);
            color: var(--bg-classic);
        }

        .future .tooltip-text {
            background: var(--accent-future);
            color: #000000;
        }

        .tooltip-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="classic">
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-2xl font-light tracking-wide">ArtSoul</a>
                    <div class="theme-toggle">
                        <button onclick="setTheme('classic')" id="classicBtn" class="theme-btn active-classic">
                            Classic
                        </button>
                        <button onclick="setTheme('future')" id="futureBtn" class="theme-btn">
                            Future
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="tooltip-wrap">
                        <a href="docs.html" class="p-2 inline-block">
                            <svg viewBox="0 0 24 24" fill="none" class="w-7 h-7" style="color: currentColor;">
                                <path d="M4 4L20 4L20 20L4 20L4 4M8 8L16 8M8 12L16 12M8 16L12 16" stroke="currentColor" class="icon-svg"/>
                            </svg>
                        </a>
                        <div class="tooltip-text">Documentation</div>
                    </div>
                    <div id="networkBadge"></div>
                    <div class="flex items-center gap-3" id="navButtons">
                        <button onclick="window.connectWallet()" class="btn-main">Get Started</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <a href="index.html" class="opacity-50 hover:opacity-100 mb-8 inline-block transition-opacity">← Back to Gallery</a>
        <h1 class="text-4xl font-light mb-8">Upload Masterpiece</h1>

        <div class="space-y-8">
            <div class="upload-zone rounded-xl p-12 text-center" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.gif" style="display: none;" onchange="handleFileSelect(event)">
                <svg viewBox="0 0 24 24" fill="none" class="w-16 h-16 mx-auto mb-4 opacity-50">
                    <path d="M12 3L12 21M12 3L6 9M12 3L18 9M3 15L3 21L21 21L21 15" stroke="currentColor" class="icon-svg"/>
                </svg>
                <p class="text-xl opacity-70 mb-2">Click or drag and drop your artwork</p>
                <p class="text-sm opacity-40">Supports JPG, PNG, MP4, GIF, MP3 (Max 100MB)</p>
                <p id="fileName" class="text-sm mt-4 opacity-70"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Title</label>
                    <input type="text" id="artTitle" class="form-input" placeholder="Name of your piece" required>
                </div>
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Creator Value (ETH)</label>
                    <input type="number" id="artPrice" step="0.01" class="form-input" placeholder="0.5" required>
                </div>
            </div>

            <div>
                <label class="block opacity-70 mb-2 font-medium">Description</label>
                <textarea id="artDescription" class="form-input h-32" placeholder="Describe your artwork..."></textarea>
            </div>

            <button onclick="handleUpload()" class="btn-main w-full">List on Marketplace</button>
        </div>
    </main>

    <script>
        let selectedFile = null;

        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);
            const classicBtn = document.getElementById('classicBtn');
            const futureBtn = document.getElementById('futureBtn');
            if (theme === 'classic') {
                classicBtn.className = 'theme-btn active-classic';
                futureBtn.className = 'theme-btn';
            } else {
                classicBtn.className = 'theme-btn';
                futureBtn.className = 'theme-btn active-future';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'classic';
            setTheme(savedTheme);
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                document.getElementById('fileName').textContent = `Selected: ${file.name} (${sizeMB} MB)`;

                // Auto-detect file type and generate description
                const mimeType = file.type;
                let category = 'Unknown';
                let autoDescription = '';

                if (mimeType.startsWith('image/')) {
                    category = mimeType.includes('gif') ? 'GIF Animation' : 'Digital Art';
                    autoDescription = `A unique ${category.toLowerCase()} piece showcasing creative vision and artistic expression.`;
                } else if (mimeType.startsWith('video/')) {
                    category = 'Video Art';
                    autoDescription = 'An immersive video artwork combining motion, sound, and visual storytelling.';
                } else if (mimeType.startsWith('audio/')) {
                    category = 'Music NFT';
                    autoDescription = 'An original music composition capturing emotion and rhythm in digital form.';
                }

                // Auto-fill description if empty
                const descField = document.getElementById('artDescription');
                if (!descField.value) {
                    descField.value = autoDescription;
                }

                console.log(`📁 File detected: ${category} (${mimeType})`);
            }
        }

        function handleUpload() {
            const title = document.getElementById('artTitle').value;
            const price = document.getElementById('artPrice').value;
            const description = document.getElementById('artDescription').value;

            if (!selectedFile) {
                if (modal) modal.open();
                return;
            }

            if (!title || !price) {
                if (modal) modal.open();
                return;
            }

            // Check if user has profile
            const profile = localStorage.getItem('userProfile');
            if (!profile) {
                window.location.href = 'profile.html';
                return;
            }

            // Simulate upload process
            const mimeType = selectedFile.type;
            let category = 'art';
            if (mimeType.startsWith('video/')) category = 'video';
            else if (mimeType.startsWith('audio/')) category = 'music';
            else if (mimeType.includes('gif')) category = 'gif';

            console.log(`🚀 Uploading ${category}: ${title} at ${price} ETH`);
            console.log(`📝 Description: ${description}`);
            console.log(`📦 File: ${selectedFile.name} (${selectedFile.type})`);

            // Show success and redirect
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>

    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.7.11?bundle'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.7.11?bundle'

        const projectId = '9fdc97f91c02d46a28ca9d185a9e58f2';
        const networks = [
            { chainId: 1, name: 'Ethereum', currency: 'ETH', explorerUrl: 'https://etherscan.io', rpcUrl: 'https://cloudflare-eth.com' },
            { chainId: 137, name: 'Polygon', currency: 'MATIC', explorerUrl: 'https://polygonscan.com', rpcUrl: 'https://polygon-rpc.com' },
            { chainId: 56, name: 'BSC', currency: 'BNB', explorerUrl: 'https://bscscan.com', rpcUrl: 'https://bsc-dataseed.binance.org' },
            { chainId: 8453, name: 'Base', currency: 'ETH', explorerUrl: 'https://basescan.org', rpcUrl: 'https://mainnet.base.org' },
            { chainId: 42161, name: 'Arbitrum', currency: 'ETH', explorerUrl: 'https://arbiscan.io', rpcUrl: 'https://arb1.arbitrum.io/rpc' },
            { chainId: 10, name: 'Optimism', currency: 'ETH', explorerUrl: 'https://optimistic.etherscan.io', rpcUrl: 'https://mainnet.optimism.io' },
            { chainId: 11155111, name: 'Sepolia', currency: 'ETH', explorerUrl: 'https://sepolia.etherscan.io', rpcUrl: 'https://rpc.sepolia.org' },
            { chainId: 2025, name: 'Rialo Playground', currency: 'RIA', explorerUrl: 'https://playground.rialo.io', rpcUrl: 'https://playground.rialo.io/rpc' }
        ];
        const metadata = { name: 'ArtSoul Marketplace', description: 'Decentralized Art Marketplace', url: 'https://maysonkiller.github.io/artsoul-marketplace', icons: ['https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg'] };

        let modal = null;
        let currentNetwork = null;
        let currentBalance = '0.00';

        function updateNetworkBadge(state) {
            const networkBadgeContainer = document.getElementById('networkBadge');
            if (!networkBadgeContainer) return;
            if (state?.address && state?.chainId) {
                const network = networks.find(n => n.chainId === state.chainId) || { name: 'Unknown', currency: 'ETH' };
                currentNetwork = network;
                if (window.ethereum) {
                    window.ethereum.request({ method: 'eth_getBalance', params: [state.address, 'latest'] }).then(balance => { currentBalance = (parseInt(balance, 16) / 1e18).toFixed(4); renderNetworkBadge(); }).catch(() => { currentBalance = '0.00'; renderNetworkBadge(); });
                } else { renderNetworkBadge(); }
            } else { networkBadgeContainer.innerHTML = ''; }
        }

        function renderNetworkBadge() {
            const networkBadgeContainer = document.getElementById('networkBadge');
            if (!networkBadgeContainer || !currentNetwork) return;
            networkBadgeContainer.innerHTML = `<div class="network-badge" onclick="window.web3Modal?.open({ view: 'Networks' })"><span class="network-name">${currentNetwork.name}</span><span class="balance-amount">${currentBalance} ${currentNetwork.currency}</span></div>`;
        }

        function updateNavButtons(state) {
            const navButtons = document.getElementById('navButtons');
            if (!navButtons) return;
            navButtons.innerHTML = `<div class="tooltip-wrap"><a href="profile.html" class="p-2 inline-block"><svg viewBox="0 0 24 24" fill="none" class="w-6 h-6" style="color: currentColor;"><circle cx="12" cy="12" r="9" stroke="currentColor" class="icon-svg"/><path d="M12 6L12 12L16 16" stroke="currentColor" class="icon-svg"/></svg></a><div class="tooltip-text">My Profile</div></div><button onclick="window.web3Modal?.disconnect()" class="btn-main" style="padding: 0.5rem 1rem; font-size: 0.875rem;">${state.address.slice(0, 6)}...${state.address.slice(-4)}</button>`;
        }

        function resetNavButtons() {
            const navButtons = document.getElementById('navButtons');
            const networkBadge = document.getElementById('networkBadge');
            if (!navButtons) return;
            navButtons.innerHTML = '<button onclick="window.connectWallet()" class="btn-main">Get Started</button>';
            if (networkBadge) networkBadge.innerHTML = '';
        }

        window.connectWallet = async () => { if (modal) await modal.open(); };

        async function initializeAppKit() {
            try {
                modal = createAppKit({ adapters: [new EthersAdapter()], networks, metadata, projectId, features: { socials: ['google', 'x', 'apple', 'discord'], email: true, onramp: true, swaps: true, analytics: true }, themeMode: 'dark', themeVariables: { '--w3m-accent': '#00f5ff', '--w3m-color-mix': '#bf00ff' } });
                window.web3Modal = modal;
                window.connectWallet = async () => { if (modal) await modal.open(); };
                modal.subscribeState((state) => { if (state?.address) { updateNavButtons(state); updateNetworkBadge(state); } else resetNavButtons(); });
                console.log('AppKit initialized on upload.html');
            } catch (error) { console.error('AppKit init failed:', error); }
        }

        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initializeAppKit); } else { initializeAppKit(); }
    </script>
</body>
</html>
