<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ArtSoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010101; color: #e8e3d5; }
        header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid #a9ddd3; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
        .btn-main { background: #e8e3d5; color: #010101; border: 1px solid #e8e3d5; padding: 0.75rem 2rem; font-weight: 500; cursor: pointer; transition: all 0.3s; border-radius: 0.375rem; }
        .btn-main:hover { background: transparent; color: #e8e3d5; }
        .form-input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: rgba(232, 227, 213, 0.05); border: 1px solid #a9ddd3; color: #e8e3d5; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #e8e3d5; background: rgba(232, 227, 213, 0.1); }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-light">ArtSoul</a>
                <a href="index.html" class="opacity-70 hover:opacity-100">Back to Gallery</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <h1 class="text-4xl font-light mb-8">Complete Your Profile</h1>
        <form id="profileForm" class="space-y-6">
            <div>
                <label class="block mb-2 font-medium">Username</label>
                <input type="text" id="username" class="form-input" placeholder="@artist_name" required>
            </div>
            <div>
                <label class="block mb-2 font-medium">Bio</label>
                <textarea id="bio" class="form-input h-32" placeholder="Tell the community about your art..."></textarea>
            </div>
            <div>
                <label class="block mb-2 font-medium">X (Twitter) Handle</label>
                <input type="text" id="twitter" class="form-input" placeholder="@handle">
            </div>
            <div>
                <label class="block mb-2 font-medium">Discord Username</label>
                <input type="text" id="discord" class="form-input" placeholder="username#1234">
            </div>
            <button type="submit" class="btn-main w-full">Save Profile</button>
        </form>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const existingProfile = localStorage.getItem('userProfile');
            if (existingProfile) {
                const profile = JSON.parse(existingProfile);
                document.getElementById('username').value = profile.username || '';
                document.getElementById('bio').value = profile.bio || '';
                document.getElementById('twitter').value = profile.twitter || '';
                document.getElementById('discord').value = profile.discord || '';
            }
        });

        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            const profile = {
                username: document.getElementById('username').value,
                bio: document.getElementById('bio').value,
                twitter: document.getElementById('twitter').value,
                discord: document.getElementById('discord').value
            };
            localStorage.setItem('userProfile', JSON.stringify(profile));
            alert('Profile saved!');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
