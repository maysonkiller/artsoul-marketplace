<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ArtSoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010101; color: #e8e3d5; }
        header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid #a9ddd3; }
        .btn-main { background: #e8e3d5; color: #010101; padding: 0.75rem 2rem; border-radius: 0.375rem; width: 100%; }
        .form-input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: rgba(232, 227, 213, 0.05); border: 1px solid #a9ddd3; color: #e8e3d5; }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-light">ArtSoul</a>
            <a href="index.html" class="opacity-70 hover:opacity-100">Back</a>
        </div>
    </header>
    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <h1 class="text-4xl font-light mb-8">Complete Your Profile</h1>
        <form id="profileForm" class="space-y-6">
            <div><label class="block mb-2">Username</label><input type="text" id="username" class="form-input" placeholder="@artist_name" required></div>
            <div><label class="block mb-2">Bio</label><textarea id="bio" class="form-input h-32" placeholder="Tell about your art..."></textarea></div>
            <button type="submit" class="btn-main">Save Profile</button>
        </form>
    </main>
    <script>
        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem('userProfile', JSON.stringify({ username: document.getElementById('username').value, bio: document.getElementById('bio').value }));
            alert('Profile saved!');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
