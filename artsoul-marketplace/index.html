<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010101; color: #e8e3d5; }
        header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid #a9ddd3; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
        .btn-main { background: #e8e3d5; color: #010101; border: 1px solid #e8e3d5; padding: 0.75rem 2rem; font-weight: 500; cursor: pointer; transition: all 0.3s; border-radius: 0.375rem; }
        .btn-main:hover { background: transparent; color: #e8e3d5; }
        .card { background: rgba(232, 227, 213, 0.03); border: 1px solid #a9ddd3; transition: all 0.4s; cursor: pointer; border-radius: 0.75rem; overflow: hidden; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(169, 221, 211, 0.4); border-color: #e8e3d5; }
        .gallery { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1rem; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1200px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .gallery { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-light">ArtSoul</a>
                <div class="flex items-center gap-3">
                    <a href="docs.html" class="opacity-70 hover:opacity-100">Docs</a>
                    <div id="navButtons">
                        <button onclick="connectWallet()" class="btn-main">Get Started</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-light mb-4">Decentralized Art Marketplace</h1>
            <p class="text-xl font-light opacity-80">Where community determines value</p>
        </div>

        <div class="gallery">
            <div class="card" onclick="alert('Artwork viewer coming soon!')">
                <div class="aspect-square bg-gradient-to-br from-purple-900 to-blue-900"></div>
                <div class="p-3">
                    <h3 class="text-sm font-medium mb-1">Abstract Dreams</h3>
                    <p class="text-xs opacity-70 mb-2">by @artist_one</p>
                    <button class="w-full py-1.5 rounded text-xs font-medium" style="background: rgba(169, 221, 211, 0.2); border: 1px solid currentColor;">View</button>
                </div>
            </div>

            <div class="card" onclick="alert('Artwork viewer coming soon!')">
                <div class="aspect-square bg-gradient-to-br from-pink-900 to-orange-900"></div>
                <div class="p-3">
                    <h3 class="text-sm font-medium mb-1">Digital Sunset</h3>
                    <p class="text-xs opacity-70 mb-2">by @creator_two</p>
                    <button class="w-full py-1.5 rounded text-xs font-medium" style="background: rgba(169, 221, 211, 0.2); border: 1px solid currentColor;">View</button>
                </div>
            </div>

            <div class="card" onclick="alert('Artwork viewer coming soon!')">
                <div class="aspect-square bg-gradient-to-br from-green-900 to-teal-900"></div>
                <div class="p-3">
                    <h3 class="text-sm font-medium mb-1">Cyber Nature</h3>
                    <p class="text-xs opacity-70 mb-2">by @nature_artist</p>
                    <button class="w-full py-1.5 rounded text-xs font-medium" style="background: rgba(169, 221, 211, 0.2); border: 1px solid currentColor;">View</button>
                </div>
            </div>

            <div class="card" onclick="alert('Artwork viewer coming soon!')">
                <div class="aspect-square bg-gradient-to-br from-red-900 to-purple-900"></div>
                <div class="p-3">
                    <h3 class="text-sm font-medium mb-1">Neon Nights</h3>
                    <p class="text-xs opacity-70 mb-2">by @neon_creator</p>
                    <button class="w-full py-1.5 rounded text-xs font-medium" style="background: rgba(169, 221, 211, 0.2); border: 1px solid currentColor;">View</button>
                </div>
            </div>

            <div class="card" onclick="alert('Artwork viewer coming soon!')">
                <div class="aspect-square bg-gradient-to-br from-indigo-900 to-cyan-900"></div>
                <div class="p-3">
                    <h3 class="text-sm font-medium mb-1">Ocean Depths</h3>
                    <p class="text-xs opacity-70 mb-2">by @ocean_artist</p>
                    <button class="w-full py-1.5 rounded text-xs font-medium" style="background: rgba(169, 221, 211, 0.2); border: 1px solid currentColor;">View</button>
                </div>
            </div>

            <div class="card" onclick="alert('Artwork viewer coming soon!')">
                <div class="aspect-square bg-gradient-to-br from-yellow-900 to-red-900"></div>
                <div class="p-3">
                    <h3 class="text-sm font-medium mb-1">Fire & Gold</h3>
                    <p class="text-xs opacity-70 mb-2">by @gold_master</p>
                    <button class="w-full py-1.5 rounded text-xs font-medium" style="background: rgba(169, 221, 211, 0.2); border: 1px solid currentColor;">View</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.7.11?bundle'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.7.11?bundle'

        const projectId = '9fdc97f91c02d46a28ca9d185a9e58f2';
        const networks = [
            { chainId: 1, name: 'Ethereum', currency: 'ETH', explorerUrl: 'https://etherscan.io', rpcUrl: 'https://cloudflare-eth.com' },
            { chainId: 137, name: 'Polygon', currency: 'MATIC', explorerUrl: 'https://polygonscan.com', rpcUrl: 'https://polygon-rpc.com' },
            { chainId: 2025, name: 'Rialo Playground', currency: 'RIA', explorerUrl: 'https://playground.rialo.io', rpcUrl: 'https://playground.rialo.io/rpc' }
        ];
        const metadata = { name: 'ArtSoul Marketplace', description: 'Decentralized Art Marketplace', url: 'https://maysonkiller.github.io/artsoul-marketplace', icons: ['https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg'] };

        let modal = null;

        window.connectWallet = async () => { if (modal) await modal.open(); };

        async function initializeAppKit() {
            try {
                modal = createAppKit({
                    adapters: [new EthersAdapter()],
                    networks,
                    metadata,
                    projectId,
                    features: { socials: ['google', 'x', 'apple', 'discord'], email: true, onramp: true, swaps: true, analytics: true },
                    themeMode: 'dark',
                    themeVariables: { '--w3m-accent': '#a9ddd3' }
                });
                window.web3Modal = modal;
                modal.subscribeState((state) => {
                    if (state?.address) {
                        document.getElementById('navButtons').innerHTML = `
                            <a href="profile.html" class="opacity-70 hover:opacity-100">Profile</a>
                            <a href="upload.html" class="opacity-70 hover:opacity-100">Upload</a>
                            <button onclick="window.web3Modal?.disconnect()" class="btn-main">${state.address.slice(0, 6)}...${state.address.slice(-4)}</button>
                        `;
                    } else {
                        document.getElementById('navButtons').innerHTML = '<button onclick="connectWallet()" class="btn-main">Get Started</button>';
                    }
                });
                console.log('AppKit initialized');
            } catch (error) { console.error('AppKit init failed:', error); }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeAppKit);
        } else {
            initializeAppKit();
        }
    </script>
</body>
</html>
