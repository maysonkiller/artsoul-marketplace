<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="og:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="og:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="og:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="twitter:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="twitter:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="twitter:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: {
                            bg: '#f5f5f5',
                            text: '#1a1a1a',
                            accent: '#0066cc',
                        },
                        future: {
                            bg: '#0a0a0f',
                            text: '#e0e0ff',
                            neon: '#00ffff',
                            pink: '#ff00ff',
                            purple: '#8b00ff',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        /* Font */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Smooth transitions */
        * {
            transition: all 0.3s ease;
        }

        /* Futuristic Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Enhanced Hover Effects */
        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.5);
        }

        /* Classic hover effect */
        .classic-hover:hover {
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.3);
            transform: translateY(-4px);
        }

        /* Glowing Border Animation */
        @keyframes glow-border {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.8), 0 0 60px rgba(138, 0, 255, 0.5); }
        }
        .glow-border {
            animation: glow-border 3s ease-in-out infinite;
        }

        /* Material Icons */
        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
            h1 {
                font-size: 1.5rem !important;
            }
            h2 {
                font-size: 1.25rem !important;
            }
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            /* Make buttons easier to tap */
            button, a {
                min-height: 44px;
                min-width: 44px;
            }
            /* Improve text readability */
            p, span, div {
                -webkit-text-size-adjust: 100%;
            }
        }

        /* Neon effects */
        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
            animation: border-glow 3s ease-in-out infinite;
        }

        /* Animations */
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes border-glow {
            0%, 100% { box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            50% { box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 45px #00ffff; }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Hover effects */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
        }

        /* Gradient backgrounds */
        .gradient-brutal {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        }
        .gradient-future {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
        }

        /* Shimmer effect for loading */
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        /* Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Glassmorphism */
        .glass {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect } = React;

        const mockArtworks = [
            { id: 1, title: 'Soul Flame', artist: 'Maysonkiller', type: 'NFT', description: 'A burning representation of the digital soul', currentBid: 0.5, bids: [0.3, 0.4, 0.5], image: 'artwork-sample.jpg' },
            { id: 2, title: 'Neon Dreams', artist: 'CryptoArtist', type: 'Digital Art', description: 'Futuristic cityscape in neon colors', currentBid: 1.2, bids: [0.8, 1.0, 1.2] },
            { id: 3, title: 'Silent Choir', artist: 'Maysonkiller', type: 'Video', description: 'An audiovisual journey through silence', currentBid: 0.8, bids: [0.5, 0.7, 0.8] },
            { id: 4, title: 'Cosmic Melancholy', artist: 'StarGazer', type: 'GIF', description: 'Animated loop of cosmic emotions', currentBid: 0.3, bids: [0.1, 0.2, 0.3] },
            { id: 5, title: 'Real Canvas #1', artist: 'TraditionalArt', type: 'Physical Art', description: 'Oil painting on canvas - tokenized', currentBid: 2.5, bids: [1.5, 2.0, 2.5] },
            { id: 6, title: 'Pixel Poetry', artist: 'DigitalPoet', type: 'Image', description: 'Generative pixel art with hidden meaning', currentBid: 0.6, bids: [0.4, 0.5, 0.6] },
        ];

        function App() {
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'classic');
            const [walletConnected, setWalletConnected] = useState(false);
            const [walletAddress, setWalletAddress] = useState('');
            const [walletBalance, setWalletBalance] = useState('0.00');
            const [selectedNetwork, setSelectedNetwork] = useState('ethereum');
            const [walletModalOpen, setWalletModalOpen] = useState(false);
            const [filter, setFilter] = useState('all');
            const [bidAmount, setBidAmount] = useState('');
            const [timeLeft, setTimeLeft] = useState(3 * 24 * 60 * 60);
            const [allArtworks, setAllArtworks] = useState([]);
            const [selectedArtwork, setSelectedArtwork] = useState(null);
            const [viewerOpen, setViewerOpen] = useState(false);
            const [viewerArtwork, setViewerArtwork] = useState(null);
            const [zoom, setZoom] = useState(1);
            const [volume, setVolume] = useState(1);
            const [playbackRate, setPlaybackRate] = useState(1);

            const isClassic = theme === 'classic';
            const filters = ['all', 'NFT', 'Digital Art', 'Video', 'GIF', 'Physical Art', 'Image', 'Music'];

            // Get icon based on theme and type
            const getIcon = (type) => {
                const icons = {
                    classic: {
                        'all': '🎨',
                        'NFT': '🖼️',
                        'Digital Art': '💻',
                        'Video': '🎬',
                        'GIF': '🎞️',
                        'Physical Art': '🎭',
                        'Image': '📷',
                        'Music': '🎵'
                    },
                    future: {
                        'all': '⚡',
                        'NFT': '💎',
                        'Digital Art': '🌐',
                        'Video': '📡',
                        'GIF': '🔮',
                        'Physical Art': '🎪',
                        'Image': '✨',
                        'Music': '🎧'
                    }
                };
                return icons[isClassic ? 'classic' : 'future'][type] || '⭐';
            };

            // Save theme to localStorage
            useEffect(() => {
                localStorage.setItem('theme', theme);
            }, [theme]);

            // Load artworks from localStorage + mock data
            useEffect(() => {
                const uploadedArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                const combined = [...mockArtworks, ...uploadedArtworks];
                setAllArtworks(combined);
                setSelectedArtwork(combined[0]);
            }, []);

            const filteredArtworks = filter === 'all'
                ? allArtworks
                : allArtworks.filter(art => art.type === filter);

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (seconds) => {
                const days = Math.floor(seconds / (24 * 60 * 60));
                const hours = Math.floor((seconds % (24 * 60 * 60)) / (60 * 60));
                const mins = Math.floor((seconds % (60 * 60)) / 60);
                const secs = seconds % 60;
                return `${days}d ${hours}h ${mins}m ${secs}s`;
            };

            const handleConnectWallet = () => {
                setWalletModalOpen(true);
            };

            const connectMetaMask = async () => {
                try {
                    if (typeof window.ethereum !== 'undefined') {
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        const address = accounts[0];
                        setWalletAddress(address);
                        setWalletConnected(true);
                        setWalletModalOpen(false);

                        // Get balance
                        const balance = await window.ethereum.request({
                            method: 'eth_getBalance',
                            params: [address, 'latest']
                        });
                        const ethBalance = (parseInt(balance, 16) / 1e18).toFixed(4);
                        setWalletBalance(ethBalance);

                        localStorage.setItem('walletConnected', 'true');
                        localStorage.setItem('walletAddress', address);
                    } else {
                        alert('MetaMask is not installed. Please install MetaMask extension.');
                    }
                } catch (error) {
                    console.error('Error connecting to MetaMask:', error);
                    alert('Failed to connect to MetaMask');
                }
            };

            const connectWalletConnect = () => {
                alert('WalletConnect integration will be implemented with Web3Modal');
                // Mock connection
                const mockAddress = '0x' + Math.random().toString(36).substring(2, 10);
                setWalletAddress(mockAddress);
                setWalletConnected(true);
                setWalletBalance('1.2345');
                setWalletModalOpen(false);
                localStorage.setItem('walletConnected', 'true');
                localStorage.setItem('walletAddress', mockAddress);
            };

            const connectPhantom = async () => {
                try {
                    if (window.solana && window.solana.isPhantom) {
                        const response = await window.solana.connect();
                        const address = response.publicKey.toString();
                        setWalletAddress(address);
                        setWalletConnected(true);
                        setSelectedNetwork('solana');
                        setWalletModalOpen(false);
                        localStorage.setItem('walletConnected', 'true');
                        localStorage.setItem('walletAddress', address);
                    } else {
                        alert('Phantom wallet is not installed. Please install Phantom extension.');
                    }
                } catch (error) {
                    console.error('Error connecting to Phantom:', error);
                    alert('Failed to connect to Phantom');
                }
            };

            const disconnectWallet = () => {
                setWalletConnected(false);
                setWalletAddress('');
                setWalletBalance('0.00');
                localStorage.removeItem('walletConnected');
                localStorage.removeItem('walletAddress');
            };

            const switchNetwork = async (network) => {
                const networks = {
                    ethereum: { chainId: '0x1', name: 'Ethereum Mainnet' },
                    polygon: { chainId: '0x89', name: 'Polygon' },
                    bsc: { chainId: '0x38', name: 'BSC' },
                    solana: { name: 'Solana' }
                };

                if (network === 'solana') {
                    setSelectedNetwork('solana');
                    alert('Switched to Solana network');
                    return;
                }

                try {
                    if (typeof window.ethereum !== 'undefined') {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: networks[network].chainId }],
                        });
                        setSelectedNetwork(network);
                    }
                } catch (error) {
                    console.error('Error switching network:', error);
                    alert(`Failed to switch to ${networks[network].name}`);
                }
            };

            // Load wallet connection on mount
            useEffect(() => {
                const savedWallet = localStorage.getItem('walletConnected');
                const savedAddress = localStorage.getItem('walletAddress');
                if (savedWallet === 'true' && savedAddress) {
                    setWalletConnected(true);
                    setWalletAddress(savedAddress);
                }
            }, []);

            const handlePlaceBid = () => {
                if (!walletConnected) {
                    alert('Please connect your wallet first');
                    return;
                }
                const bid = parseFloat(bidAmount);
                if (!bid || bid <= selectedArtwork.currentBid) {
                    alert(`Bid must be higher than current floor: ${selectedArtwork.currentBid} ETH`);
                    return;
                }
                alert(`Bid placed: ${bid} ETH for "${selectedArtwork.title}"\n\nThis will be implemented with smart contracts`);
                setBidAmount('');
            };

            const bgClass = isClassic
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            // Loading state
            if (!selectedArtwork) {
                return (
                    <div className={`min-h-screen ${bgClass} flex items-center justify-center`}>
                        <div className="text-2xl">Loading...</div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isClassic ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-3">
                                        <a href="index.html" className={`text-3xl font-bold cursor-pointer ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            ArtSoul
                                        </a>
                                        <div className={`flex gap-2 p-1 rounded-lg ${isClassic ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                            <button
                                                onClick={() => setTheme('classic')}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'classic'
                                                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {isClassic ? '📋 Classic' : '📋'}
                                            </button>
                                            <button
                                                onClick={() => setTheme('future')}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'future'
                                                        ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {theme === 'future' ? '🚀 Future' : '🚀'}
                                            </button>
                                        </div>
                                    </div>
                                    <a
                                        href="docs.html#vision"
                                        className={`text-xs mt-1 hover:underline ${isClassic ? 'text-gray-600 hover:text-blue-600' : 'text-purple-300 hover:text-cyan-400'}`}
                                    >
                                        Decentralized Art Marketplace
                                    </a>
                                </div>

                                <div className="flex items-center gap-3 flex-wrap">
                                    <a
                                        href="upload.html"
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            isClassic
                                                ? 'bg-purple-600 text-white hover:bg-purple-700 shadow-lg classic-hover'
                                                : 'bg-gradient-to-r from-pink-500 to-purple-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {isClassic ? '📤' : '💫'} Upload
                                    </a>

                                    <a
                                        href="profile.html"
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            isClassic
                                                ? 'bg-gray-600 text-white hover:bg-gray-700 shadow-lg classic-hover'
                                                : 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {isClassic ? '👤' : '🎭'} Profile
                                    </a>

                                    <button
                                        onClick={walletConnected ? disconnectWallet : handleConnectWallet}
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            walletConnected
                                                ? isClassic
                                                    ? 'bg-green-600 text-white shadow-lg classic-hover'
                                                    : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover-lift'
                                                : isClassic
                                                    ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg classic-hover'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {walletConnected ? (
                                            <>
                                                {isClassic ? '✅' : '🔗'} {walletAddress.slice(0, 6)}...{walletAddress.slice(-4)}
                                                <span className="text-xs opacity-75">({walletBalance} ETH)</span>
                                            </>
                                        ) : (
                                            <>{isClassic ? '🔌 Connect' : '⚡ Connect'}</>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Gallery */}
                            <div className="lg:col-span-2">
                                <div className={`rounded-xl p-6 ${isClassic ? 'bg-white shadow-lg border border-gray-200' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'}`}>
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            Gallery
                                        </h2>
                                        <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                            {filteredArtworks.length} artworks
                                        </span>
                                    </div>

                                    <div className="flex flex-wrap gap-2 mb-6">
                                        {filters.map(f => (
                                            <button
                                                key={f}
                                                onClick={() => setFilter(f)}
                                                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 ${
                                                    filter === f
                                                        ? isClassic
                                                            ? 'bg-blue-600 text-white shadow-lg classic-hover'
                                                            : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg hover-lift'
                                                        : isClassic
                                                            ? 'bg-gray-100 text-gray-700 hover:bg-gray-200 classic-hover'
                                                            : 'bg-gray-800/50 text-gray-300 hover:bg-gray-700/50 hover-lift'
                                                }`}
                                            >
                                                {getIcon(f)} {f}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {filteredArtworks.length === 0 ? (
                                            <div className="col-span-2 text-center py-12">
                                                <p className={`text-xl mb-4 ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                                    No {filter === 'all' ? '' : filter} artworks yet
                                                </p>
                                                <input
                                                    type="file"
                                                    id="quickUpload"
                                                    className="hidden"
                                                    accept={filter === 'Music' ? 'audio/*' : filter === 'Video' ? 'video/*' : 'image/*'}
                                                    onChange={(e) => {
                                                        const file = e.target.files[0];
                                                        if (file) {
                                                            window.location.href = `upload.html?type=${filter === 'all' ? 'Image' : filter}`;
                                                        }
                                                    }}
                                                />
                                                <label
                                                    htmlFor="quickUpload"
                                                    className={`inline-block px-6 py-3 rounded-lg font-bold cursor-pointer ${
                                                        isClassic
                                                            ? 'bg-blue-600 text-white hover:bg-blue-700'
                                                            : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl'
                                                    }`}
                                                >
                                                    Upload {filter === 'all' ? 'Artwork' : filter}
                                                </label>
                                            </div>
                                        ) : (
                                            filteredArtworks.map((artwork, index) => (
                                            <div
                                                key={artwork.id}
                                                onClick={() => {
                                                    setSelectedArtwork(artwork);
                                                    setViewerArtwork(artwork);
                                                    setViewerOpen(true);
                                                    setZoom(1);
                                                }}
                                                style={{animationDelay: `${index * 0.1}s`}}
                                                className={`cursor-pointer rounded-lg overflow-hidden animate-fadeIn transition-all duration-300 ${
                                                    selectedArtwork?.id === artwork.id
                                                        ? isClassic
                                                            ? 'ring-4 ring-blue-600 shadow-xl scale-105'
                                                            : 'ring-4 ring-cyan-400 shadow-2xl shadow-cyan-500/50 scale-105'
                                                        : isClassic
                                                            ? 'bg-white shadow-md hover:shadow-xl hover:shadow-blue-200 hover:scale-105'
                                                            : 'bg-gray-800/50 backdrop-blur-sm hover:shadow-2xl hover:shadow-cyan-500/50 hover:scale-105 hover:ring-2 hover:ring-cyan-400/50'
                                                }`}
                                            >

                                    <div className="space-y-6">
                                        {/* Title & Artist */}
                                        <div className="bg-gray-900/80 backdrop-blur rounded-xl p-6 border border-cyan-500/30">
                                            <h1 className="text-4xl font-bold text-cyan-400 mb-2">{viewerArtwork.title}</h1>
                                            <p className="text-xl text-gray-400">by {viewerArtwork.artist}</p>
                                        </div>

                                        {/* Voting/Bidding Section */}
                                        <div className="bg-gradient-to-br from-cyan-900/30 to-purple-900/30 backdrop-blur rounded-xl p-6 border border-cyan-500/30">
                                            <h2 className="text-2xl font-bold text-cyan-400 mb-4">🗳️ Vote for Value</h2>
                                            <div className="space-y-4">
                                                <div className="bg-black/50 rounded-lg p-4">
                                                    <div className="text-sm text-gray-400 mb-1">Current Floor Price</div>
                                                    <div className="text-3xl font-bold text-cyan-400">{viewerArtwork.currentBid} ETH</div>
                                                    <div className="text-xs text-purple-300 mt-1">{viewerArtwork.bids.length} community votes</div>
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-bold text-cyan-300 mb-2">Place Your Vote (Bid)</label>
                                                    <input
                                                        type="number"
                                                        step="0.01"
                                                        value={bidAmount}
                                                        onChange={(e) => setBidAmount(e.target.value)}
                                                        placeholder={`Min: ${viewerArtwork.currentBid + 0.1} ETH`}
                                                        className="w-full px-4 py-3 rounded-lg bg-gray-800/50 border border-cyan-500/30 text-cyan-100 focus:ring-2 focus:ring-cyan-400 outline-none"
                                                    />
                                                </div>

                                                <button
                                                    onClick={handlePlaceBid}
                                                    disabled={!walletConnected}
                                                    className={`w-full py-4 rounded-lg font-bold text-lg transform hover:scale-105 transition-all ${
                                                        walletConnected
                                                            ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl hover:shadow-cyan-500/50'
                                                            : 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                                    }`}
                                                >
                                                    {walletConnected ? '🗳️ Vote & Bid' : '🔒 Connect Wallet to Vote'}
                                                </button>
                                            </div>
                                        </div>

                                        {/* Purchase Section */}
                                        <div className="bg-gradient-to-br from-purple-900/30 to-pink-900/30 backdrop-blur rounded-xl p-6 border border-purple-500/30">
                                            <h2 className="text-2xl font-bold text-purple-400 mb-4">💎 Purchase</h2>
                                            <div className="space-y-4">
                                                <div className="bg-black/50 rounded-lg p-4">
                                                    <div className="text-sm text-gray-400 mb-1">Auction Ends In</div>
                                                    <div className="text-2xl font-bold text-purple-400">{formatTime(timeLeft)}</div>
                                                </div>

                                                <button
                                                    disabled={!walletConnected}
                                                    className={`w-full py-4 rounded-lg font-bold text-lg transform hover:scale-105 transition-all ${
                                                        walletConnected
                                                            ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:shadow-2xl hover:shadow-purple-500/50'
                                                            : 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                                    }`}
                                                >
                                                    {walletConnected ? '🛒 Buy Now' : '🔒 Connect Wallet to Buy'}
                                                </button>

                                                <p className="text-xs text-gray-400 text-center">
                                                    ℹ️ Buying at floor price supports the artist directly
                                                </p>
                                            </div>
                                        </div>

                                        {/* Recent Bids */}
                                        <div className="bg-gray-900/80 backdrop-blur rounded-xl p-6 border border-cyan-500/30">
                                            <h3 className="text-xl font-bold text-cyan-400 mb-4">📊 Recent Votes</h3>
                                            <div className="space-y-2">
                                                {viewerArtwork.bids.slice().reverse().map((bid, index) => (
                                                    <div
                                                        key={index}
                                                        className="flex items-center justify-between p-3 rounded-lg bg-gray-800/50 border border-cyan-500/20"
                                                    >
                                                        <span className="text-sm text-gray-400">
                                                            0x{Math.random().toString(36).substring(2, 8)}...
                                                        </span>
                                                        <span className="text-sm font-bold text-cyan-400">
                                                            {bid} ETH
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Description */}
                                        <div className="bg-gray-900/80 backdrop-blur rounded-xl p-6 border border-cyan-500/30">
                                            <h3 className="text-xl font-bold text-cyan-400 mb-3">📝 Description</h3>
                                            <p className="text-gray-300 leading-relaxed">{viewerArtwork.description}</p>

                                            <div className="mt-6 pt-6 border-t border-gray-700 space-y-2">
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-gray-400">Type:</span>
                                                    <span className="text-cyan-400 font-bold">{viewerArtwork.type}</span>
                                                </div>
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-gray-400">Artist:</span>
                                                    <span className="text-cyan-400 font-bold">{viewerArtwork.artist}</span>
                                                </div>
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-gray-400">Total Votes:</span>
                                                    <span className="text-cyan-400 font-bold">{viewerArtwork.bids.length}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
