<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unified-styles.css?v=2">
    <link rel="stylesheet" href="button-effects.css?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('artsoul_theme') || 'classic';
            document.documentElement.className = theme;
            // Wait for body to be available
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.className = theme;
                });
            } else {
                document.body.className = theme;
            }
        })();
    </script>
    <script src="theme-sync.js"></script>
    <script src="modal-system.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script src="avatar-dropdown.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #a9ddd3;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        /* Button styles moved to unified-styles.css */

        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        /* Button hover effects moved to button-effects.css */

        /* Animation keyframes moved to button-effects.css */

        /* Logo styles */
        /* Site logo styles */
        .site-logo {
            height: 100px;
            width: auto;
            display: block;
            transition: all 0.3s;
            border-radius: 12px;
        }

        .classic .site-logo {
            filter: drop-shadow(0 0 8px rgba(169, 221, 211, 0.4));
            animation: logoLevitate 4s ease-in-out infinite;
        }

        .future .site-logo {
            border: 3px solid transparent;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6), 0 0 40px rgba(191, 0, 255, 0.4);
            animation: logoBorderGlow 3s ease-in-out infinite, logoLevitate 4s ease-in-out infinite;
        }

        @keyframes logoLevitate {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes logoBorderGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 245, 255, 0.8), 0 0 40px rgba(191, 0, 255, 0.6), inset 0 0 20px rgba(0, 245, 255, 0.2);
                border-color: rgba(0, 245, 255, 0.6);
            }
            50% {
                box-shadow: 0 0 30px rgba(191, 0, 255, 0.8), 0 0 60px rgba(0, 245, 255, 0.6), inset 0 0 30px rgba(191, 0, 255, 0.2);
                border-color: rgba(191, 0, 255, 0.6);
            }
        }

        .logo-link:hover .site-logo {
            animation-play-state: paused;
        }

        .classic .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 15px rgba(169, 221, 211, 0.8));
        }

        .future .logo-link:hover .site-logo {
            box-shadow: 0 0 40px rgba(0, 245, 255, 1), 0 0 80px rgba(191, 0, 255, 0.8), inset 0 0 40px rgba(191, 0, 255, 0.4);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        header .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        /* Button effects for Future mode moved to button-effects.css */
        /* Glitch animation moved to button-effects.css */
        /* Gradient flow animation moved to unified-styles.css */

        /* Roadmap timeline gradient flow */
        .future .timeline-line {
            background: linear-gradient(90deg,
                var(--accent-future) 0%,
                var(--neon-purple) 25%,
                var(--accent-future) 50%,
                var(--neon-purple) 75%,
                var(--accent-future) 100%);
            background-size: 200% 100%;
            animation: lineGlow 3s linear infinite;
        }

        @keyframes lineGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Pulsing dots on roadmap */
        .future .timeline-dot {
            animation: dotPulse 2s ease-in-out infinite;
            transform-origin: center center;
        }

        @keyframes dotPulse {
            0%, 100% {
                box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--neon-purple);
            }
            50% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
            }
        }

        /* Floating animation for roadmap items in Future mode */
        .future .relative.mb-12:nth-child(2) {
            animation: floatItem1 8s ease-in-out infinite;
        }

        .future .relative.mb-12:nth-child(3) {
            animation: floatItem2 10s ease-in-out infinite;
        }

        .future .relative.mb-12:nth-child(4) {
            animation: floatItem3 12s ease-in-out infinite;
        }

        .future .relative:nth-child(5) {
            animation: floatItem4 9s ease-in-out infinite;
        }

        @keyframes floatItem1 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-15px) translateX(10px); }
            50% { transform: translateY(-8px) translateX(-5px); }
            75% { transform: translateY(-20px) translateX(8px); }
        }

        @keyframes floatItem2 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-12px) translateX(-8px); }
            50% { transform: translateY(-18px) translateX(12px); }
            75% { transform: translateY(-5px) translateX(-10px); }
        }

        @keyframes floatItem3 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-10px) translateX(15px); }
            50% { transform: translateY(-22px) translateX(-8px); }
            75% { transform: translateY(-12px) translateX(10px); }
        }

        @keyframes floatItem4 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-18px) translateX(-12px); }
            50% { transform: translateY(-10px) translateX(15px); }
            75% { transform: translateY(-15px) translateX(-5px); }
        }

        /* Theme toggle styles moved to unified-styles.css */

        .network-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .classic .network-badge {
            background: rgba(232, 227, 213, 0.1);
            border: 1px solid var(--accent-classic);
        }

        .future .network-badge {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent-future);
            position: relative;
            overflow: hidden;
        }

        .future .network-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent);
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            .network-badge {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .classic .tooltip-text {
            background: var(--text-classic);
            color: var(--bg-classic);
        }

        .future .tooltip-text {
            background: var(--accent-future);
            color: #000000;
        }

        .tooltip-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .icon-svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Roadmap animations for Future mode */
        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--accent-future);
                opacity: 1;
            }
            50% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
                opacity: 0.8;
            }
        }

        @keyframes lineGlow {
            0%, 100% {
                background: linear-gradient(180deg, var(--accent-future) 0%, var(--neon-purple) 100%);
            }
            50% {
                background: linear-gradient(180deg, var(--neon-purple) 0%, var(--accent-future) 100%);
            }
        }

        .future .roadmap-dot {
            animation: neonPulse 2s ease-in-out infinite;
        }

        .future .roadmap-line {
            animation: lineGlow 3s ease-in-out infinite;
        }

        /* Devnet Banner */
        .devnet-banner {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            text-decoration: none;
            transition: all 0.3s;
        }

        .classic .devnet-banner {
            background: rgba(169, 221, 211, 0.15);
            border: 1px solid var(--accent-classic);
            color: var(--accent-classic);
        }

        .classic .devnet-banner:hover {
            background: rgba(169, 221, 211, 0.25);
            border-color: var(--text-classic);
        }

        .future .devnet-banner {
            background: rgba(0, 245, 255, 0.15);
            border: 1px solid var(--accent-future);
            color: var(--accent-future);
        }

        .future .devnet-banner:hover {
            background: rgba(0, 245, 255, 0.25);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="logo-link">
                        <img src="ARTSOULlogo.png" alt="ArtSoul" class="site-logo">
                    </a>
                </div>
                <div class="flex items-center gap-3">
                    <div id="networkBadge"></div>
                    <div class="flex items-center gap-3" id="navButtons">
                        <button onclick="safeConnectWallet()" id="connectBtn" class="btn-main">Get Started</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function DocsApp() {
            const [isClassic, setIsClassic] = useState(true);

            // Theme is now handled by theme-sync.js
            useEffect(() => {
                const savedTheme = window.ThemeSync?.getTheme() || 'classic';
                setIsClassic(savedTheme === 'classic');
            }, []);

            const sections = [
                {
                    id: 'rialo',
                    title: 'Rialo Playground',
                    content: 'Rialo Playground is a testnet devnet network designed for developers to build and test blockchain applications without using real money. All transactions are free, making it perfect for development and testing.\n\nChain ID: 2025\nNative Currency: RIA\nRPC URL: https://playground.rialo.io/rpc\nBlock Explorer: https://playground.rialo.io\n\nFollow Rialo on X: https://x.com/RialoHQ'
                },
                {
                    title: 'Getting Started',
                    content: 'ArtSoul is a decentralized art marketplace where community determines value. Connect your wallet to start exploring, bidding, and uploading artwork.'
                },
                {
                    title: 'Triple Valuation System',
                    content: 'Every artwork has three values: Creator Value (set by artist), Community Value (average from voters), and System Value (AI-based on 3-day auction data).'
                },
                {
                    title: 'Uploading Artwork',
                    content: 'Connect your wallet, complete your profile, then navigate to Upload. Supported formats: Images, Videos, Music, GIFs. Set your initial price and description.'
                },
                {
                    title: 'Bidding & Auctions',
                    content: 'Place bids on artworks you love. The 3-day auction system ensures fair pricing. Highest bidder wins when auction ends.'
                },
                {
                    title: 'Social Integration',
                    content: 'Link your X (Twitter), Discord, and VK accounts in your profile. Share artworks directly to social media with beautiful preview cards.'
                },
                {
                    title: 'Supported Networks',
                    content: 'Base, Ethereum, Rialo, Base Sepolia (testnet), Sepolia (testnet). Switch networks anytime via the Network Badge.'
                }
            ];

            return (
                <main className="container mx-auto px-4 py-12">
                    <div className="text-center mb-12 animate-fadeIn">
                        <h1 className="text-5xl font-light mb-4">Documentation</h1>
                        <p className="text-xl font-light opacity-80">Everything you need to know about ArtSoul</p>
                    </div>

                    <div className="max-w-4xl mx-auto space-y-8">
                        {sections.map((section, index) => {
                            let formattedContent = section.content.replace(/\n/g, '<br>');

                            // Make URLs clickable
                            formattedContent = formattedContent.replace(
                                /(https?:\/\/[^\s<]+)/g,
                                '<a href="$1" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; opacity: 1;">$1</a>'
                            );

                            return (
                                <div key={index} id={section.id || ''} className={`p-6 rounded-xl ${isClassic ? 'bg-gray-900/30 border border-gray-700' : 'bg-cyan-900/10 border border-cyan-500/30'} animate-fadeIn`} style={{animationDelay: `${index * 0.1}s`}}>
                                    <h2 className="text-2xl font-semibold mb-4">{section.title}</h2>
                                    {section.id === 'rialo' ? (
                                        <div className="flex flex-col md:flex-row gap-6 items-start">
                                            <p className="opacity-80 leading-relaxed flex-1" dangerouslySetInnerHTML={{__html: formattedContent}}></p>
                                            <img src="./1080x360.png" alt="Rialo Playground" className="w-full md:max-w-[40%] rounded-xl object-cover" />
                                        </div>
                                    ) : (
                                        <p className="opacity-80 leading-relaxed" dangerouslySetInnerHTML={{__html: formattedContent}}></p>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Roadmap Section */}
                    <div className="mt-20 mb-16">
                        <h2 className="text-4xl font-light mb-12 text-center">Roadmap</h2>
                        <div className="relative max-w-4xl mx-auto">
                            {/* Timeline line */}
                            <div className={`timeline-line absolute left-1/2 transform -translate-x-1/2 h-full w-0.5 ${isClassic ? 'opacity-30' : ''}`} style={{background: isClassic ? 'currentColor' : 'linear-gradient(180deg, var(--accent-future) 0%, var(--neon-purple) 100%)'}}></div>

                            {/* Q2 2026 - Completed */}
                            <div className="relative mb-12 flex items-center">
                                <div className="w-1/2 pr-8 text-right">
                                    <div className={`inline-block p-4 rounded-lg ${isClassic ? 'bg-gray-900/30 border border-gray-700' : 'bg-cyan-900/10 border border-cyan-500/30'}`}>
                                        <h4 className="font-semibold mb-2">Q2 2026 - Completed</h4>
                                        <p className="text-sm opacity-70">Wallet integration, User profiles, Multi-format upload, IPFS storage, Community voting, Gallery with filters</p>
                                    </div>
                                </div>
                                <div className={`timeline-dot absolute left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full`} style={{background: 'currentColor'}}></div>
                                <div className="w-1/2 pl-8"></div>
                            </div>

                            {/* Q3 2026 - Current */}
                            <div className="relative mb-12 flex items-center">
                                <div className="w-1/2 pr-8"></div>
                                <div className={`timeline-dot absolute left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full`} style={{background: 'currentColor'}}></div>
                                <div className="w-1/2 pl-8">
                                    <div className={`inline-block p-4 rounded-lg ${isClassic ? 'bg-gray-900/30 border border-gray-700' : 'bg-cyan-900/10 border border-cyan-500/30'}`}>
                                        <h4 className="font-semibold mb-2">Q3 2026 - Current</h4>
                                        <p className="text-sm opacity-70">Auction V2 contracts (testnet), Testing & optimization, Security audit, UI improvements</p>
                                    </div>
                                </div>
                            </div>

                            {/* Q4 2026 */}
                            <div className="relative mb-12 flex items-center">
                                <div className="w-1/2 pr-8 text-right">
                                    <div className={`inline-block p-4 rounded-lg ${isClassic ? 'bg-gray-900/30 border border-gray-700' : 'bg-cyan-900/10 border border-cyan-500/30'}`}>
                                        <h4 className="font-semibold mb-2">Q4 2026</h4>
                                        <p className="text-sm opacity-70">Base Mainnet deployment, Rialo integration, Marketing campaign, Community building</p>
                                    </div>
                                </div>
                                <div className={`timeline-dot absolute left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full`} style={{background: 'currentColor'}}></div>
                                <div className="w-1/2 pl-8"></div>
                            </div>

                            {/* 2027 */}
                            <div className="relative flex items-center">
                                <div className="w-1/2 pr-8"></div>
                                <div className={`timeline-dot absolute left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full`} style={{background: 'currentColor'}}></div>
                                <div className="w-1/2 pl-8">
                                    <div className={`inline-block p-4 rounded-lg ${isClassic ? 'bg-gray-900/30 border border-gray-700' : 'bg-cyan-900/10 border border-cyan-500/30'}`}>
                                        <h4 className="font-semibold mb-2">Q1 2027</h4>
                                        <p className="text-sm opacity-70">PWA (Progressive Web App), Advanced analytics, API for developers, Gallery partnerships</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="text-center mt-16">
                        <a href="index.html" className="btn-main inline-block">
                            Back to Gallery
                        </a>
                    </div>
                </main>
            );
        }

        ReactDOM.render(<DocsApp />, document.getElementById('app'));
    </script>

    <!-- Theme is now handled by theme-sync.js -->
</body>
</html>
