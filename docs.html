<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="supabase-client.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #e8e3d5;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        .classic .btn-main {
            background: var(--text-classic);
            color: var(--bg-classic);
            border: 1px solid var(--text-classic);
            padding: 0.5rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .classic .btn-main:hover {
            background: transparent;
            color: var(--text-classic);
        }

        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .future .btn-main {
            background: linear-gradient(135deg, var(--accent-future) 0%, var(--neon-purple) 100%);
            color: #000000;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .future .btn-main:hover {
            animation: neonPulse 0.3s infinite;
            transform: scale(1.05);
            filter: brightness(1.3);
        }

        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--neon-purple);
            }
            50% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
            }
        }

        .theme-toggle {
            display: flex;
            gap: 0.5rem;
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .classic .theme-toggle {
            background: rgba(232, 227, 213, 0.1);
        }

        .future .theme-toggle {
            background: rgba(0, 245, 255, 0.1);
        }

        .theme-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: all 0.3s;
            color: currentColor;
        }

        .classic .theme-btn.active-classic {
            background: var(--accent-classic);
            color: var(--bg-classic);
        }

        .future .theme-btn.active-future {
            background: linear-gradient(135deg, var(--accent-future), var(--neon-purple));
            color: #000000;
        }

        .network-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .classic .network-badge {
            background: rgba(232, 227, 213, 0.1);
            border: 1px solid var(--accent-classic);
        }

        .future .network-badge {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent-future);
            position: relative;
            overflow: hidden;
        }

        .future .network-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent);
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            .network-badge {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .classic .tooltip-text {
            background: var(--text-classic);
            color: var(--bg-classic);
        }

        .future .tooltip-text {
            background: var(--accent-future);
            color: #000000;
        }

        .tooltip-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .icon-svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Devnet Banner */
        .devnet-banner {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            text-decoration: none;
            transition: all 0.3s;
        }

        .classic .devnet-banner {
            background: rgba(169, 221, 211, 0.15);
            border: 1px solid var(--accent-classic);
            color: var(--accent-classic);
        }

        .classic .devnet-banner:hover {
            background: rgba(169, 221, 211, 0.25);
            border-color: var(--text-classic);
        }

        .future .devnet-banner {
            background: rgba(0, 245, 255, 0.15);
            border: 1px solid var(--accent-future);
            color: var(--accent-future);
        }

        .future .devnet-banner:hover {
            background: rgba(0, 245, 255, 0.25);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }
    </style>
</head>
<body class="classic">
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-2xl font-light tracking-wide">ArtSoul</a>
                    <div class="theme-toggle">
                        <button onclick="setTheme('classic')" id="classicBtn" class="theme-btn active-classic">
                            Classic
                        </button>
                        <button onclick="setTheme('future')" id="futureBtn" class="theme-btn">
                            Future
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="networkBadge"></div>
                    <div class="flex items-center gap-3" id="navButtons">
                        <button onclick="window.connectWallet()" class="btn-main">Get Started</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function DocsApp() {
            const [isClassic, setIsClassic] = useState(true);

            useEffect(() => {
                const savedTheme = localStorage.getItem('theme') || 'classic';
                setIsClassic(savedTheme === 'classic');
                document.body.className = savedTheme;
            }, []);

            const sections = [
                {
                    id: 'rialo',
                    title: 'Rialo Playground',
                    content: 'Rialo Playground is a testnet devnet network designed for developers to build and test blockchain applications without using real money. All transactions are free, making it perfect for development and testing.\n\nChain ID: 2025\nNative Currency: RIA\nRPC URL: https://playground.rialo.io/rpc\nBlock Explorer: https://playground.rialo.io\n\nFollow Rialo on X: https://x.com/RialoHQ'
                },
                {
                    title: 'Getting Started',
                    content: 'ArtSoul is a decentralized art marketplace where community determines value. Connect your wallet to start exploring, bidding, and uploading artwork.'
                },
                {
                    title: 'Triple Valuation System',
                    content: 'Every artwork has three values: Creator Value (set by artist), Community Value (average from voters), and System Value (AI-based on 3-day auction data).'
                },
                {
                    title: 'Uploading Artwork',
                    content: 'Connect your wallet, complete your profile, then navigate to Upload. Supported formats: Images, Videos, Music, GIFs. Set your initial price and description.'
                },
                {
                    title: 'Bidding & Auctions',
                    content: 'Place bids on artworks you love. The 3-day auction system ensures fair pricing. Highest bidder wins when auction ends.'
                },
                {
                    title: 'Social Integration',
                    content: 'Link your X (Twitter), Discord, and VK accounts in your profile. Share artworks directly to social media with beautiful preview cards.'
                },
                {
                    title: 'Supported Networks',
                    content: 'Ethereum, Polygon, BSC, Base, Arbitrum, Optimism, Sepolia, Rialo Playground. Switch networks anytime via the Network Badge.'
                }
            ];

            return (
                <main className="container mx-auto px-4 py-12">
                    <div className="text-center mb-12 animate-fadeIn">
                        <h1 className="text-5xl font-light mb-4">Documentation</h1>
                        <p className="text-xl font-light opacity-80">Everything you need to know about ArtSoul</p>
                    </div>

                    <div className="max-w-4xl mx-auto space-y-8">
                        {sections.map((section, index) => {
                            let formattedContent = section.content.replace(/\n/g, '<br>');

                            // Make URLs clickable
                            formattedContent = formattedContent.replace(
                                /(https?:\/\/[^\s<]+)/g,
                                '<a href="$1" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; opacity: 1;">$1</a>'
                            );

                            return (
                                <div key={index} id={section.id || ''} className={`p-6 rounded-xl ${isClassic ? 'bg-gray-900/30 border border-gray-700' : 'bg-cyan-900/10 border border-cyan-500/30'} animate-fadeIn`} style={{animationDelay: `${index * 0.1}s`}}>
                                    <h2 className="text-2xl font-semibold mb-4">{section.title}</h2>
                                    {section.id === 'rialo' ? (
                                        <div className="flex flex-col md:flex-row gap-6 items-start">
                                            <p className="opacity-80 leading-relaxed flex-1" dangerouslySetInnerHTML={{__html: formattedContent}}></p>
                                            <img src="1080x360.png" alt="Rialo Playground" className="w-full md:max-w-[40%] rounded-xl object-cover" />
                                        </div>
                                    ) : (
                                        <p className="opacity-80 leading-relaxed" dangerouslySetInnerHTML={{__html: formattedContent}}></p>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="text-center mt-16">
                        <a href="index.html" className="btn-main inline-block">
                            Back to Gallery
                        </a>
                    </div>
                </main>
            );
        }

        ReactDOM.render(<DocsApp />, document.getElementById('app'));
    </script>

    <script>
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);

            const classicBtn = document.getElementById('classicBtn');
            const futureBtn = document.getElementById('futureBtn');

            if (theme === 'classic') {
                classicBtn.className = 'theme-btn active-classic';
                futureBtn.className = 'theme-btn';
            } else {
                classicBtn.className = 'theme-btn';
                futureBtn.className = 'theme-btn active-future';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'classic';
            setTheme(savedTheme);
        });
    </script>

    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.7.11?bundle'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.7.11?bundle'
        import { mainnet, polygon, bsc, base, arbitrum, optimism, sepolia } from 'https://esm.sh/@reown/appkit/networks?bundle'

        const projectId = '9fdc97f91c02d46a28ca9d185a9e58f2';

        const rialoPlayground = {
            id: 2025,
            name: 'Rialo Playground',
            nativeCurrency: { name: 'RIA', symbol: 'RIA', decimals: 18 },
            rpcUrls: { default: { http: ['https://playground.rialo.io/rpc'] } },
            blockExplorers: { default: { name: 'Rialo Explorer', url: 'https://playground.rialo.io' } }
        };

        const networks = [mainnet, polygon, bsc, base, arbitrum, optimism, sepolia, rialoPlayground];
        const metadata = {
            name: 'ArtSoul Marketplace',
            description: 'Decentralized Art Marketplace',
            url: 'https://maysonkiller.github.io/artsoul-marketplace',
            icons: ['https://maysonkiller.github.io/artsoul-marketplace/artwork-sample.jpg']
        };

        let modal = null;
        let currentNetwork = null;
        let currentBalance = '0.00';

        const networkMap = {
            1: { name: 'Ethereum', currency: 'ETH' },
            137: { name: 'Polygon', currency: 'MATIC' },
            56: { name: 'BSC', currency: 'BNB' },
            8453: { name: 'Base', currency: 'ETH' },
            42161: { name: 'Arbitrum', currency: 'ETH' },
            10: { name: 'Optimism', currency: 'ETH' },
            11155111: { name: 'Sepolia', currency: 'ETH' },
            2025: { name: 'Rialo Playground', currency: 'RIA' }
        };

        function updateNetworkBadge(state) {
            const networkBadgeContainer = document.getElementById('networkBadge');
            if (!networkBadgeContainer) return;
            if (state?.address && state?.chainId) {
                const network = networkMap[state.chainId] || { name: 'Unknown', currency: 'ETH' };
                currentNetwork = network;
                if (window.ethereum) {
                    window.ethereum.request({ method: 'eth_getBalance', params: [state.address, 'latest'] })
                        .then(balance => {
                            currentBalance = (parseInt(balance, 16) / 1e18).toFixed(4);
                            renderNetworkBadge();
                        })
                        .catch(() => {
                            currentBalance = '0.00';
                            renderNetworkBadge();
                        });
                } else {
                    renderNetworkBadge();
                }
            } else {
                networkBadgeContainer.innerHTML = '';
            }
        }

        function renderNetworkBadge() {
            const networkBadgeContainer = document.getElementById('networkBadge');
            if (!networkBadgeContainer || !currentNetwork) return;
            networkBadgeContainer.innerHTML = `<div class="network-badge" onclick="window.web3Modal?.open({ view: 'Networks' })"><span class="network-name">${currentNetwork.name}</span><span class="balance-amount">${currentBalance} ${currentNetwork.currency}</span></div>`;
        }

        function updateNavButtons(state) {
            const navButtons = document.getElementById('navButtons');
            if (!navButtons) return;
            const hasProfile = localStorage.getItem('userProfile');
            const profileNotification = hasProfile ? '' : '<div style="position: absolute; top: 0; right: 0; width: 8px; height: 8px; background: #ff4444; border-radius: 50%; animation: pulse 2s infinite;"></div>';
            navButtons.innerHTML = `<div class="tooltip-wrap" style="position: relative;"><a href="profile.html" class="p-2 inline-block"><svg viewBox="0 0 24 24" fill="none" class="w-6 h-6" style="color: currentColor;"><circle cx="12" cy="12" r="9" stroke="currentColor" class="icon-svg"/><path d="M12 6L12 12L16 16" stroke="currentColor" class="icon-svg"/></svg></a>${profileNotification}<div class="tooltip-text">My Profile</div></div><div class="tooltip-wrap"><a href="upload.html" class="p-2 inline-block"><svg viewBox="0 0 24 24" fill="none" class="w-6 h-6" style="color: currentColor;"><path d="M12 3L12 21M12 3L6 9M12 3L18 9M3 15L3 21L21 21L21 15" stroke="currentColor" class="icon-svg"/></svg></a><div class="tooltip-text">Upload NFT</div></div><button onclick="window.web3Modal?.disconnect()" class="btn-main" style="padding: 0.5rem 1rem; font-size: 0.875rem;">${state.address.slice(0, 6)}...${state.address.slice(-4)}</button>`;
        }

        function resetNavButtons() {
            const navButtons = document.getElementById('navButtons');
            const networkBadge = document.getElementById('networkBadge');
            if (!navButtons) return;
            navButtons.innerHTML = '<button onclick="window.connectWallet()" class="btn-main">Get Started</button>';
            if (networkBadge) networkBadge.innerHTML = '';
        }

        window.connectWallet = async () => {
            if (modal) await modal.open();
        };

        async function initializeAppKit() {
            try {
                modal = createAppKit({
                    adapters: [new EthersAdapter()],
                    networks,
                    metadata,
                    projectId,
                    features: {
                        socials: ['google', 'x', 'apple', 'discord'],
                        email: true,
                        onramp: true,
                        swaps: true,
                        analytics: true
                    },
                    themeMode: 'dark',
                    themeVariables: {
                        '--w3m-accent': '#00f5ff',
                        '--w3m-color-mix': '#bf00ff'
                    }
                });

                window.web3Modal = modal;
                window.connectWallet = async () => {
                    if (modal) await modal.open();
                };

                modal.subscribeState((state) => {
                    if (state?.address) {
                        updateNavButtons(state);
                        updateNetworkBadge(state);
                    } else {
                        resetNavButtons();
                    }
                });

                // Polling fallback for desktop wallet extensions
                setInterval(() => {
                    if (!modal) return;

                    let addr = null;

                    // Try multiple methods to get address
                    if (modal.getAddress) {
                        addr = modal.getAddress();
                    } else if (modal.getAccount) {
                        const account = modal.getAccount();
                        addr = account?.address;
                    } else {
                        const state = modal.getState();
                        addr = state?.address;
                    }

                    if (addr && addr !== window.currentWalletAddress) {
                        console.log('🔄 Polling detected address:', addr);
                        window.currentWalletAddress = addr;

                        const stateWithAddress = {
                            address: addr,
                            chainId: null,
                            isConnected: true
                        };

                        updateNavButtons(stateWithAddress);
                        updateNetworkBadge(stateWithAddress);
                    }
                }, 2000);

                console.log('✅ AppKit initialized on docs.html');
            } catch (error) {
                console.error('⚠️ AppKit init failed:', error);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeAppKit);
        } else {
            initializeAppKit();
        }
    </script>
</body>
</html>
