<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unified-styles.css">
    <link rel="stylesheet" href="button-effects.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="theme-sync.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #a9ddd3;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .gallery-item {
            transition: all 0.3s ease;
        }

        /* Classic Mode */
        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        .classic .btn-main {
            background: var(--accent-classic);
            color: var(--bg-classic);
            border: 1px solid var(--accent-classic);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .classic .btn-main:hover {
            background: transparent;
            color: var(--accent-classic);
        }

        .classic .gallery-item:hover {
            transform: translateY(-8px);
            border-color: var(--accent-classic);
        }

        /* Future Mode */
        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .future .btn-main {
            background: linear-gradient(135deg, var(--accent-future) 0%, var(--neon-purple) 100%);
            color: #000000;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            border: none;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .future .btn-main:hover {
            transform: scale(1.05);
            filter: brightness(1.3);
        }

        .future .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .future .neon-border {
            box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--accent-future);
        }

        .future .gallery-item:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-purple);
        }

        /* Theme toggle styles moved to unified-styles.css */

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        header .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        .site-logo {
            height: 100px;
            width: auto;
            display: block;
            transition: all 0.3s;
        }

        .classic .site-logo {
            filter: drop-shadow(0 0 8px rgba(169, 221, 211, 0.4));
        }

        .future .site-logo {
            filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.6)) drop-shadow(0 0 20px rgba(191, 0, 255, 0.4));
        }

        .logo-link:hover .site-logo {
            transform: scale(1.05);
        }

        .classic .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 12px rgba(169, 221, 211, 0.6));
        }

        .future .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 18px rgba(0, 245, 255, 0.8)) drop-shadow(0 0 30px rgba(191, 0, 255, 0.6));
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GALLERY_TYPES = [
            { id: 'nft', label: 'NFT', icon: '', fileType: 'image' },
            { id: 'video', label: 'Video', icon: '', fileType: 'video' },
            { id: 'music', label: 'Music', icon: '', fileType: 'music' },
            { id: 'gif', label: 'GIF', icon: '', fileType: 'gif' },
        ];

        function ProfilePage() {
            const [theme, setTheme] = useState(() => window.ThemeSync?.getTheme() || 'classic');
            const [profile, setProfile] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [selectedGallery, setSelectedGallery] = useState('nft');
            const [myArtworks, setMyArtworks] = useState([]);
            const [loading, setLoading] = useState(true);
            const fileInputRef = useRef(null);

            const isClassic = theme === 'classic';

            // Sync theme with global setTheme function
            useEffect(() => {
                window.setThemeReact = (newTheme) => {
                    setTheme(newTheme);
                };
            }, []);

            // Load profile and artworks
            useEffect(() => {
                loadProfile();
            }, []);

            useEffect(() => {
                if (profile) {
                    loadMyArtworks();
                }
            }, [profile, selectedGallery]);

            async function loadProfile() {
                const walletAddress = window.getCurrentWalletAddress?.();
                if (!walletAddress) {
                    setLoading(false);
                    return;
                }

                try {
                    // Try to load profile without authentication first
                    let profileData = await window.ArtSoulDB.getProfile(walletAddress);
                    if (!profileData) {
                        profileData = {
                            wallet_address: walletAddress,
                            username: '',
                            bio: '',
                            avatar_url: '',
                            twitter_handle: '',
                            discord_username: ''
                        };
                        setEditMode(true);
                    }
                    setProfile(profileData);
                } catch (error) {
                    console.error('Error loading profile:', error);
                }
                setLoading(false);
            }

            async function loadMyArtworks() {
                if (!profile?.id) return;

                try {
                    const artworks = await window.ArtSoulDB.getArtworksByCreator(profile.id);
                    const filtered = artworks.filter(art => {
                        if (selectedGallery === 'nft') return art.file_type === 'image';
                        if (selectedGallery === 'video') return art.file_type === 'video';
                        if (selectedGallery === 'music') return art.file_type === 'music';
                        if (selectedGallery === 'gif') return art.file_type === 'gif';
                        return false;
                    });
                    setMyArtworks(filtered);
                } catch (error) {
                    console.error('Error loading artworks:', error);
                }
            }

            async function handleAvatarUpload(e) {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const walletAddress = window.getCurrentWalletAddress?.();
                    const fileName = `avatar_${walletAddress}_${Date.now()}.${file.name.split('.').pop()}`;
                    const avatarUrl = await window.ArtSoulDB.uploadFile(file, fileName);
                    setProfile({...profile, avatar_url: avatarUrl});
                } catch (error) {
                    console.error('Error uploading avatar:', error);
                    alert('Error uploading avatar: ' + error.message);
                }
            }

            async function saveProfile() {
                const walletAddress = window.getCurrentWalletAddress?.();
                if (!walletAddress) {
                    alert('Please connect your wallet first');
                    return;
                }

                try {
                    // Authenticate before saving (only once)
                    const isAuthenticated = await window.ensureAuthenticated?.();
                    if (!isAuthenticated) {
                        alert('Authentication required to save profile');
                        return;
                    }

                    const profileData = {
                        username: profile.username,
                        bio: profile.bio,
                        twitter_handle: profile.twitter_handle,
                        discord_username: profile.discord_username,
                        avatar_url: profile.avatar_url
                    };

                    if (profile.id) {
                        await window.ArtSoulDB.updateProfile(walletAddress, profileData);
                    } else {
                        const newProfile = await window.ArtSoulDB.createProfile(walletAddress, profileData);
                        setProfile(newProfile);
                    }

                    setEditMode(false);
                    alert('Profile saved!');
                } catch (error) {
                    console.error('Error saving profile:', error);
                    alert('Error saving profile: ' + error.message);
                }
            }

            function handleQuickUpload() {
                window.location.href = 'upload.html';
            }

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-2xl">Loading...</div>
                    </div>
                );
            }

            const bgClass = isClassic ? 'bg-gray-900 text-gray-100' : 'bg-black text-cyan-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header>
                        <div className="container mx-auto px-4">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className="logo-link">
                                        <img src="ARTSOULlogo.png" alt="ArtSoul" className="site-logo" />
                                    </a>
                                    <div className="theme-toggle">
                                        <button
                                            onClick={() => window.setTheme?.('classic')}
                                            id="classicBtn"
                                            className={`theme-btn ${theme === 'classic' ? 'active-classic' : ''}`}
                                        >
                                            Classic
                                        </button>
                                        <button
                                            onClick={() => window.setTheme?.('future')}
                                            id="futureBtn"
                                            className={`theme-btn ${theme === 'future' ? 'active-future' : ''}`}
                                        >
                                            Future
                                        </button>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div id="networkBadge"></div>
                                    <div id="navButtons" className="flex items-center gap-3">
                                        {/* AppKit will populate this */}
                                    </div>
                                    <a href="index.html" className="btn-secondary">
                                        Back to Gallery
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        {/* Profile Header */}
                        <div className={`rounded-xl p-8 mb-8 animate-fadeIn ${
                            isClassic
                                ? 'bg-gray-800/50 border border-gray-700'
                                : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'
                        }`}>
                            <div className="flex items-start gap-8 flex-wrap">
                                {/* Avatar */}
                                <div className="flex-shrink-0">
                                    <div
                                        className={`w-32 h-32 rounded-full overflow-hidden ${editMode ? 'cursor-pointer' : ''} ${
                                            isClassic
                                                ? 'bg-gray-700 border-4 border-gray-600'
                                                : 'bg-gradient-to-br from-purple-900 to-cyan-900 border-4 border-cyan-400 neon-border'
                                        }`}
                                        onClick={() => editMode && fileInputRef.current?.click()}
                                    >
                                        {profile?.avatar_url ? (
                                            <img src={profile.avatar_url} alt="Avatar" className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-sm opacity-50">
                                                No Avatar
                                            </div>
                                        )}
                                    </div>
                                    {editMode && (
                                        <label className={`block mt-3 text-center text-sm cursor-pointer ${
                                            isClassic ? 'text-gray-300 hover:underline' : 'text-cyan-400 hover:underline'
                                        }`}>
                                            <input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" ref={fileInputRef} />
                                            Change Avatar
                                        </label>
                                    )}
                                </div>

                                {/* Profile Info */}
                                <div className="flex-1 min-w-0">
                                    {editMode ? (
                                        <div className="space-y-4">
                                            <input
                                                type="text"
                                                value={profile?.username || ''}
                                                onChange={(e) => setProfile({...profile, username: e.target.value})}
                                                placeholder="Your Name"
                                                className={`w-full px-4 py-3 rounded-lg text-2xl font-bold ${
                                                    isClassic
                                                        ? 'bg-gray-700 border border-gray-600 text-gray-100'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <textarea
                                                value={profile?.bio || ''}
                                                onChange={(e) => setProfile({...profile, bio: e.target.value})}
                                                placeholder="Tell us about yourself..."
                                                rows={3}
                                                className={`w-full px-4 py-3 rounded-lg ${
                                                    isClassic
                                                        ? 'bg-gray-700 border border-gray-600 text-gray-100'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <input
                                                    type="text"
                                                    value={profile?.twitter_handle || ''}
                                                    onChange={(e) => setProfile({...profile, twitter_handle: e.target.value})}
                                                    placeholder="Twitter/X handle"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-700 border border-gray-600 text-gray-100'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                                <input
                                                    type="text"
                                                    value={profile?.discord_username || ''}
                                                    onChange={(e) => setProfile({...profile, discord_username: e.target.value})}
                                                    placeholder="Discord username"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-700 border border-gray-600 text-gray-100'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <h1 className={`text-4xl font-bold mb-3 ${
                                                isClassic ? 'text-gray-100' : 'text-cyan-400 neon-glow'
                                            }`}>
                                                {profile?.username || 'Anonymous Artist'}
                                            </h1>
                                            <p className={`text-lg mb-4 ${
                                                isClassic ? 'text-gray-400' : 'text-purple-300'
                                            }`}>
                                                {profile?.bio || 'No bio yet'}
                                            </p>
                                            <div className="flex gap-4 flex-wrap">
                                                {profile?.twitter_handle && (
                                                    <a
                                                        href={`https://twitter.com/${profile.twitter_handle}`}
                                                        target="_blank"
                                                        className={`px-4 py-2 rounded-lg ${
                                                            isClassic ? 'bg-gray-700 text-gray-200' : 'bg-cyan-900/50 text-cyan-300'
                                                        }`}
                                                    >
                                                        🐦 Twitter
                                                    </a>
                                                )}
                                                {profile?.discord_username && (
                                                    <span className={`px-4 py-2 rounded-lg ${
                                                        isClassic ? 'bg-gray-700 text-gray-200' : 'bg-purple-900/50 text-purple-300'
                                                    }`}>
                                                        💬 {profile.discord_username}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-6 flex gap-4 flex-wrap">
                                        {editMode ? (
                                            <>
                                                <button onClick={saveProfile} className="btn-main">
                                                    Save Profile
                                                </button>
                                                <button
                                                    onClick={() => setEditMode(false)}
                                                    className={`px-6 py-2 rounded-lg font-medium ${
                                                        isClassic ? 'bg-gray-700 text-gray-300' : 'bg-gray-700 text-gray-300'
                                                    }`}
                                                >
                                                    Cancel
                                                </button>
                                            </>
                                        ) : (
                                            <button onClick={() => setEditMode(true)} className="btn-main">
                                                Edit Profile
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Gallery Tabs */}
                        <div className={`rounded-xl p-6 mb-6 ${
                            isClassic
                                ? 'bg-gray-800/50 border border-gray-700'
                                : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'
                        }`}>
                            <h2 className={`text-2xl font-bold mb-4 ${
                                isClassic ? 'text-gray-100' : 'text-cyan-400 neon-glow'
                            }`}>
                                My Galleries
                            </h2>
                            <div className="flex flex-wrap gap-3">
                                {GALLERY_TYPES.map(gallery => (
                                    <button
                                        key={gallery.id}
                                        onClick={() => setSelectedGallery(gallery.id)}
                                        className={`px-6 py-3 rounded-lg font-medium transform hover:scale-105 transition-all ${
                                            selectedGallery === gallery.id
                                                ? isClassic
                                                    ? 'bg-gray-600 text-white'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white neon-border'
                                                : isClassic
                                                    ? 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                                                    : 'bg-gray-800/50 text-gray-300 hover:bg-gray-700/50'
                                        }`}
                                    >
                                        {gallery.icon} {gallery.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Gallery Content */}
                        <div className={`rounded-xl p-6 ${
                            isClassic
                                ? 'bg-gray-800/50 border border-gray-700'
                                : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'
                        }`}>
                            <div className="flex items-center justify-between mb-6">
                                <h3 className={`text-xl font-bold ${
                                    isClassic ? 'text-gray-100' : 'text-cyan-300'
                                }`}>
                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.label}
                                </h3>
                                <span className={`text-sm ${
                                    isClassic ? 'text-gray-400' : 'text-purple-300'
                                }`}>
                                    {myArtworks.length} items
                                </span>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {/* Add New Button */}
                                <div
                                    onClick={handleQuickUpload}
                                    className={`aspect-square rounded-lg flex flex-col items-center justify-center cursor-pointer gallery-item ${
                                        isClassic
                                            ? 'bg-gray-700 border-2 border-dashed border-gray-600 hover:bg-gray-600 hover:border-gray-500'
                                            : 'bg-gray-800/30 border-2 border-dashed border-cyan-500/30 hover:bg-gray-700/50 hover:border-cyan-400 neon-border'
                                    }`}
                                >
                                    <div className={`text-5xl mb-2 ${
                                        isClassic ? 'text-gray-400' : 'text-cyan-400'
                                    }`}>
                                        ➕
                                    </div>
                                    <div className={`text-sm font-medium ${
                                        isClassic ? 'text-gray-300' : 'text-cyan-300'
                                    }`}>
                                        Add New
                                    </div>
                                </div>

                                {/* Existing Artworks */}
                                {myArtworks.map(artwork => (
                                    <div
                                        key={artwork.id}
                                        className={`aspect-square rounded-lg overflow-hidden cursor-pointer gallery-item border ${
                                            isClassic ? 'bg-gray-700 border-gray-600' : 'bg-gray-800/50 backdrop-blur-sm border-cyan-500/20'
                                        }`}
                                    >
                                        {artwork.file_url ? (
                                            <img src={artwork.file_url} alt={artwork.title} className="w-full h-full object-cover" />
                                        ) : (
                                            <div className={`w-full h-full flex items-center justify-center ${
                                                isClassic ? 'bg-gray-700' : 'bg-gradient-to-br from-purple-900/50 to-cyan-900/50'
                                            }`}>
                                                <div className="text-center p-4">
                                                    <div className={`text-4xl mb-2 ${
                                                        isClassic ? 'text-gray-400' : 'text-cyan-400'
                                                    }`}>
                                                        {GALLERY_TYPES.find(g => g.id === selectedGallery)?.icon}
                                                    </div>
                                                    <div className={`text-xs ${
                                                        isClassic ? 'text-gray-400' : 'text-purple-300'
                                                    }`}>
                                                        {artwork.title}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}

                                {/* Empty Placeholders */}
                                {myArtworks.length === 0 && (
                                    <>
                                        {[...Array(7)].map((_, i) => (
                                            <div
                                                key={i}
                                                onClick={handleQuickUpload}
                                                className={`aspect-square rounded-lg flex items-center justify-center cursor-pointer gallery-item border ${
                                                    isClassic
                                                        ? 'bg-gray-700/30 border-gray-600 hover:bg-gray-700'
                                                        : 'bg-gray-800/30 border-cyan-500/10 hover:bg-gray-700/50'
                                                }`}
                                            >
                                                <div className={`text-4xl ${
                                                    isClassic ? 'text-gray-600' : 'text-cyan-400/30'
                                                }`}>
                                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.icon}
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<ProfilePage />, document.getElementById('app'));

        // Theme is managed by theme-sync.js
    </script>
</body>
</html>
