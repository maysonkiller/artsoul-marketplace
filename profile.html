<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unified-styles.css?v=2">
    <link rel="stylesheet" href="button-effects.css?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('artsoul_theme') || 'classic';
            document.documentElement.className = theme;
            // Wait for body to be available
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.className = theme;
                });
            } else {
                document.body.className = theme;
            }
        })();
    </script>
    <script src="theme-sync.js"></script>
    <script src="modal-system.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script src="avatar-dropdown.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <script type="module" src="contracts-integration.js"></script>
    <script defer src="oauth-integration.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #a9ddd3;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .gallery-item {
            transition: all 0.3s ease;
        }

        /* Classic Mode */
        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        /* Button styles moved to unified-styles.css */

        .classic .gallery-item:hover {
            transform: translateY(-8px);
            border-color: var(--accent-classic);
        }

        /* Future Mode */
        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        /* Button hover effects moved to button-effects.css */

        .future .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .future .neon-border {
            box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--accent-future);
        }

        .future .gallery-item:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-purple);
        }

        /* Theme toggle styles moved to unified-styles.css */

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        header .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        /* Site logo styles */
        .site-logo {
            height: 100px;
            width: auto;
            display: block;
            transition: all 0.3s;
            border-radius: 12px;
        }

        .classic .site-logo {
            filter: drop-shadow(0 0 8px rgba(169, 221, 211, 0.4));
            animation: logoLevitate 4s ease-in-out infinite;
        }

        .future .site-logo {
            border: 3px solid transparent;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6), 0 0 40px rgba(191, 0, 255, 0.4);
            animation: logoBorderGlow 3s ease-in-out infinite, logoLevitate 4s ease-in-out infinite;
        }

        @keyframes logoLevitate {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes logoBorderGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 245, 255, 0.8), 0 0 40px rgba(191, 0, 255, 0.6), inset 0 0 20px rgba(0, 245, 255, 0.2);
                border-color: rgba(0, 245, 255, 0.6);
            }
            50% {
                box-shadow: 0 0 30px rgba(191, 0, 255, 0.8), 0 0 60px rgba(0, 245, 255, 0.6), inset 0 0 30px rgba(191, 0, 255, 0.2);
                border-color: rgba(191, 0, 255, 0.6);
            }
        }

        .logo-link:hover .site-logo {
            animation-play-state: paused;
        }

        .classic .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 15px rgba(169, 221, 211, 0.8));
        }

        .future .logo-link:hover .site-logo {
            box-shadow: 0 0 40px rgba(0, 245, 255, 1), 0 0 80px rgba(191, 0, 255, 0.8), inset 0 0 40px rgba(191, 0, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GALLERY_TYPES = [
            { id: 'created', label: 'Created', icon: '', description: 'Artworks you created' },
            { id: 'auction', label: 'On Auction', icon: '', description: 'Currently on auction' },
            { id: 'sold', label: 'Sold', icon: '', description: 'Successfully sold' },
            { id: 'collected', label: 'Collected', icon: '', description: 'Artworks you own' },
        ];

        function ProfilePage() {
            const [theme, setTheme] = useState(() => window.ThemeSync?.getTheme() || 'classic');
            const [profile, setProfile] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [selectedGallery, setSelectedGallery] = useState('created');
            const [myArtworks, setMyArtworks] = useState([]);
            const [loading, setLoading] = useState(true);
            const fileInputRef = useRef(null);
            const navButtonsRef = useRef(null);
            const networkBadgeRef = useRef(null);

            const isClassic = theme === 'classic';

            // Sync theme with global setTheme function
            useEffect(() => {
                window.setThemeReact = (newTheme) => {
                    setTheme(newTheme);
                };
            }, []);

            // Preserve navButtons and networkBadge content after React render
            useEffect(() => {
                // Force initial update
                if (window.web3Modal && window.updateNavButtons && window.updateNetworkBadge) {
                    const state = window.web3Modal.getState();
                    if (state?.address) {
                        window.updateNavButtons(state);
                        window.updateNetworkBadge(state);
                    }
                }

                // Continuously check and update navButtons
                const interval = setInterval(() => {
                    if (window.web3Modal) {
                        const state = window.web3Modal.getState();
                        const navButtons = document.getElementById('navButtons');

                        // Always update if wallet is connected
                        if (navButtons && state?.address) {
                            if (window.updateNavButtons) {
                                window.updateNavButtons(state);
                            }
                        }

                        // Update network badge
                        if (window.updateNetworkBadge) {
                            window.updateNetworkBadge(state);
                        }
                    }
                }, 1000);

                return () => clearInterval(interval);
            }, []);

            // Load profile and artworks
            useEffect(() => {
                loadProfile();
                handleOAuthCallback();
            }, []);

            useEffect(() => {
                if (profile) {
                    loadMyArtworks();
                }
            }, [profile, selectedGallery]);

            async function handleOAuthCallback() {
                if (window.OAuthIntegration) {
                    const result = await window.OAuthIntegration.handleCallback();
                    if (result) {
                        // Reload profile to show connected account
                        setTimeout(() => {
                            loadProfile();
                        }, 1000);
                    }
                }
            }

            async function loadProfile() {
                const walletAddress = window.getCurrentWalletAddress?.();
                if (!walletAddress) {
                    setLoading(false);
                    return;
                }

                try {
                    // Wait for ArtSoulDB to be available
                    let attempts = 0;
                    while (!window.ArtSoulDB && attempts < 50) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }

                    if (!window.ArtSoulDB) {
                        throw new Error('ArtSoulDB module failed to load');
                    }

                    // Try to load profile without authentication first
                    let profileData = await window.ArtSoulDB.getProfile(walletAddress);
                    if (!profileData) {
                        profileData = {
                            wallet_address: walletAddress,
                            username: '',
                            bio: '',
                            avatar_url: '',
                            twitter_handle: '',
                            discord_username: ''
                        };
                        setEditMode(true);
                    }
                    setProfile(profileData);
                } catch (error) {
                    console.error('Error loading profile:', error);
                }
                setLoading(false);
            }

            async function loadMyArtworks() {
                if (!profile?.id) return;

                try {
                    const walletAddress = profile.wallet_address;

                    // Load all artworks for this user
                    const createdArtworks = await window.ArtSoulDB.getArtworksByCreator(walletAddress);
                    const collectedArtworks = await window.ArtSoulDB.getArtworksByOwner(walletAddress);

                    // Filter based on selected gallery
                    let filtered = [];

                    if (selectedGallery === 'created') {
                        // All artworks created by user
                        filtered = createdArtworks;
                    } else if (selectedGallery === 'auction') {
                        // Created artworks currently on auction
                        filtered = createdArtworks.filter(art => art.status === 'auction');
                    } else if (selectedGallery === 'sold') {
                        // Created artworks that were sold
                        filtered = createdArtworks.filter(art => art.status === 'sold');
                    } else if (selectedGallery === 'collected') {
                        // Artworks owned but not created by user
                        filtered = collectedArtworks;
                    }

                    setMyArtworks(filtered);
                } catch (error) {
                    console.error('Error loading artworks:', error);
                }
            }

            async function handleAvatarUpload(e) {
                const file = e.target.files[0];
                if (!file) return;

                // Validate file type
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file');
                    return;
                }

                // Validate file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert('Image size must be less than 5MB');
                    return;
                }

                try {
                    // Wait for ArtSoulDB to be available
                    let attempts = 0;
                    while (!window.ArtSoulDB && attempts < 50) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }

                    if (!window.ArtSoulDB) {
                        throw new Error('ArtSoulDB module failed to load');
                    }

                    // Ensure authenticated before upload
                    const isAuth = await window.ensureAuthenticated();
                    if (!isAuth) return;

                    const walletAddress = window.getCurrentWalletAddress?.();
                    const fileName = `avatar_${walletAddress}_${Date.now()}.${file.name.split('.').pop()}`;

                    // Show loading feedback
                    const originalAvatar = profile?.avatar_url;
                    setProfile({...profile, avatar_url: 'uploading...'});

                    const avatarUrl = await window.ArtSoulDB.uploadFile(file, fileName);
                    setProfile({...profile, avatar_url: avatarUrl});
                } catch (error) {
                    console.error('Error uploading avatar:', error);
                    alert('Error uploading avatar: ' + error.message);
                    // Restore original avatar on error
                    setProfile({...profile, avatar_url: originalAvatar});
                }
            }

            async function saveProfile() {
                const walletAddress = window.getCurrentWalletAddress?.();
                if (!walletAddress) {
                    alert('Please connect your wallet first');
                    return;
                }

                try {
                    // Wait for ArtSoulDB to be available
                    let attempts = 0;
                    while (!window.ArtSoulDB && attempts < 50) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }

                    if (!window.ArtSoulDB) {
                        throw new Error('ArtSoulDB module failed to load');
                    }

                    // Authenticate before saving (only once)
                    const isAuthenticated = await window.ensureAuthenticated?.();
                    if (!isAuthenticated) {
                        alert('Authentication required to save profile');
                        return;
                    }

                    const profileData = {
                        username: profile.username,
                        bio: profile.bio,
                        twitter_handle: profile.twitter_handle,
                        discord_username: profile.discord_username,
                        avatar_url: profile.avatar_url
                    };

                    if (profile.id) {
                        await window.ArtSoulDB.updateProfile(walletAddress, profileData);
                    } else {
                        const newProfile = await window.ArtSoulDB.createProfile(walletAddress, profileData);
                        setProfile(newProfile);
                    }

                    setEditMode(false);
                    alert('Profile saved!');
                } catch (error) {
                    console.error('Error saving profile:', error);
                    alert('Error saving profile: ' + error.message);
                }
            }

            function handleQuickUpload() {
                window.location.href = 'upload.html';
            }

            // ============================================
            // AUCTION MANAGEMENT FUNCTIONS
            // ============================================

            async function handleCreateAuction(artwork) {
                // Fixed 3-day auction duration
                const durationDays = 3;

                try {
                    // Check wallet connection
                    const provider = await window.web3Modal?.getWalletProvider();
                    if (!provider) {
                        alert('Please connect your wallet');
                        return;
                    }

                    // Initialize contracts
                    if (!window.ArtSoulContracts.marketplaceContract) {
                        await window.ArtSoulContracts.init(provider);
                    }

                    // Check blockchain status first
                    console.log('Checking blockchain status for artwork:', artwork.blockchain_id);
                    const blockchainArtwork = await window.ArtSoulContracts.getArtwork(artwork.blockchain_id);
                    console.log('Blockchain status:', blockchainArtwork.status);

                    // Status: 0=DRAFT, 1=AUCTION, 2=AUCTION_FAILED, 3=SOLD, 4=UNLISTED
                    if (blockchainArtwork.status === 1) {
                        // Already in AUCTION status on blockchain, just sync database
                        console.log('⚠️ Artwork already in AUCTION status on blockchain, syncing database...');
                        await window.ArtSoulDB.updateArtwork(artwork.id, { status: 'auction' });
                        alert('Auction status synced! The auction was already active on the blockchain.');
                        loadMyArtworks();
                        return;
                    }

                    if (blockchainArtwork.status !== 0 && blockchainArtwork.status !== 2) {
                        // Can only create auction from DRAFT (0) or AUCTION_FAILED (2)
                        const statusNames = ['DRAFT', 'AUCTION', 'AUCTION_FAILED', 'SOLD', 'UNLISTED'];
                        alert(`Cannot create auction. Artwork status: ${statusNames[blockchainArtwork.status]}`);
                        return;
                    }

                    // Create auction on blockchain
                    console.log('Creating auction for artwork:', artwork.blockchain_id);
                    await window.ArtSoulContracts.createAuction(
                        artwork.blockchain_id,
                        artwork.creator_value.toString(),
                        durationDays
                    );

                    // Update status in Supabase
                    await window.ArtSoulDB.updateArtwork(artwork.id, { status: 'auction' });

                    alert('Auction created successfully!');
                    loadMyArtworks(); // Reload artworks
                } catch (error) {
                    console.error('Create auction failed:', error);
                    alert('Failed to create auction: ' + (error.message || 'Unknown error'));
                }
            }

            async function handleDeleteArtwork(artwork) {
                if (!confirm(`Delete "${artwork.title}"? This cannot be undone.`)) return;

                try {
                    // Check wallet connection
                    const provider = await window.web3Modal?.getWalletProvider();
                    if (!provider) {
                        alert('Please connect your wallet');
                        return;
                    }

                    // Verify ownership
                    const walletAddress = window.getCurrentWalletAddress?.();
                    if (!walletAddress) {
                        alert('Please connect your wallet');
                        return;
                    }

                    if (artwork.creator_id?.toLowerCase() !== walletAddress.toLowerCase()) {
                        alert('You can only delete your own artworks');
                        return;
                    }

                    // Initialize contracts
                    if (!window.ArtSoulContracts.marketplaceContract) {
                        await window.ArtSoulContracts.init(provider);
                    }

                    // Delete from blockchain
                    console.log('Deleting artwork:', artwork.blockchain_id);
                    await window.ArtSoulContracts.deleteArtwork(artwork.blockchain_id);

                    // Delete from Supabase
                    await window.ArtSoulDB.deleteArtwork(artwork.id);

                    alert('Artwork deleted successfully!');
                    loadMyArtworks(); // Reload artworks
                } catch (error) {
                    console.error('Delete failed:', error);
                    alert('Failed to delete artwork: ' + (error.message || 'Unknown error'));
                }
            }

            async function handleRelistArtwork(artwork) {
                const newPrice = prompt('New starting price (ETH):', artwork.creator_value);
                if (!newPrice) return;

                const price = parseFloat(newPrice);
                if (isNaN(price) || price <= 0) {
                    alert('Invalid price');
                    return;
                }

                try {
                    // Check wallet connection
                    const provider = await window.web3Modal?.getWalletProvider();
                    if (!provider) {
                        alert('Please connect your wallet');
                        return;
                    }

                    // Verify ownership
                    const walletAddress = window.getCurrentWalletAddress?.();
                    if (!walletAddress) {
                        alert('Please connect your wallet');
                        return;
                    }

                    if (artwork.creator_id?.toLowerCase() !== walletAddress.toLowerCase()) {
                        alert('You can only relist your own artworks');
                        return;
                    }

                    // Initialize contracts
                    if (!window.ArtSoulContracts.marketplaceContract) {
                        await window.ArtSoulContracts.init(provider);
                    }

                    // Relist on blockchain
                    console.log('Relisting artwork:', artwork.blockchain_id);
                    await window.ArtSoulContracts.relistArtwork(artwork.blockchain_id, price.toString());

                    // Update in Supabase
                    await window.ArtSoulDB.updateArtwork(artwork.id, {
                        status: 'draft',
                        creator_value: price
                    });

                    alert('✅ Artwork relisted successfully!');
                    loadMyArtworks(); // Reload artworks
                } catch (error) {
                    console.error('Relist failed:', error);
                    alert('Failed to relist artwork: ' + (error.message || 'Unknown error'));
                }
            }

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-2xl">Loading...</div>
                    </div>
                );
            }

            const bgClass = isClassic ? 'bg-gray-900 text-gray-100' : 'bg-black text-cyan-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header>
                        <div className="container mx-auto px-4">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className="logo-link">
                                        <img src="ARTSOULlogo.png" alt="ArtSoul" className="site-logo" />
                                    </a>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div id="networkBadge" ref={networkBadgeRef}></div>
                                    <div id="navButtons" ref={navButtonsRef} className="flex items-center gap-3">
                                        {/* AppKit will populate avatar dropdown */}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        {/* Profile Header */}
                        <div className={`rounded-xl p-8 mb-8 animate-fadeIn ${
                            isClassic
                                ? 'bg-gray-800/50 border border-gray-700'
                                : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'
                        }`}>
                            <div className="flex items-start gap-8 flex-wrap">
                                {/* Avatar */}
                                <div className="flex-shrink-0">
                                    <div
                                        className={`w-32 h-32 rounded-full overflow-hidden ${editMode ? 'cursor-pointer' : ''} ${
                                            isClassic
                                                ? 'bg-gray-700 border-4 border-gray-600'
                                                : 'bg-gradient-to-br from-purple-900 to-cyan-900 border-4 border-cyan-400 neon-border'
                                        }`}
                                        onClick={() => editMode && fileInputRef.current?.click()}
                                    >
                                        {profile?.avatar_url ? (
                                            <img src={profile.avatar_url} alt="Avatar" className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-sm opacity-50">
                                                No Avatar
                                            </div>
                                        )}
                                    </div>
                                    {editMode && (
                                        <label className="block mt-3 text-center text-sm cursor-pointer opacity-0 hover:opacity-100 transition-opacity">
                                            <input
                                                type="file"
                                                accept="image/*,video/*"
                                                onChange={handleAvatarUpload}
                                                className="hidden"
                                                ref={fileInputRef}
                                            />
                                        </label>
                                    )}
                                </div>

                                {/* Profile Info */}
                                <div className="flex-1 min-w-0">
                                    {editMode ? (
                                        <div className="space-y-4">
                                            <input
                                                type="text"
                                                value={profile?.username || ''}
                                                onChange={(e) => setProfile({...profile, username: e.target.value})}
                                                placeholder="Your Name"
                                                className={`w-full px-4 py-3 rounded-lg text-2xl font-bold ${
                                                    isClassic
                                                        ? 'bg-gray-700 border border-gray-600 text-gray-100'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <textarea
                                                value={profile?.bio || ''}
                                                onChange={(e) => setProfile({...profile, bio: e.target.value})}
                                                placeholder="Tell us about yourself..."
                                                rows={3}
                                                className={`w-full px-4 py-3 rounded-lg ${
                                                    isClassic
                                                        ? 'bg-gray-700 border border-gray-600 text-gray-100'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {/* X (Twitter) OAuth */}
                                                <div>
                                                    {profile?.twitter_username ? (
                                                        <div className={`flex items-center justify-between px-4 py-2 rounded-lg ${
                                                            isClassic ? 'bg-gray-700 border border-gray-600' : 'bg-cyan-900/50 border border-cyan-500/30'
                                                        }`}>
                                                            <span className="flex items-center gap-2">
                                                                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                                                </svg>
                                                                @{profile.twitter_username}
                                                            </span>
                                                            <button
                                                                onClick={() => {
                                                                    window.OAuthIntegration.disconnect('twitter', window.getCurrentWalletAddress?.());
                                                                    setProfile({...profile, twitter_username: null, twitter_id: null});
                                                                }}
                                                                className="text-red-400 hover:text-red-300 text-sm"
                                                            >
                                                                ✕
                                                            </button>
                                                        </div>
                                                    ) : (
                                                        <button
                                                            onClick={() => window.OAuthIntegration.connectTwitter(window.getCurrentWalletAddress?.())}
                                                            className={`w-full px-4 py-3 rounded-lg flex items-center justify-center ${
                                                                isClassic
                                                                    ? 'bg-gray-700 hover:bg-gray-600 text-gray-200'
                                                                    : 'bg-cyan-900/50 hover:bg-cyan-800/50 text-cyan-300 border border-cyan-500/30'
                                                            }`}
                                                        >
                                                            <svg className="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                                                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                                            </svg>
                                                        </button>
                                                    )}
                                                </div>
                                                {/* Discord OAuth */}
                                                <div>
                                                    {profile?.discord_username ? (
                                                        <div className={`flex items-center justify-between px-4 py-2 rounded-lg ${
                                                            isClassic ? 'bg-gray-700 border border-gray-600' : 'bg-purple-900/50 border border-purple-500/30'
                                                        }`}>
                                                            <span className="flex items-center gap-2">
                                                                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                                                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                                                                </svg>
                                                                {profile.discord_username.replace('#0', '')}
                                                            </span>
                                                            <button
                                                                onClick={() => {
                                                                    window.OAuthIntegration.disconnect('discord', window.getCurrentWalletAddress?.());
                                                                    setProfile({...profile, discord_username: null, discord_id: null});
                                                                }}
                                                                className="text-red-400 hover:text-red-300 text-sm"
                                                            >
                                                                ✕
                                                            </button>
                                                        </div>
                                                    ) : (
                                                        <button
                                                            onClick={() => window.OAuthIntegration.connectDiscord(window.getCurrentWalletAddress?.())}
                                                            className={`w-full px-4 py-3 rounded-lg flex items-center justify-center ${
                                                                isClassic
                                                                    ? 'bg-gray-700 hover:bg-gray-600 text-gray-200'
                                                                    : 'bg-purple-900/50 hover:bg-purple-800/50 text-purple-300 border border-purple-500/30'
                                                            }`}
                                                        >
                                                            <svg className="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                                                                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                                                            </svg>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <h1 className={`text-4xl font-bold mb-2 ${
                                                isClassic ? 'text-gray-100' : ''
                                            }`}>
                                                {profile?.username || 'Anonymous Artist'}
                                            </h1>
                                            {profile?.wallet_address && (
                                                <p className={`text-sm mb-4 opacity-60 font-mono`}>
                                                    {profile.wallet_address.slice(0, 6)}...{profile.wallet_address.slice(-4)}
                                                </p>
                                            )}
                                            <p className={`text-lg mb-4 ${
                                                isClassic ? 'text-gray-400' : 'text-purple-300'
                                            }`}>
                                                {profile?.bio || 'No bio yet'}
                                            </p>
                                            <div className="flex gap-4 flex-wrap">
                                                {profile?.twitter_handle && (
                                                    <a
                                                        href={`https://twitter.com/${profile.twitter_handle.replace('@', '')}`}
                                                        target="_blank"
                                                        rel="noopener noreferrer"
                                                        className={`flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer hover:opacity-80 transition-opacity ${
                                                        isClassic
                                                            ? 'bg-gray-700 text-gray-200 border border-gray-600'
                                                            : 'bg-cyan-900/50 text-cyan-300 border border-cyan-500/30 shadow-[0_0_15px_rgba(0,245,255,0.3)]'
                                                    }`}>
                                                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                                        </svg>
                                                        @{profile.twitter_handle.replace('@', '')}
                                                    </a>
                                                )}
                                                {profile?.discord_username && (
                                                    <div className={`flex items-center gap-2 px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-700 text-gray-200 border border-gray-600'
                                                            : 'bg-purple-900/50 text-purple-300 border border-purple-500/30 shadow-[0_0_15px_rgba(191,0,255,0.3)]'
                                                    }`}>
                                                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                                            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                                                        </svg>
                                                        {profile.discord_username.replace('#0', '')}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-6 flex gap-4 flex-wrap">
                                        {editMode ? (
                                            <>
                                                <button onClick={saveProfile} className="btn-main">
                                                    Save Profile
                                                </button>
                                                <button
                                                    onClick={() => setEditMode(false)}
                                                    className={`px-6 py-2 rounded-lg font-medium ${
                                                        isClassic ? 'bg-gray-700 text-gray-300' : 'bg-gray-700 text-gray-300'
                                                    }`}
                                                >
                                                    Cancel
                                                </button>
                                            </>
                                        ) : (
                                            <button onClick={() => setEditMode(true)} className="btn-main">
                                                Edit Profile
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Gallery Tabs */}
                        <div className={`rounded-xl p-6 mb-6 ${
                            isClassic
                                ? 'bg-gray-800/50 border border-gray-700'
                                : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'
                        }`}>
                            <h2 className={`text-2xl font-bold mb-4 ${
                                isClassic ? 'text-gray-100' : ''
                            }`}>
                                My Galleries
                            </h2>
                            <div className="flex flex-wrap gap-3">
                                {GALLERY_TYPES.map(gallery => (
                                    <button
                                        key={gallery.id}
                                        onClick={() => setSelectedGallery(gallery.id)}
                                        className={`px-6 py-3 rounded-lg font-medium transform hover:scale-105 transition-all ${
                                            selectedGallery === gallery.id
                                                ? isClassic
                                                    ? 'bg-gray-600 text-white'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white neon-border'
                                                : isClassic
                                                    ? 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                                                    : 'bg-gray-800/50 text-gray-300 hover:bg-gray-700/50'
                                        }`}
                                    >
                                        {gallery.icon} {gallery.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Gallery Content */}
                        <div className={`rounded-xl p-6 ${
                            isClassic
                                ? 'bg-gray-800/50 border border-gray-700'
                                : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'
                        }`}>
                            <div className="flex items-center justify-between mb-6">
                                <h3 className={`text-xl font-bold ${
                                    isClassic ? 'text-gray-100' : 'text-cyan-300'
                                }`}>
                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.label}
                                </h3>
                                <span className={`text-sm ${
                                    isClassic ? 'text-gray-400' : 'text-purple-300'
                                }`}>
                                    {myArtworks.length} items
                                </span>
                            </div>

                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                {/* Add New Button */}
                                <div
                                    className={`rounded-lg overflow-hidden gallery-item border ${
                                        isClassic ? 'bg-gray-700 border-gray-600' : 'bg-gray-800/50 backdrop-blur-sm border-cyan-500/20'
                                    }`}
                                >
                                    <div
                                        onClick={handleQuickUpload}
                                        className={`aspect-square flex flex-col items-center justify-center cursor-pointer ${
                                            isClassic
                                                ? 'bg-gray-700 border-2 border-dashed border-gray-600 hover:bg-gray-600 hover:border-gray-500'
                                                : 'bg-gray-800/30 border-2 border-dashed border-cyan-500/30 hover:bg-gray-700/50 hover:border-cyan-400 neon-border'
                                        }`}
                                    >
                                        <div className={`text-5xl mb-2 ${
                                            isClassic ? 'text-gray-400' : 'text-cyan-400'
                                        }`}>
                                            ➕
                                        </div>
                                        <div className={`text-sm font-medium ${
                                            isClassic ? 'text-gray-300' : 'text-cyan-300'
                                        }`}>
                                            Add New
                                        </div>
                                    </div>
                                    <div className={`p-3 ${isClassic ? 'bg-gray-800' : 'bg-gray-900/50'}`}>
                                        <div className="text-sm font-semibold mb-2">Upload Artwork</div>
                                        <div className="text-xs opacity-70 mb-3">Create new NFT</div>
                                    </div>
                                </div>

                                {/* Existing Artworks */}
                                {myArtworks.map(artwork => (
                                    <div
                                        key={artwork.id}
                                        className={`rounded-lg overflow-hidden gallery-item border ${
                                            isClassic ? 'bg-gray-700 border-gray-600' : 'bg-gray-800/50 backdrop-blur-sm border-cyan-500/20'
                                        }`}
                                    >
                                        {/* Artwork Image */}
                                        <div className="aspect-square cursor-pointer bg-black relative" onClick={() => window.location.href = `artwork.html?id=${artwork.id}`}>
                                            {artwork.file_url ? (
                                                <>
                                                    {(() => {
                                                        const fileType = artwork.file_type?.toLowerCase() || '';
                                                        const url = artwork.file_url?.toLowerCase() || '';
                                                        const isVideo = fileType === 'video' ||
                                                                       ['mp4', 'webm', 'mov'].includes(fileType) ||
                                                                       (!fileType && (url.includes('.mp4') || url.includes('.webm') || url.includes('.mov')));
                                                        return isVideo;
                                                    })() ? (
                                                        <>
                                                            <video
                                                                src={artwork.file_url}
                                                                className="w-full h-full object-contain"
                                                                preload="metadata"
                                                                muted
                                                            />
                                                            <div className="absolute top-2 right-2 bg-black/70 backdrop-blur-sm px-2 py-1 rounded text-xs flex items-center gap-1">
                                                                <span>▶️</span>
                                                                <span>Video</span>
                                                            </div>
                                                        </>
                                                    ) : (() => {
                                                        const fileType = artwork.file_type?.toLowerCase() || '';
                                                        const url = artwork.file_url?.toLowerCase() || '';
                                                        const isAudio = fileType === 'audio' || fileType === 'music' ||
                                                                       ['mp3', 'wav', 'ogg'].includes(fileType) ||
                                                                       (!fileType && (url.includes('.mp3') || url.includes('.wav') || url.includes('.ogg')));
                                                        return isAudio;
                                                    })() ? (
                                                        <>
                                                            <div className="w-full h-full flex items-center justify-center bg-gradient-to-br from-purple-900/30 to-cyan-900/30">
                                                                <div className="text-8xl">🎵</div>
                                                            </div>
                                                            <div className="absolute top-2 right-2 bg-black/70 backdrop-blur-sm px-2 py-1 rounded text-xs flex items-center gap-1">
                                                                <span>🎵</span>
                                                                <span>Audio</span>
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <img src={artwork.file_url} alt={artwork.title} className="w-full h-full object-contain" />
                                                    )}
                                                </>
                                            ) : (
                                                <div className={`w-full h-full flex items-center justify-center ${
                                                    isClassic ? 'bg-gray-700' : 'bg-gradient-to-br from-purple-900/50 to-cyan-900/50'
                                                }`}>
                                                    <div className="text-center p-4">
                                                        <div className={`text-6xl mb-2 ${
                                                            isClassic ? 'text-gray-400' : 'text-cyan-400'
                                                        }`}>
                                                            +
                                                        </div>
                                                        <div className={`text-xs ${
                                                            isClassic ? 'text-gray-400' : 'text-purple-300'
                                                        }`}>
                                                            {artwork.title}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Artwork Info & Actions */}
                                        <div className={`p-3 ${isClassic ? 'bg-gray-800' : 'bg-gray-900/50'}`}>
                                            <div className="text-sm font-semibold mb-2 truncate">{artwork.title}</div>
                                            <div className="text-xs opacity-70 mb-3">{artwork.creator_value || '0'} ETH</div>

                                            {/* Action Buttons */}
                                            <div className="flex gap-2">
                                                {artwork.status === 'draft' && (
                                                    <button
                                                        onClick={() => handleCreateAuction(artwork)}
                                                        className={`flex-1 px-3 py-2 rounded text-xs font-medium transition-all ${
                                                            isClassic
                                                                ? 'bg-gray-700 hover:bg-gray-600 text-white border border-gray-600'
                                                                : 'bg-cyan-900/30 hover:bg-cyan-900/50 text-cyan-400 border border-cyan-500/30'
                                                        }`}
                                                    >
                                                        Create Auction
                                                    </button>
                                                )}
                                                {artwork.status === 'auction' && (
                                                    <button
                                                        onClick={() => window.location.href = `artwork.html?id=${artwork.id}`}
                                                        className={`flex-1 px-3 py-2 rounded text-xs font-medium transition-all ${
                                                            isClassic
                                                                ? 'bg-gray-700 hover:bg-gray-600 text-white border border-gray-600'
                                                                : 'bg-purple-900/30 hover:bg-purple-900/50 text-purple-400 border border-purple-500/30'
                                                        }`}
                                                    >
                                                        View Auction
                                                    </button>
                                                )}
                                                {artwork.status === 'sold' && (
                                                    <button
                                                        onClick={() => handleRelistArtwork(artwork)}
                                                        className={`flex-1 px-3 py-2 rounded text-xs font-medium transition-all ${
                                                            isClassic
                                                                ? 'bg-gray-700 hover:bg-gray-600 text-white border border-gray-600'
                                                                : 'bg-cyan-900/30 hover:bg-cyan-900/50 text-cyan-400 border border-cyan-500/30'
                                                        }`}
                                                    >
                                                        Relist
                                                    </button>
                                                )}
                                                <button
                                                    onClick={() => handleDeleteArtwork(artwork)}
                                                    className={`px-3 py-2 rounded text-xs font-medium transition-all ${
                                                        isClassic
                                                            ? 'bg-gray-700 hover:bg-red-600 text-white border border-gray-600'
                                                            : 'bg-red-900/30 hover:bg-red-900/50 text-red-400 border border-red-500/30'
                                                    }`}
                                                >
                                                    Delete
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {/* Empty Placeholders */}
                                {myArtworks.length === 0 && (
                                    <>
                                        {[...Array(7)].map((_, i) => (
                                            <div
                                                key={i}
                                                onClick={handleQuickUpload}
                                                className={`aspect-square rounded-lg flex items-center justify-center cursor-pointer gallery-item border ${
                                                    isClassic
                                                        ? 'bg-gray-700/30 border-gray-600 hover:bg-gray-700'
                                                        : 'bg-gray-800/30 border-cyan-500/10 hover:bg-gray-700/50'
                                                }`}
                                            >
                                                <div className={`text-6xl ${
                                                    isClassic ? 'text-gray-600' : 'text-cyan-400/30'
                                                }`}>
                                                    +
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<ProfilePage />, document.getElementById('app'));

        // Theme is managed by theme-sync.js
    </script>
</body>
</html>
