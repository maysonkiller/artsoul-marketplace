<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ArtSoul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: { bg: '#f5f5f5', text: '#1a1a1a', accent: '#0066cc' },
                        future: { bg: '#0a0a0f', text: '#e0e0ff', neon: '#00ffff', pink: '#ff00ff', purple: '#8b00ff' },
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .gallery-item {
            transition: all 0.3s ease;
        }
        .gallery-item:hover {
            transform: translateY(-8px) scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useRef } = React;

        const GALLERY_TYPES = [
            { id: 'nft', label: 'NFT Gallery', icon: '🎨', fileType: 'Image' },
            { id: 'video', label: 'Video Gallery', icon: '🎬', fileType: 'Video' },
            { id: 'music', label: 'Music Gallery', icon: '🎵', fileType: 'Music' },
            { id: 'gif', label: 'GIF Gallery', icon: '🎞️', fileType: 'GIF' },
            { id: 'image', label: 'Image Gallery', icon: '🖼️', fileType: 'Image' },
            { id: 'physical', label: 'Physical Art', icon: '🎭', fileType: 'Image' },
        ];

        function ProfilePage() {
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'classic');
            const [profile, setProfile] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [selectedGallery, setSelectedGallery] = useState('nft');
            const [uploadingFor, setUploadingFor] = useState(null);
            const [viewerOpen, setViewerOpen] = useState(false);
            const [viewerArtwork, setViewerArtwork] = useState(null);
            const [zoom, setZoom] = useState(1);
            const [volume, setVolume] = useState(1);
            const [playbackRate, setPlaybackRate] = useState(1);
            const fileInputRef = useRef(null);

            const isClassic = theme === 'classic';

            // Load profile from localStorage
            useEffect(() => {
                const savedProfile = localStorage.getItem('userProfile');
                if (savedProfile) {
                    setProfile(JSON.parse(savedProfile));
                } else {
                    // First time - show setup
                    setProfile({
                        name: '',
                        avatar: '',
                        bio: '',
                        socials: { x: '', instagram: '', discord: '' },
                        galleries: {},
                    });
                    setEditMode(true);
                }
            }, []);

            // Get artworks for specific gallery
            const getGalleryArtworks = (galleryType) => {
                const allArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                return allArtworks.filter(art => {
                    if (galleryType === 'nft') return art.type === 'NFT';
                    if (galleryType === 'video') return art.type === 'Video';
                    if (galleryType === 'music') return art.type === 'Music';
                    if (galleryType === 'gif') return art.type === 'GIF';
                    if (galleryType === 'image') return art.type === 'Image' || art.type === 'Digital Art';
                    if (galleryType === 'physical') return art.type === 'Physical Art';
                    return false;
                });
            };

            // Handle avatar upload
            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setProfile({...profile, avatar: event.target.result});
                };
                reader.readAsDataURL(file);
            };

            // Save profile
            const saveProfile = () => {
                localStorage.setItem('userProfile', JSON.stringify(profile));
                setEditMode(false);
                // Force re-render to update X display
                setProfile({...profile});
                alert('Profile saved!');
            };

            // Handle quick upload for specific gallery
            const handleQuickUpload = (galleryType, fileType) => {
                setUploadingFor({ galleryType, fileType });
                fileInputRef.current.click();
            };

            // Process uploaded file
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !uploadingFor) return;

                // Create preview
                const reader = new FileReader();
                reader.onload = (event) => {
                    const newArtwork = {
                        id: Date.now(),
                        title: file.name.split('.')[0],
                        artist: profile.name || 'Anonymous',
                        type: uploadingFor.fileType,
                        description: 'Uploaded from profile',
                        currentBid: 0,
                        bids: [],
                        image: event.target.result,
                        uploadedBy: 'user'
                    };

                    // Save to localStorage
                    const existingArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                    existingArtworks.push(newArtwork);
                    localStorage.setItem('artworks', JSON.stringify(existingArtworks));

                    // Update profile gallery count
                    alert(`✅ Artwork "${newArtwork.title}" added to your ${uploadingFor.label}!`);
                    setUploadingFor(null);
                };
                reader.readAsDataURL(file);
            };

            if (!profile) return <div className="flex items-center justify-center min-h-screen">Loading...</div>;

            const bgClass = isClassic
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            const currentGalleryArtworks = getGalleryArtworks(selectedGallery);

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isClassic ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                        ArtSoul
                                    </a>
                                    <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                        My Profile
                                    </span>
                                </div>

                                <div className="flex items-center gap-4">
                                    <div className={`flex gap-2 p-1 rounded-lg ${isClassic ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                        <button
                                            onClick={() => setTheme('brutal')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'brutal'
                                                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                    : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Brutal
                                        </button>
                                        <button
                                            onClick={() => setTheme('future')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'future'
                                                    ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                    : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Future
                                        </button>
                                    </div>

                                    <a href="index.html" className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                        isClassic ? 'bg-gray-600 text-white hover:bg-gray-700' : 'bg-gray-700 text-white hover:bg-gray-600'
                                    }`}>
                                        Back to Gallery
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        {/* Profile Header */}
                        <div className={`rounded-xl p-8 mb-8 animate-fadeIn ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'}`}>
                            <div className="flex items-start gap-8">
                                {/* Avatar */}
                                <div className="flex-shrink-0">
                                    <div className={`w-32 h-32 rounded-full overflow-hidden ${isClassic ? 'bg-gray-200 border-4 border-blue-600' : 'bg-gradient-to-br from-purple-900 to-cyan-900 border-4 border-cyan-400 neon-border'}`}>
                                        {profile.avatar ? (
                                            <img src={profile.avatar} alt="Avatar" className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-5xl">
                                                👤
                                            </div>
                                        )}
                                    </div>
                                    {editMode && (
                                        <label className={`block mt-3 text-center text-sm cursor-pointer ${isClassic ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}`}>
                                            <input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" />
                                            Change Avatar
                                        </label>
                                    )}
                                </div>

                                {/* Profile Info */}
                                <div className="flex-1">
                                    {editMode ? (
                                        <div className="space-y-4">
                                            <input
                                                type="text"
                                                value={profile.name}
                                                onChange={(e) => setProfile({...profile, name: e.target.value})}
                                                placeholder="Your Name"
                                                className={`w-full px-4 py-3 rounded-lg text-2xl font-bold ${
                                                    isClassic
                                                        ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <textarea
                                                value={profile.bio}
                                                onChange={(e) => setProfile({...profile, bio: e.target.value})}
                                                placeholder="Tell us about yourself..."
                                                rows={3}
                                                className={`w-full px-4 py-3 rounded-lg ${
                                                    isClassic
                                                        ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <div className="grid grid-cols-3 gap-4">
                                                <input
                                                    type="text"
                                                    value={profile.socials.x}
                                                    onChange={(e) => setProfile({...profile, socials: {...profile.socials, x: e.target.value}})}
                                                    placeholder="X (Twitter) handle"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                                <input
                                                    type="text"
                                                    value={profile.socials.instagram}
                                                    onChange={(e) => setProfile({...profile, socials: {...profile.socials, instagram: e.target.value}})}
                                                    placeholder="Instagram handle"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                                <input
                                                    type="text"
                                                    value={profile.socials.discord}
                                                    onChange={(e) => setProfile({...profile, socials: {...profile.socials, discord: e.target.value}})}
                                                    placeholder="Discord username"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <h1 className={`text-4xl font-bold mb-3 ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                                {profile.name || 'Anonymous Artist'}
                                            </h1>
                                            <p className={`text-lg mb-4 ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                                {profile.bio || 'No bio yet'}
                                            </p>
                                            <div className="flex gap-4">
                                                {profile.socials?.x && (
                                                    <a href={`https://x.com/${profile.socials.x}`} target="_blank" className={`flex items-center gap-2 px-4 py-2 rounded-lg ${isClassic ? 'bg-blue-100 text-blue-700' : 'bg-cyan-900/50 text-cyan-300'}`}>
                                                        <img src={`https://unavatar.io/twitter/${profile.socials.x}`} alt="X Avatar" className="w-6 h-6 rounded-full" />
                                                        <span className="text-xl">𝕏</span>
                                                        <span>@{profile.socials.x}</span>
                                                    </a>
                                                )}
                                                {profile.socials.instagram && (
                                                    <a href={`https://instagram.com/${profile.socials.instagram}`} target="_blank" className={`px-4 py-2 rounded-lg ${isClassic ? 'bg-pink-100 text-pink-700' : 'bg-pink-900/50 text-pink-300'}`}>
                                                        📷 Instagram
                                                    </a>
                                                )}
                                                {profile.socials.discord && (
                                                    <span className={`px-4 py-2 rounded-lg ${isClassic ? 'bg-purple-100 text-purple-700' : 'bg-purple-900/50 text-purple-300'}`}>
                                                        💬 {profile.socials.discord}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-6 flex gap-4">
                                        {editMode ? (
                                            <>
                                                <button
                                                    onClick={saveProfile}
                                                    className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                                        isClassic
                                                            ? 'bg-green-600 text-white hover:bg-green-700 shadow-lg'
                                                            : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover:shadow-2xl neon-border'
                                                    }`}
                                                >
                                                    Save Profile
                                                </button>
                                                <button
                                                    onClick={() => setEditMode(false)}
                                                    className={`px-6 py-2 rounded-lg font-medium ${
                                                        isClassic ? 'bg-gray-300 text-gray-700' : 'bg-gray-700 text-gray-300'
                                                    }`}
                                                >
                                                    Cancel
                                                </button>
                                            </>
                                        ) : (
                                            <button
                                                onClick={() => setEditMode(true)}
                                                className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                                    isClassic
                                                        ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg'
                                                        : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                                }`}
                                            >
                                                Edit Profile
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Gallery Tabs */}
                        <div className={`rounded-xl p-6 mb-6 ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                            <h2 className={`text-2xl font-bold mb-4 ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                My Galleries
                            </h2>
                            <div className="flex flex-wrap gap-3">
                                {GALLERY_TYPES.map(gallery => (
                                    <button
                                        key={gallery.id}
                                        onClick={() => setSelectedGallery(gallery.id)}
                                        className={`px-6 py-3 rounded-lg font-medium transform hover:scale-105 ${
                                            selectedGallery === gallery.id
                                                ? isClassic
                                                    ? 'bg-blue-600 text-white shadow-lg'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white neon-border'
                                                : isClassic
                                                    ? 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                    : 'bg-gray-800/50 text-gray-300 hover:bg-gray-700/50'
                                        }`}
                                    >
                                        {gallery.icon} {gallery.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Gallery Content */}
                        <div className={`rounded-xl p-6 ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                            <div className="flex items-center justify-between mb-6">
                                <h3 className={`text-xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-300'}`}>
                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.label}
                                </h3>
                                <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                    {currentGalleryArtworks.length} items
                                </span>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {/* Add New Button */}
                                <div
                                    onClick={() => {
                                        const gallery = GALLERY_TYPES.find(g => g.id === selectedGallery);
                                        handleQuickUpload(selectedGallery, gallery.fileType);
                                    }}
                                    className={`aspect-square rounded-lg flex flex-col items-center justify-center cursor-pointer gallery-item ${
                                        isClassic
                                            ? 'bg-gray-100 border-2 border-dashed border-gray-300 hover:bg-gray-200 hover:border-blue-600'
                                            : 'bg-gray-800/30 border-2 border-dashed border-cyan-500/30 hover:bg-gray-700/50 hover:border-cyan-400 neon-border'
                                    }`}
                                >
                                    <div className={`text-5xl mb-2 ${isClassic ? 'text-gray-400' : 'text-cyan-400'}`}>
                                        ➕
                                    </div>
                                    <div className={`text-sm font-medium ${isClassic ? 'text-gray-600' : 'text-cyan-300'}`}>
                                        Add New
                                    </div>
                                </div>

                                {/* Existing Artworks */}
                                {currentGalleryArtworks.map(artwork => (
                                    <div
                                        key={artwork.id}
                                        onClick={() => {
                                            setViewerArtwork(artwork);
                                            setViewerOpen(true);
                                            setZoom(1);
                                        }}
                                        className={`aspect-square rounded-lg overflow-hidden cursor-pointer gallery-item ${
                                            isClassic ? 'bg-gray-50 shadow-md' : 'bg-gray-800/50 backdrop-blur-sm'
                                        }`}
                                    >
                                        {artwork.preview ? (
                                            <img src={artwork.preview} alt={artwork.title} className="w-full h-full object-cover" />
                                        ) : (
                                            <div className={`w-full h-full flex items-center justify-center ${
                                                isClassic ? 'bg-gray-200' : 'bg-gradient-to-br from-purple-900/50 to-cyan-900/50'
                                            }`}>
                                                <div className="text-center p-4">
                                                    <div className={`text-4xl mb-2 ${isClassic ? 'text-gray-400' : 'text-cyan-400'}`}>
                                                        {GALLERY_TYPES.find(g => g.id === selectedGallery)?.icon}
                                                    </div>
                                                    <div className={`text-xs ${isClassic ? 'text-gray-500' : 'text-purple-300'}`}>
                                                        {artwork.title}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}

                                {/* Empty Placeholders */}
                                {currentGalleryArtworks.length === 0 && (
                                    <>
                                        {[...Array(7)].map((_, i) => (
                                            <div
                                                key={i}
                                                onClick={() => {
                                                    const gallery = GALLERY_TYPES.find(g => g.id === selectedGallery);
                                                    handleQuickUpload(selectedGallery, gallery.fileType);
                                                }}
                                                className={`aspect-square rounded-lg flex items-center justify-center cursor-pointer gallery-item ${
                                                    isClassic
                                                        ? 'bg-gray-50 border border-gray-200 hover:bg-gray-100'
                                                        : 'bg-gray-800/30 border border-cyan-500/10 hover:bg-gray-700/50'
                                                }`}
                                            >
                                                <div className={`text-4xl ${isClassic ? 'text-gray-300' : 'text-cyan-400/30'}`}>
                                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.icon}
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Hidden file input for quick upload */}
                    <input
                        ref={fileInputRef}
                        type="file"
                        className="hidden"
                        accept="image/*,video/*,audio/*"
                        onChange={handleFileUpload}
                    />

                    {/* Footer */}
                    <footer className="mt-16 pb-8 text-center">
                        <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isClassic ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                    </footer>

                    {/* Artwork Viewer Modal */}
                    {viewerOpen && viewerArtwork && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4" onClick={() => setViewerOpen(false)}>
                            <div className="relative max-w-6xl w-full max-h-screen overflow-auto" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setViewerOpen(false)} className="absolute top-4 right-4 z-10 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">✕ Close</button>
                                <div className={`rounded-xl p-6 ${isClassic ? 'bg-white' : 'bg-gray-900'}`}>
                                    {(viewerArtwork.type === 'Image' || viewerArtwork.type === 'NFT' || viewerArtwork.type === 'GIF') && viewerArtwork.preview && (
                                        <div className="space-y-4">
                                            <div className="overflow-auto max-h-[70vh]">
                                                <img src={viewerArtwork.preview} alt={viewerArtwork.title} style={{transform: `scale(${zoom})`}} className="w-full transition-transform" />
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <button onClick={() => setZoom(Math.max(0.5, zoom - 0.25))} className="px-4 py-2 bg-blue-600 text-white rounded">-</button>
                                                <span className="text-white">Zoom: {zoom.toFixed(2)}x</span>
                                                <button onClick={() => setZoom(Math.min(3, zoom + 0.25))} className="px-4 py-2 bg-blue-600 text-white rounded">+</button>
                                                <button onClick={() => setZoom(1)} className="px-4 py-2 bg-gray-600 text-white rounded">Reset</button>
                                            </div>
                                        </div>
                                    )}
                                    {viewerArtwork.type === 'Video' && viewerArtwork.preview && (
                                        <div className="space-y-4">
                                            <video src={viewerArtwork.preview} controls className="w-full max-h-[70vh]" />
                                            <div className="space-y-2">
                                                <div className="flex items-center gap-4">
                                                    <label className="text-white">Volume:</label>
                                                    <input type="range" min="0" max="1" step="0.1" value={volume} onChange={(e) => { setVolume(e.target.value); const v = document.querySelector('video'); if (v) v.volume = e.target.value; }} className="flex-1" />
                                                    <span className="text-white">{Math.round(volume * 100)}%</span>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <label className="text-white">Speed:</label>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 0.5; }} className="px-3 py-1 bg-gray-600 text-white rounded">0.5x</button>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 1; }} className="px-3 py-1 bg-gray-600 text-white rounded">1x</button>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 1.5; }} className="px-3 py-1 bg-gray-600 text-white rounded">1.5x</button>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 2; }} className="px-3 py-1 bg-gray-600 text-white rounded">2x</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {viewerArtwork.type === 'Music' && viewerArtwork.preview && (
                                        <div className="space-y-4">
                                            <div className={`p-8 rounded-lg ${isClassic ? 'bg-gray-100' : 'bg-gray-800'}`}>
                                                <div className="text-center mb-6">
                                                    <div className="text-6xl mb-4">🎵</div>
                                                    <h3 className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-white'}`}>{viewerArtwork.title}</h3>
                                                </div>
                                                <audio src={viewerArtwork.preview} controls className="w-full mb-4" />
                                                <div className="space-y-3">
                                                    <div className="flex items-center gap-4">
                                                        <label className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>Volume:</label>
                                                        <input type="range" min="0" max="1" step="0.1" value={volume} onChange={(e) => { setVolume(e.target.value); const a = document.querySelector('audio'); if (a) a.volume = e.target.value; }} className="flex-1" />
                                                        <span className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>{Math.round(volume * 100)}%</span>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <label className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>Speed:</label>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 0.5; }} className="px-3 py-1 bg-blue-600 text-white rounded">0.5x</button>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 1; }} className="px-3 py-1 bg-blue-600 text-white rounded">1x</button>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 1.5; }} className="px-3 py-1 bg-blue-600 text-white rounded">1.5x</button>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 2; }} className="px-3 py-1 bg-blue-600 text-white rounded">2x</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div className={`mt-6 p-4 rounded-lg ${isClassic ? 'bg-gray-100' : 'bg-gray-800'}`}>
                                        <h2 className={`text-2xl font-bold mb-2 ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>{viewerArtwork.title}</h2>
                                        <p className={`text-sm mb-2 ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>by {viewerArtwork.artist || 'Unknown'}</p>
                                        <p className={`${isClassic ? 'text-gray-700' : 'text-gray-300'}`}>{viewerArtwork.description || 'No description'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ProfilePage />, document.getElementById('app'));
    </script>
</body>
</html>
