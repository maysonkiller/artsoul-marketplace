<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ArtSoul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: { bg: '#f5f5f5', text: '#1a1a1a', accent: '#0066cc' },
                        future: { bg: '#0a0a0f', text: '#e0e0ff', neon: '#00ffff', pink: '#ff00ff', purple: '#8b00ff' },
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .gallery-item {
            transition: all 0.3s ease;
        }
        .gallery-item:hover {
            transform: translateY(-8px) scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useRef } = React;

        const GALLERY_TYPES = [
            { id: 'nft', label: 'NFT Gallery', icon: '🎨', fileType: 'Image' },
            { id: 'video', label: 'Video Gallery', icon: '🎬', fileType: 'Video' },
            { id: 'music', label: 'Music Gallery', icon: '🎵', fileType: 'Music' },
            { id: 'gif', label: 'GIF Gallery', icon: '🎞️', fileType: 'GIF' },
            { id: 'image', label: 'Image Gallery', icon: '🖼️', fileType: 'Image' },
            { id: 'physical', label: 'Physical Art', icon: '🎭', fileType: 'Image' },
        ];

        function ProfilePage() {
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'classic');
            const [profile, setProfile] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [selectedGallery, setSelectedGallery] = useState('nft');
            const [uploadingFor, setUploadingFor] = useState(null);
            const [uploadFormOpen, setUploadFormOpen] = useState(false);
            const [uploadedFile, setUploadedFile] = useState(null);
            const [artworkForm, setArtworkForm] = useState({ title: '', description: '', currentBid: 0 });
            const [viewerOpen, setViewerOpen] = useState(false);
            const [viewerArtwork, setViewerArtwork] = useState(null);
            const [zoom, setZoom] = useState(1);
            const [volume, setVolume] = useState(1);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [loginModalOpen, setLoginModalOpen] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const fileInputRef = useRef(null);

            const isClassic = theme === 'classic';

            // Load profile from localStorage
            useEffect(() => {
                const savedProfile = localStorage.getItem('userProfile');
                const authToken = localStorage.getItem('authToken');

                if (authToken) {
                    setIsAuthenticated(true);
                }

                if (savedProfile) {
                    setProfile(JSON.parse(savedProfile));
                } else {
                    // First time - show login modal
                    setProfile({
                        name: '',
                        avatar: '',
                        bio: '',
                        socials: { x: '', instagram: '', discord: '' },
                        galleries: {},
                    });
                    setLoginModalOpen(true);
                }
            }, []);

            // Auto-save profile when it changes
            useEffect(() => {
                if (profile && isAuthenticated) {
                    localStorage.setItem('userProfile', JSON.stringify(profile));
                }
            }, [profile, isAuthenticated]);

            // OAuth Login Functions
            const handleGoogleLogin = () => {
                // Google OAuth (будет реализовано с бэкендом)
                alert('Google OAuth will be implemented with backend integration');
                // Временно симулируем успешный вход
                const mockUser = {
                    name: 'Google User',
                    avatar: 'https://via.placeholder.com/150',
                    email: 'user@gmail.com',
                    authProvider: 'google'
                };
                localStorage.setItem('authToken', 'mock-google-token-' + Date.now());
                setIsAuthenticated(true);
                setProfile({...profile, ...mockUser});
                setLoginModalOpen(false);
            };

            const handleXLogin = () => {
                // X (Twitter) OAuth (будет реализовано с бэкендом)
                alert('X OAuth will be implemented with backend integration');
                // Временно симулируем успешный вход
                const mockUser = {
                    name: 'X User',
                    avatar: 'https://via.placeholder.com/150',
                    socials: { x: 'user', instagram: '', discord: '' },
                    authProvider: 'x'
                };
                localStorage.setItem('authToken', 'mock-x-token-' + Date.now());
                setIsAuthenticated(true);
                setProfile({...profile, ...mockUser});
                setLoginModalOpen(false);
            };

            const handleWalletLogin = () => {
                // Wallet Connect (будет реализовано с Web3)
                alert('Wallet authentication will be implemented with Web3 integration');
                const mockUser = {
                    name: 'Wallet User',
                    avatar: 'https://via.placeholder.com/150',
                    wallet: '0x' + Math.random().toString(36).substring(2, 10),
                    authProvider: 'wallet'
                };
                localStorage.setItem('authToken', 'mock-wallet-token-' + Date.now());
                setIsAuthenticated(true);
                setProfile({...profile, ...mockUser});
                setLoginModalOpen(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('authToken');
                localStorage.removeItem('userProfile');
                setIsAuthenticated(false);
                setProfile({
                    name: '',
                    avatar: '',
                    bio: '',
                    socials: { x: '', instagram: '', discord: '' },
                    galleries: {},
                });
                setLoginModalOpen(true);
            };

            // Get artworks for specific gallery
            const getGalleryArtworks = (galleryType) => {
                const allArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                return allArtworks.filter(art => {
                    if (galleryType === 'nft') return art.type === 'NFT';
                    if (galleryType === 'video') return art.type === 'Video';
                    if (galleryType === 'music') return art.type === 'Music';
                    if (galleryType === 'gif') return art.type === 'GIF';
                    if (galleryType === 'image') return art.type === 'Image' || art.type === 'Digital Art';
                    if (galleryType === 'physical') return art.type === 'Physical Art';
                    return false;
                });
            };

            // Handle avatar upload
            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setProfile({...profile, avatar: event.target.result});
                };
                reader.readAsDataURL(file);
            };

            // Save profile
            const saveProfile = () => {
                localStorage.setItem('userProfile', JSON.stringify(profile));
                setEditMode(false);
                // Force re-render to update X display
                setProfile({...profile});
                alert('Profile saved!');
            };

            // Handle quick upload for specific gallery
            const handleQuickUpload = (galleryType, fileType) => {
                setUploadingFor({ galleryType, fileType, label: GALLERY_TYPES.find(g => g.id === galleryType)?.label });
                fileInputRef.current.click();
            };

            // Process uploaded file
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !uploadingFor) return;

                // Create preview
                const reader = new FileReader();
                reader.onload = (event) => {
                    setUploadedFile({
                        file: file,
                        preview: event.target.result,
                        name: file.name.split('.')[0]
                    });
                    setArtworkForm({
                        title: file.name.split('.')[0],
                        description: '',
                        currentBid: 0
                    });
                    setUploadFormOpen(true);
                };
                reader.readAsDataURL(file);
            };

            // Save artwork from form
            const saveArtwork = () => {
                if (!uploadedFile || !uploadingFor) return;

                const newArtwork = {
                    id: Date.now(),
                    title: artworkForm.title || uploadedFile.name,
                    artist: profile.name || 'Anonymous',
                    type: uploadingFor.fileType,
                    description: artworkForm.description || 'No description',
                    currentBid: parseFloat(artworkForm.currentBid) || 0,
                    bids: [],
                    image: uploadedFile.preview,
                    uploadedBy: 'user'
                };

                // Save to localStorage
                const existingArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                existingArtworks.push(newArtwork);
                localStorage.setItem('artworks', JSON.stringify(existingArtworks));

                // Close form and open viewer
                setUploadFormOpen(false);
                setUploadingFor(null);
                setUploadedFile(null);
                setArtworkForm({ title: '', description: '', currentBid: 0 });

                // Open artwork viewer
                setViewerArtwork(newArtwork);
                setViewerOpen(true);
            };

            if (!profile) return <div className="flex items-center justify-center min-h-screen">Loading...</div>;

            const bgClass = isClassic
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            const currentGalleryArtworks = getGalleryArtworks(selectedGallery);

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isClassic ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-3">
                                        <a href="index.html" className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            ArtSoul
                                        </a>
                                        <div className={`flex gap-2 p-1 rounded-lg ${isClassic ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                            <button
                                                onClick={() => setTheme('classic')}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'classic'
                                                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {isClassic ? '📋 Classic' : '📋'}
                                            </button>
                                            <button
                                                onClick={() => setTheme('future')}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'future'
                                                        ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {theme === 'future' ? '🚀 Future' : '🚀'}
                                            </button>
                                        </div>
                                    </div>
                                    <a
                                        href="docs.html#vision"
                                        className={`text-xs mt-1 hover:underline ${isClassic ? 'text-gray-600 hover:text-blue-600' : 'text-purple-300 hover:text-cyan-400'}`}
                                    >
                                        Decentralized Art Marketplace
                                    </a>
                                </div>

                                <a href="index.html" className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                    isClassic ? 'bg-gray-600 text-white hover:bg-gray-700' : 'bg-gray-700 text-white hover:bg-gray-600'
                                }`}>
                                    Back to Gallery
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        {/* Profile Header */}
                        <div className={`rounded-xl p-8 mb-8 animate-fadeIn ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'}`}>
                            <div className="flex items-start gap-8">
                                {/* Avatar */}
                                <div className="flex-shrink-0">
                                    <div className={`w-32 h-32 rounded-full overflow-hidden ${isClassic ? 'bg-gray-200 border-4 border-blue-600' : 'bg-gradient-to-br from-purple-900 to-cyan-900 border-4 border-cyan-400 neon-border'}`}>
                                        {profile.avatar ? (
                                            <img src={profile.avatar} alt="Avatar" className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-5xl">
                                                👤
                                            </div>
                                        )}
                                    </div>
                                    {editMode && (
                                        <label className={`block mt-3 text-center text-sm cursor-pointer ${isClassic ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}`}>
                                            <input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" />
                                            Change Avatar
                                        </label>
                                    )}
                                </div>

                                {/* Profile Info */}
                                <div className="flex-1">
                                    {editMode ? (
                                        <div className="space-y-4">
                                            <input
                                                type="text"
                                                value={profile.name}
                                                onChange={(e) => setProfile({...profile, name: e.target.value})}
                                                placeholder="Your Name"
                                                className={`w-full px-4 py-3 rounded-lg text-2xl font-bold ${
                                                    isClassic
                                                        ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <textarea
                                                value={profile.bio}
                                                onChange={(e) => setProfile({...profile, bio: e.target.value})}
                                                placeholder="Tell us about yourself..."
                                                rows={3}
                                                className={`w-full px-4 py-3 rounded-lg ${
                                                    isClassic
                                                        ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                        : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                } outline-none`}
                                            />
                                            <div className="grid grid-cols-3 gap-4">
                                                <input
                                                    type="text"
                                                    value={profile.socials.x}
                                                    onChange={(e) => setProfile({...profile, socials: {...profile.socials, x: e.target.value}})}
                                                    placeholder="X (Twitter) handle"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                                <input
                                                    type="text"
                                                    value={profile.socials.instagram}
                                                    onChange={(e) => setProfile({...profile, socials: {...profile.socials, instagram: e.target.value}})}
                                                    placeholder="Instagram handle"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                                <input
                                                    type="text"
                                                    value={profile.socials.discord}
                                                    onChange={(e) => setProfile({...profile, socials: {...profile.socials, discord: e.target.value}})}
                                                    placeholder="Discord username"
                                                    className={`px-4 py-2 rounded-lg ${
                                                        isClassic
                                                            ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                            : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                                    } outline-none`}
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <h1 className={`text-4xl font-bold mb-3 ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                                {profile.name || 'Anonymous Artist'}
                                            </h1>
                                            <p className={`text-lg mb-4 ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                                {profile.bio || 'No bio yet'}
                                            </p>
                                            <div className="flex gap-4 items-center">
                                                {profile.socials?.x && (
                                                    <a href={`https://x.com/${profile.socials.x.replace('@', '')}`} target="_blank" className={`flex items-center gap-3 px-4 py-2 rounded-lg ${isClassic ? 'bg-gray-100 hover:bg-gray-200' : 'bg-gray-800/50 hover:bg-gray-700/50'} transition-all`}>
                                                        <img src={`https://unavatar.io/twitter/${profile.socials.x.replace('@', '')}`} alt="X Avatar" className="w-10 h-10 rounded-full" />
                                                        <span className={`font-medium ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>@{profile.socials.x.replace('@', '')}</span>
                                                    </a>
                                                )}
                                                {profile.socials.instagram && (
                                                    <a href={`https://instagram.com/${profile.socials.instagram}`} target="_blank" className={`px-4 py-2 rounded-lg ${isClassic ? 'bg-pink-100 text-pink-700' : 'bg-pink-900/50 text-pink-300'}`}>
                                                        📷 Instagram
                                                    </a>
                                                )}
                                                {profile.socials.discord && (
                                                    <span className={`px-4 py-2 rounded-lg ${isClassic ? 'bg-purple-100 text-purple-700' : 'bg-purple-900/50 text-purple-300'}`}>
                                                        💬 {profile.socials.discord}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-6 flex gap-4">
                                        {editMode ? (
                                            <>
                                                <button
                                                    onClick={saveProfile}
                                                    className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                                        isClassic
                                                            ? 'bg-green-600 text-white hover:bg-green-700 shadow-lg'
                                                            : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover:shadow-2xl neon-border'
                                                    }`}
                                                >
                                                    Save Profile
                                                </button>
                                                <button
                                                    onClick={() => setEditMode(false)}
                                                    className={`px-6 py-2 rounded-lg font-medium ${
                                                        isClassic ? 'bg-gray-300 text-gray-700' : 'bg-gray-700 text-gray-300'
                                                    }`}
                                                >
                                                    Cancel
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <button
                                                    onClick={() => setEditMode(true)}
                                                    className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                                        isClassic
                                                            ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg'
                                                            : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                                    }`}
                                                >
                                                    Edit Profile
                                                </button>
                                                <button
                                                    onClick={handleLogout}
                                                    className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                                        isClassic
                                                            ? 'bg-red-600 text-white hover:bg-red-700 shadow-lg'
                                                            : 'bg-gradient-to-r from-red-500 to-pink-500 text-white hover:shadow-2xl'
                                                    }`}
                                                >
                                                    Logout
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Gallery Tabs */}
                        <div className={`rounded-xl p-6 mb-6 ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                            <h2 className={`text-2xl font-bold mb-4 ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                My Galleries
                            </h2>
                            <div className="flex flex-wrap gap-3">
                                {GALLERY_TYPES.map(gallery => (
                                    <button
                                        key={gallery.id}
                                        onClick={() => setSelectedGallery(gallery.id)}
                                        className={`px-6 py-3 rounded-lg font-medium transform hover:scale-105 ${
                                            selectedGallery === gallery.id
                                                ? isClassic
                                                    ? 'bg-blue-600 text-white shadow-lg'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white neon-border'
                                                : isClassic
                                                    ? 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                    : 'bg-gray-800/50 text-gray-300 hover:bg-gray-700/50'
                                        }`}
                                    >
                                        {gallery.icon} {gallery.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Gallery Content */}
                        <div className={`rounded-xl p-6 ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                            <div className="flex items-center justify-between mb-6">
                                <h3 className={`text-xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-300'}`}>
                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.label}
                                </h3>
                                <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                    {currentGalleryArtworks.length} items
                                </span>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {/* Add New Button */}
                                <div
                                    onClick={() => {
                                        const gallery = GALLERY_TYPES.find(g => g.id === selectedGallery);
                                        handleQuickUpload(selectedGallery, gallery.fileType);
                                    }}
                                    className={`aspect-square rounded-lg flex flex-col items-center justify-center cursor-pointer gallery-item ${
                                        isClassic
                                            ? 'bg-gray-100 border-2 border-dashed border-gray-300 hover:bg-gray-200 hover:border-blue-600'
                                            : 'bg-gray-800/30 border-2 border-dashed border-cyan-500/30 hover:bg-gray-700/50 hover:border-cyan-400 neon-border'
                                    }`}
                                >
                                    <div className={`text-5xl mb-2 ${isClassic ? 'text-gray-400' : 'text-cyan-400'}`}>
                                        ➕
                                    </div>
                                    <div className={`text-sm font-medium ${isClassic ? 'text-gray-600' : 'text-cyan-300'}`}>
                                        Add New
                                    </div>
                                </div>

                                {/* Existing Artworks */}
                                {currentGalleryArtworks.map(artwork => (
                                    <div
                                        key={artwork.id}
                                        onClick={() => {
                                            setViewerArtwork(artwork);
                                            setViewerOpen(true);
                                            setZoom(1);
                                        }}
                                        className={`aspect-square rounded-lg overflow-hidden cursor-pointer gallery-item ${
                                            isClassic ? 'bg-gray-50 shadow-md hover:shadow-xl' : 'bg-gray-800/50 backdrop-blur-sm hover:shadow-cyan-500/50'
                                        }`}
                                    >
                                        {artwork.image ? (
                                            artwork.type === 'Music' ? (
                                                <div className={`w-full h-full flex items-center justify-center ${
                                                    isClassic ? 'bg-gray-200' : 'bg-gradient-to-br from-purple-900/50 to-cyan-900/50'
                                                }`}>
                                                    <div className="text-center p-4">
                                                        <div className={`text-6xl mb-2 ${isClassic ? 'text-gray-400' : 'text-cyan-400'}`}>🎵</div>
                                                        <div className={`text-sm font-bold ${isClassic ? 'text-gray-700' : 'text-cyan-300'}`}>
                                                            {artwork.title}
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : artwork.type === 'Video' ? (
                                                <video src={artwork.image} className="w-full h-full object-cover" />
                                            ) : (
                                                <img src={artwork.image} alt={artwork.title} className="w-full h-full object-cover" />
                                            )
                                        ) : (
                                            <div className={`w-full h-full flex items-center justify-center ${
                                                isClassic ? 'bg-gray-200' : 'bg-gradient-to-br from-purple-900/50 to-cyan-900/50'
                                            }`}>
                                                <div className="text-center p-4">
                                                    <div className={`text-4xl mb-2 ${isClassic ? 'text-gray-400' : 'text-cyan-400'}`}>
                                                        {GALLERY_TYPES.find(g => g.id === selectedGallery)?.icon}
                                                    </div>
                                                    <div className={`text-xs ${isClassic ? 'text-gray-500' : 'text-purple-300'}`}>
                                                        {artwork.title}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}

                                {/* Empty Placeholders */}
                                {currentGalleryArtworks.length === 0 && (
                                    <>
                                        {[...Array(7)].map((_, i) => (
                                            <div
                                                key={i}
                                                onClick={() => {
                                                    const gallery = GALLERY_TYPES.find(g => g.id === selectedGallery);
                                                    handleQuickUpload(selectedGallery, gallery.fileType);
                                                }}
                                                className={`aspect-square rounded-lg flex items-center justify-center cursor-pointer gallery-item ${
                                                    isClassic
                                                        ? 'bg-gray-50 border border-gray-200 hover:bg-gray-100'
                                                        : 'bg-gray-800/30 border border-cyan-500/10 hover:bg-gray-700/50'
                                                }`}
                                            >
                                                <div className={`text-4xl ${isClassic ? 'text-gray-300' : 'text-cyan-400/30'}`}>
                                                    {GALLERY_TYPES.find(g => g.id === selectedGallery)?.icon}
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Hidden file input for quick upload */}
                    <input
                        ref={fileInputRef}
                        type="file"
                        className="hidden"
                        accept="image/*,video/*,audio/*"
                        onChange={handleFileUpload}
                    />

                    {/* Upload Form Modal */}
                    {uploadFormOpen && uploadedFile && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4" onClick={() => setUploadFormOpen(false)}>
                            <div className={`relative max-w-2xl w-full rounded-xl p-8 ${isClassic ? 'bg-white' : 'bg-gray-900 border border-cyan-500/30'}`} onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setUploadFormOpen(false)} className="absolute top-4 right-4 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">✕</button>

                                <h2 className={`text-3xl font-bold mb-6 ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>
                                    Upload Artwork Details
                                </h2>

                                {/* Preview */}
                                <div className="mb-6">
                                    {uploadingFor?.fileType === 'Music' ? (
                                        <div className={`p-8 rounded-lg text-center ${isClassic ? 'bg-gray-100' : 'bg-gray-800/50'}`}>
                                            <div className="text-6xl mb-4">🎵</div>
                                            <audio src={uploadedFile.preview} controls className="w-full" />
                                        </div>
                                    ) : uploadingFor?.fileType === 'Video' ? (
                                        <video src={uploadedFile.preview} controls className="w-full rounded-lg" />
                                    ) : (
                                        <img src={uploadedFile.preview} alt="Preview" className="w-full rounded-lg" />
                                    )}
                                </div>

                                {/* Form */}
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-bold mb-2 ${isClassic ? 'text-gray-700' : 'text-cyan-300'}`}>
                                            Title
                                        </label>
                                        <input
                                            type="text"
                                            value={artworkForm.title}
                                            onChange={(e) => setArtworkForm({...artworkForm, title: e.target.value})}
                                            placeholder="Artwork title"
                                            className={`w-full px-4 py-3 rounded-lg ${
                                                isClassic
                                                    ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                    : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                            } outline-none focus:ring-2 focus:ring-cyan-400`}
                                        />
                                    </div>

                                    <div>
                                        <label className={`block text-sm font-bold mb-2 ${isClassic ? 'text-gray-700' : 'text-cyan-300'}`}>
                                            Description
                                        </label>
                                        <textarea
                                            value={artworkForm.description}
                                            onChange={(e) => setArtworkForm({...artworkForm, description: e.target.value})}
                                            placeholder="Describe your artwork..."
                                            rows={4}
                                            className={`w-full px-4 py-3 rounded-lg ${
                                                isClassic
                                                    ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                    : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                            } outline-none focus:ring-2 focus:ring-cyan-400`}
                                        />
                                    </div>

                                    <div>
                                        <label className={`block text-sm font-bold mb-2 ${isClassic ? 'text-gray-700' : 'text-cyan-300'}`}>
                                            Starting Bid (ETH)
                                        </label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={artworkForm.currentBid}
                                            onChange={(e) => setArtworkForm({...artworkForm, currentBid: e.target.value})}
                                            placeholder="0.00"
                                            className={`w-full px-4 py-3 rounded-lg ${
                                                isClassic
                                                    ? 'bg-gray-50 border border-gray-300 text-gray-900'
                                                    : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100'
                                            } outline-none focus:ring-2 focus:ring-cyan-400`}
                                        />
                                    </div>

                                    <button
                                        onClick={saveArtwork}
                                        className={`w-full py-4 rounded-lg font-bold text-lg transform hover:scale-105 transition-all ${
                                            isClassic
                                                ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg'
                                                : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl'
                                        }`}
                                    >
                                        Save & View Artwork
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Login Modal */}
                    {loginModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm p-4">
                            <div className={`relative max-w-md w-full rounded-xl p-8 ${isClassic ? 'bg-white' : 'bg-gray-900 border border-cyan-500/30'}`}>
                                <h2 className={`text-3xl font-bold mb-2 text-center ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>
                                    Welcome to ArtSoul
                                </h2>
                                <p className={`text-center mb-8 ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                    Sign in to access your profile
                                </p>

                                <div className="space-y-4">
                                    {/* Google Login */}
                                    <button
                                        onClick={handleGoogleLogin}
                                        className={`w-full py-4 px-6 rounded-lg font-bold text-lg flex items-center justify-center gap-3 transform hover:scale-105 transition-all ${
                                            isClassic
                                                ? 'bg-white border-2 border-gray-300 text-gray-900 hover:bg-gray-50'
                                                : 'bg-gray-800 border-2 border-cyan-500/30 text-white hover:bg-gray-700'
                                        }`}
                                    >
                                        <svg className="w-6 h-6" viewBox="0 0 24 24">
                                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                        </svg>
                                        Continue with Google
                                    </button>

                                    {/* X (Twitter) Login */}
                                    <button
                                        onClick={handleXLogin}
                                        className={`w-full py-4 px-6 rounded-lg font-bold text-lg flex items-center justify-center gap-3 transform hover:scale-105 transition-all ${
                                            isClassic
                                                ? 'bg-black text-white hover:bg-gray-800'
                                                : 'bg-gradient-to-r from-gray-800 to-gray-900 text-white hover:shadow-2xl border border-cyan-500/30'
                                        }`}
                                    >
                                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                        </svg>
                                        Continue with X
                                    </button>

                                    {/* Wallet Login */}
                                    <button
                                        onClick={handleWalletLogin}
                                        className={`w-full py-4 px-6 rounded-lg font-bold text-lg flex items-center justify-center gap-3 transform hover:scale-105 transition-all ${
                                            isClassic
                                                ? 'bg-blue-600 text-white hover:bg-blue-700'
                                                : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl'
                                        }`}
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                                        </svg>
                                        Connect Wallet
                                    </button>
                                </div>

                                <p className={`text-xs text-center mt-6 ${isClassic ? 'text-gray-500' : 'text-gray-500'}`}>
                                    🔒 Secure authentication with industry-standard OAuth 2.0
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-16 pb-8 text-center">
                        <div className="mb-4">
                            <a
                                href="docs.html"
                                className={`inline-block px-6 py-3 rounded-lg font-medium transform hover:scale-105 ${
                                    isClassic
                                        ? 'bg-green-600 text-white hover:bg-green-700 shadow-lg'
                                        : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover:shadow-2xl'
                                }`}
                            >
                                {isClassic ? '📚' : '⚡'} Documentation
                            </a>
                        </div>
                        <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isClassic ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                        <p className={`text-xs mt-2 ${isClassic ? 'text-gray-500' : 'text-gray-500'}`}>
                            Multi-chain decentralized art auction platform
                        </p>
                    </footer>

                    {/* Artwork Viewer Modal */}
                    {viewerOpen && viewerArtwork && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4" onClick={() => setViewerOpen(false)}>
                            <div className="relative max-w-6xl w-full max-h-screen overflow-auto" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setViewerOpen(false)} className="absolute top-4 right-4 z-10 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">✕ Close</button>
                                <div className={`rounded-xl p-6 ${isClassic ? 'bg-white' : 'bg-gray-900'}`}>
                                    {(viewerArtwork.type === 'Image' || viewerArtwork.type === 'NFT' || viewerArtwork.type === 'GIF' || viewerArtwork.type === 'Digital Art') && viewerArtwork.image && (
                                        <div className="space-y-4">
                                            <div className="overflow-auto max-h-[70vh]">
                                                <img src={viewerArtwork.image} alt={viewerArtwork.title} style={{transform: `scale(${zoom})`}} className="w-full transition-transform" />
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <button onClick={() => setZoom(Math.max(0.5, zoom - 0.25))} className="px-4 py-2 bg-blue-600 text-white rounded">-</button>
                                                <span className="text-white">Zoom: {zoom.toFixed(2)}x</span>
                                                <button onClick={() => setZoom(Math.min(3, zoom + 0.25))} className="px-4 py-2 bg-blue-600 text-white rounded">+</button>
                                                <button onClick={() => setZoom(1)} className="px-4 py-2 bg-gray-600 text-white rounded">Reset</button>
                                            </div>
                                            <div className="text-white">
                                                <h2 className="text-3xl font-bold mb-2">{viewerArtwork.title}</h2>
                                                <p className="text-gray-400 mb-2">by {viewerArtwork.artist}</p>
                                                <p className="text-gray-300">{viewerArtwork.description}</p>
                                                <p className="text-cyan-400 font-bold mt-4">Floor: {viewerArtwork.currentBid} ETH</p>
                                            </div>
                                        </div>
                                    )}
                                    {viewerArtwork.type === 'Video' && viewerArtwork.image && (
                                        <div className="space-y-4">
                                            <video src={viewerArtwork.image} controls className="w-full max-h-[70vh]" />
                                            <div className="space-y-2">
                                                <div className="flex items-center gap-4">
                                                    <label className="text-white">Volume:</label>
                                                    <input type="range" min="0" max="1" step="0.1" value={volume} onChange={(e) => { setVolume(e.target.value); const v = document.querySelector('video'); if (v) v.volume = e.target.value; }} className="flex-1" />
                                                    <span className="text-white">{Math.round(volume * 100)}%</span>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <label className="text-white">Speed:</label>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 0.5; }} className="px-3 py-1 bg-gray-600 text-white rounded">0.5x</button>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 1; }} className="px-3 py-1 bg-gray-600 text-white rounded">1x</button>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 1.5; }} className="px-3 py-1 bg-gray-600 text-white rounded">1.5x</button>
                                                    <button onClick={() => { const v = document.querySelector('video'); if (v) v.playbackRate = 2; }} className="px-3 py-1 bg-gray-600 text-white rounded">2x</button>
                                                </div>
                                            </div>
                                            <div className="text-white">
                                                <h2 className="text-3xl font-bold mb-2">{viewerArtwork.title}</h2>
                                                <p className="text-gray-400 mb-2">by {viewerArtwork.artist}</p>
                                                <p className="text-gray-300">{viewerArtwork.description}</p>
                                                <p className="text-cyan-400 font-bold mt-4">Floor: {viewerArtwork.currentBid} ETH</p>
                                            </div>
                                        </div>
                                    )}
                                    {viewerArtwork.type === 'Music' && viewerArtwork.image && (
                                        <div className="space-y-4">
                                            <div className={`p-8 rounded-lg ${isClassic ? 'bg-gray-100' : 'bg-gray-800'}`}>
                                                <div className="text-center mb-6">
                                                    <div className="text-6xl mb-4">🎵</div>
                                                    <h3 className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-white'}`}>{viewerArtwork.title}</h3>
                                                </div>
                                                <audio src={viewerArtwork.image} controls className="w-full mb-4" />
                                                <div className="space-y-3">
                                                    <div className="flex items-center gap-4">
                                                        <label className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>Volume:</label>
                                                        <input type="range" min="0" max="1" step="0.1" value={volume} onChange={(e) => { setVolume(e.target.value); const a = document.querySelector('audio'); if (a) a.volume = e.target.value; }} className="flex-1" />
                                                        <span className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>{Math.round(volume * 100)}%</span>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <label className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>Speed:</label>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 0.5; }} className="px-3 py-1 bg-blue-600 text-white rounded">0.5x</button>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 1; }} className="px-3 py-1 bg-blue-600 text-white rounded">1x</button>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 1.5; }} className="px-3 py-1 bg-blue-600 text-white rounded">1.5x</button>
                                                        <button onClick={() => { const a = document.querySelector('audio'); if (a) a.playbackRate = 2; }} className="px-3 py-1 bg-blue-600 text-white rounded">2x</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className={`${isClassic ? 'text-gray-900' : 'text-white'}`}>
                                                <p className="text-gray-400 mb-2">by {viewerArtwork.artist}</p>
                                                <p className={`${isClassic ? 'text-gray-700' : 'text-gray-300'}`}>{viewerArtwork.description}</p>
                                                <p className="text-cyan-400 font-bold mt-4">Floor: {viewerArtwork.currentBid} ETH</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ProfilePage />, document.getElementById('app'));
    </script>
</body>
</html>
