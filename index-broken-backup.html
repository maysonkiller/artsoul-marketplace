<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="og:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="og:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="og:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://maysonkiller.github.io/artsoul-marketplace/">
    <meta property="twitter:title" content="ArtSoul - Decentralized Art Marketplace">
    <meta property="twitter:description" content="Revolutionary platform for decentralized art where value is determined by the community through transparent auctions">
    <meta property="twitter:image" content="https://maysonkiller.github.io/artsoul-marketplace/og-image.png">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Web3Modal (AppKit) Configuration -->
    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.0.0'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.0.0'
        import { mainnet, polygon, bsc, arbitrum, optimism, base, sepolia, polygonAmoy, bscTestnet } from 'https://esm.sh/@reown/appkit/networks'

        // WalletConnect Project ID
        const projectId = '9fdc97f91c02d46a28ca9d185a9e58f2'

        // Custom Rialo Playground Network
        const rialoPlayground = {
            chainId: 2025,
            name: 'Rialo Playground',
            currency: 'RIA',
            explorerUrl: 'https://playground.rialo.io',
            rpcUrl: 'https://playground.rialo.io/rpc',
            testnet: true
        }

        // All supported networks (Mainnets + Testnets + Rialo)
        const networks = [
            // Mainnets
            mainnet,
            polygon,
            bsc,
            base,
            arbitrum,
            optimism,
            // Testnets
            sepolia,
            polygonAmoy,
            bscTestnet,
            // Custom: Rialo
            rialoPlayground
        ]

        // Metadata
        const metadata = {
            name: 'ArtSoul Marketplace',
            description: 'Decentralized Art Marketplace - Where community determines value through transparent auctions',
            url: 'https://maysonkiller.github.io/artsoul-marketplace',
            icons: ['https://maysonkiller.github.io/artsoul-marketplace/logo.png']
        }

        // Create AppKit instance
        window.modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks,
            defaultNetwork: polygon,
            metadata,
            projectId,
            features: {
                analytics: true,
                email: true,
                socials: ['google', 'x', 'apple', 'discord'],
                emailShowWallets: true,
                onramp: true,
                swaps: true
            },
            themeMode: 'dark',
            themeVariables: {
                '--w3m-accent': '#06b6d4',
                '--w3m-border-radius-master': '8px'
            }
        })

        // Listen to modal events
        window.modal.subscribeProvider((state) => {
            window.dispatchEvent(new CustomEvent('walletStateChange', { detail: state }))
        })
    </script>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out; }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
        .neon-glow { text-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4, 0 0 30px #06b6d4; }
        .neon-border { box-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4; }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3); }
        .classic-hover { transition: all 0.2s ease; }
        .classic-hover:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Network configurations
        const NETWORKS = {
            1: { name: 'Ethereum', icon: '⟠', color: '#627EEA' },
            137: { name: 'Polygon', icon: '⬡', color: '#8247E5' },
            56: { name: 'BSC', icon: '◆', color: '#F3BA2F' },
            8453: { name: 'Base', icon: '◬', color: '#0052FF' },
            42161: { name: 'Arbitrum', icon: '◉', color: '#28A0F0' },
            10: { name: 'Optimism', icon: '◎', color: '#FF0420' },
            11155111: { name: 'Sepolia', icon: '⟠', color: '#627EEA' },
            80002: { name: 'Polygon Amoy', icon: '⬡', color: '#8247E5' },
            97: { name: 'BSC Testnet', icon: '◆', color: '#F3BA2F' },
            2025: { name: 'Rialo Playground', icon: '◈', color: '#00D4FF' }
        };

        const REQUIRED_CHAIN_ID = 137; // Default to Polygon

        const mockArtworks = [
            { id: 1, title: 'Soul Flame', artist: 'Maysonkiller', type: 'NFT', description: 'A burning representation of the digital soul', currentBid: 0.5, bids: [0.3, 0.4, 0.5], image: 'artwork-sample.jpg' },
            { id: 2, title: 'Neon Dreams', artist: 'CryptoArtist', type: 'Digital Art', description: 'Futuristic cityscape in neon colors', currentBid: 1.2, bids: [0.8, 1.0, 1.2] },
            { id: 3, title: 'Silent Choir', artist: 'Maysonkiller', type: 'Video', description: 'An audiovisual journey through silence', currentBid: 0.8, bids: [0.5, 0.7, 0.8] },
            { id: 4, title: 'Cosmic Melancholy', artist: 'StarGazer', type: 'GIF', description: 'Animated loop of cosmic emotions', currentBid: 0.3, bids: [0.1, 0.2, 0.3] },
            { id: 5, title: 'Real Canvas #1', artist: 'TraditionalArt', type: 'Physical Art', description: 'Oil painting on canvas - tokenized', currentBid: 2.5, bids: [1.5, 2.0, 2.5] },
            { id: 6, title: 'Pixel Poetry', artist: 'DigitalPoet', type: 'Image', description: 'Generative pixel art with hidden meaning', currentBid: 0.6, bids: [0.4, 0.5, 0.6] },
        ];

        function App() {
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'classic');
            const [connected, setConnected] = useState(false);
            const [address, setAddress] = useState('');
            const [chainId, setChainId] = useState(null);
            const [showNetworkModal, setShowNetworkModal] = useState(false);
            const [allArtworks, setAllArtworks] = useState([]);
            const [selectedArtwork, setSelectedArtwork] = useState(null);
            const [filter, setFilter] = useState('all');

            const isClassic = theme === 'classic';

            // Load artworks
            useEffect(() => {
                const uploadedArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                const combined = [...mockArtworks, ...uploadedArtworks];
                setAllArtworks(combined);
                setSelectedArtwork(combined[0]);
            }, []);

            // Listen to wallet state changes
            useEffect(() => {
                const handleWalletChange = (event) => {
                    const state = event.detail;
                    setConnected(state.isConnected || false);
                    setAddress(state.address || '');
                    setChainId(state.chainId || null);

                    // Check if on wrong network
                    if (state.isConnected && state.chainId && state.chainId !== REQUIRED_CHAIN_ID) {
                        setShowNetworkModal(true);
                    } else {
                        setShowNetworkModal(false);
                    }
                };

                window.addEventListener('walletStateChange', handleWalletChange);
                return () => window.removeEventListener('walletStateChange', handleWalletChange);
            }, []);

            const handleConnect = async () => {
                if (window.modal) {
                    await window.modal.open();
                }
            };

            const handleDisconnect = async () => {
                if (window.modal) {
                    await window.modal.disconnect();
                }
            };

            const switchNetwork = async (targetChainId) => {
                if (window.modal) {
                    try {
                        await window.modal.switchNetwork(targetChainId);
                        setShowNetworkModal(false);
                    } catch (error) {
                        console.error('Failed to switch network:', error);
                        alert('Failed to switch network. Please try manually in your wallet.');
                    }
                }
            };

            const openNetworkSelector = async () => {
                if (window.modal) {
                    await window.modal.open({ view: 'Networks' });
                }
            };

            const filteredArtworks = filter === 'all'
                ? allArtworks
                : allArtworks.filter(art => art.type === filter);

            const bgClass = isClassic
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isClassic ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-3">
                                        <a href="index.html" className={`text-2xl font-bold ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            ArtSoul
                                        </a>
                                        <div className={`flex gap-2 p-1 rounded-lg ${isClassic ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                            <button
                                                onClick={() => {
                                                    setTheme('classic');
                                                    localStorage.setItem('theme', 'classic');
                                                }}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'classic'
                                                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {isClassic ? '📋 Classic' : '📋'}
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setTheme('future');
                                                    localStorage.setItem('theme', 'future');
                                                }}
                                                className={`px-3 py-1 rounded-md font-medium text-sm transform hover:scale-105 ${
                                                    theme === 'future'
                                                        ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                        : isClassic ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                                }`}
                                            >
                                                {theme === 'future' ? '🚀 Future' : '🚀'}
                                            </button>
                                        </div>
                                    </div>
                                    <a
                                        href="docs.html#vision"
                                        className={`text-xs mt-1 hover:underline ${isClassic ? 'text-gray-600 hover:text-blue-600' : 'text-purple-300 hover:text-cyan-400'}`}
                                    >
                                        Decentralized Art Marketplace
                                    </a>
                                </div>

                                <div className="flex items-center gap-3 flex-wrap">
                                    <a href="upload.html" className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${isClassic ? 'bg-purple-600 text-white hover:bg-purple-700 shadow-lg' : 'bg-gradient-to-r from-pink-500 to-purple-500 text-white hover:shadow-2xl hover-lift'}`}>
                                        {isClassic ? '📤' : '💫'} Upload
                                    </a>

                                    <a href="profile.html" className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${isClassic ? 'bg-gray-600 text-white hover:bg-gray-700 shadow-lg' : 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:shadow-2xl hover-lift'}`}>
                                        {isClassic ? '👤' : '🎭'} Profile
                                    </a>

                                    {connected && chainId && (
                                        <button
                                            onClick={openNetworkSelector}
                                            className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                                isClassic ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-800 text-cyan-400 hover:bg-gray-700 border border-cyan-500/30'
                                            }`}
                                            title="Switch Network"
                                        >
                                            <span style={{ color: NETWORKS[chainId]?.color }}>{NETWORKS[chainId]?.icon}</span>
                                            <span className="hidden sm:inline">{NETWORKS[chainId]?.name || 'Unknown'}</span>
                                        </button>
                                    )}

                                    <button
                                        onClick={connected ? handleDisconnect : handleConnect}
                                        className={`px-4 py-2 rounded-lg font-medium transform hover:scale-105 flex items-center gap-2 ${
                                            connected
                                                ? isClassic ? 'bg-green-600 text-white shadow-lg' : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover-lift'
                                                : isClassic ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg' : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl hover-lift'
                                        }`}
                                    >
                                        {connected ? (
                                            <>
                                                {isClassic ? '✅' : '🔗'}
                                                <span className="hidden sm:inline">{address.slice(0, 6)}...{address.slice(-4)}</span>
                                                <span className="sm:hidden">{address.slice(0, 4)}...</span>
                                            </>
                                        ) : (
                                            <>{isClassic ? '🔌 Connect' : '⚡ Connect'}</>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Network Warning Modal */}
                    {showNetworkModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm p-4">
                            <div className={`max-w-md w-full rounded-xl p-8 ${isClassic ? 'bg-white' : 'bg-gray-900 border border-red-500/50'}`}>
                                <div className="text-center mb-6">
                                    <div className="text-6xl mb-4">⚠️</div>
                                    <h2 className={`text-2xl font-bold mb-2 ${isClassic ? 'text-gray-900' : 'text-red-400'}`}>
                                        Wrong Network
                                    </h2>
                                    <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                        Please switch to {NETWORKS[REQUIRED_CHAIN_ID].name} to continue
                                    </p>
                                </div>

                                <div className={`p-4 rounded-lg mb-6 ${isClassic ? 'bg-gray-100' : 'bg-gray-800/50'}`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>Current Network:</span>
                                        <span className={`font-bold flex items-center gap-2 ${isClassic ? 'text-red-600' : 'text-red-400'}`}>
                                            <span style={{ color: NETWORKS[chainId]?.color }}>{NETWORKS[chainId]?.icon}</span>
                                            {NETWORKS[chainId]?.name || 'Unknown'}
                                        </span>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>Required Network:</span>
                                        <span className={`font-bold flex items-center gap-2 ${isClassic ? 'text-green-600' : 'text-green-400'}`}>
                                            <span style={{ color: NETWORKS[REQUIRED_CHAIN_ID].color }}>{NETWORKS[REQUIRED_CHAIN_ID].icon}</span>
                                            {NETWORKS[REQUIRED_CHAIN_ID].name}
                                        </span>
                                    </div>
                                </div>

                                <button
                                    onClick={() => switchNetwork(REQUIRED_CHAIN_ID)}
                                    className={`w-full py-4 rounded-lg font-bold text-lg transform hover:scale-105 transition-all mb-3 ${
                                        isClassic ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl'
                                    }`}
                                >
                                    Switch to {NETWORKS[REQUIRED_CHAIN_ID].name}
                                </button>

                                <button
                                    onClick={openNetworkSelector}
                                    className={`w-full py-3 rounded-lg font-medium mb-3 ${
                                        isClassic ? 'bg-gray-200 text-gray-700 hover:bg-gray-300' : 'bg-gray-800 text-cyan-400 hover:bg-gray-700'
                                    }`}
                                >
                                    Choose Different Network
                                </button>

                                <button
                                    onClick={() => setShowNetworkModal(false)}
                                    className={`w-full py-2 rounded-lg font-medium text-sm ${
                                        isClassic ? 'text-gray-600 hover:bg-gray-100' : 'text-gray-400 hover:bg-gray-800'
                                    }`}
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-16">
                        <div className="text-center mb-12">
                            <h1 className={`text-5xl font-bold mb-4 animate-fadeIn ${isClassic ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                Welcome to ArtSoul
                            </h1>
                            <p className={`text-xl mb-8 animate-fadeIn ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                                Decentralized Art Marketplace powered by Web3Modal
                            </p>
                            {!connected && (
                                <button
                                    onClick={handleConnect}
                                    className={`px-8 py-4 rounded-lg font-bold text-xl transform hover:scale-105 animate-fadeIn ${
                                        isClassic ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg' : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                    }`}
                                >
                                    Connect Wallet
                                </button>
                            )}
                        </div>

                        {/* Features Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
                            <div className={`p-6 rounded-xl ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                                <div className="text-4xl mb-4">🎨</div>
                                <h3 className={`text-xl font-bold mb-2 ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>
                                    Multi-Chain Support
                                </h3>
                                <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                    Ethereum, Polygon, BSC, Base, Arbitrum, Optimism, and Rialo Playground
                                </p>
                            </div>

                            <div className={`p-6 rounded-xl ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                                <div className="text-4xl mb-4">🔐</div>
                                <h3 className={`text-xl font-bold mb-2 ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>
                                    Social Login
                                </h3>
                                <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                    Connect with Google, X, Apple, Discord, or Email
                                </p>
                            </div>

                            <div className={`p-6 rounded-xl ${isClassic ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                                <div className="text-4xl mb-4">📱</div>
                                <h3 className={`text-xl font-bold mb-2 ${isClassic ? 'text-gray-900' : 'text-cyan-400'}`}>
                                    Mobile Ready
                                </h3>
                                <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-gray-400'}`}>
                                    Deep linking support for iOS and Android wallets
                                </p>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="mt-16 pb-8 text-center">
                        <div className="mb-4">
                            <a href="docs.html" className={`inline-block px-6 py-3 rounded-lg font-medium transform hover:scale-105 ${isClassic ? 'bg-green-600 text-white hover:bg-green-700 shadow-lg' : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover:shadow-2xl'}`}>
                                {isClassic ? '📚' : '⚡'} Documentation
                            </a>
                        </div>
                        <p className={`text-sm ${isClassic ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isClassic ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                        <p className={`text-xs mt-2 ${isClassic ? 'text-gray-500' : 'text-gray-500'}`}>
                            Multi-chain decentralized art auction platform
                        </p>
                    </footer>

                    {/* Background Effects for Future Theme */}
                    {!isClassic && (
                        <div className="fixed inset-0 pointer-events-none overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-br from-purple-900/20 via-transparent to-cyan-900/20" />
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse-slow" />
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl animate-pulse-slow" style={{animationDelay: '2s'}} />
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
