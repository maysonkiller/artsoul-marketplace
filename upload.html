<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - ArtSoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010101; color: #e8e3d5; }
        header { background: rgba(1, 1, 1, 0.95); border-bottom: 1px solid #a9ddd3; }
        .btn-main { background: #e8e3d5; color: #010101; padding: 0.75rem 2rem; border-radius: 0.375rem; width: 100%; }
        .form-input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: rgba(232, 227, 213, 0.05); border: 1px solid #a9ddd3; color: #e8e3d5; }
        .upload-zone { border: 2px dashed #a9ddd3; background: rgba(232, 227, 213, 0.03); cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-light">ArtSoul</a>
            <a href="index.html" class="opacity-70 hover:opacity-100">Back</a>
        </div>
    </header>
    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <h1 class="text-4xl font-light mb-8">Upload Masterpiece</h1>
        <div class="space-y-8">
            <div class="upload-zone rounded-xl p-12 text-center" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display: none;">
                <p class="text-xl opacity-70 mb-2">Click to upload your artwork</p>
                <p class="text-sm opacity-40">Supports JPG, PNG, MP4, GIF, MP3</p>
            </div>
            <div><label class="block mb-2">Title</label><input type="text" id="artTitle" class="form-input" placeholder="Name of your piece"></div>
            <div><label class="block mb-2">Price (ETH)</label><input type="number" id="artPrice" step="0.01" class="form-input" placeholder="0.5"></div>
            <button onclick="alert('Minting coming soon!')" class="btn-main">List on Marketplace</button>
        </div>
    </main>
</body>
</html>
