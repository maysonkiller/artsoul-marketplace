<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Artwork - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="unified-styles.css?v=2">
    <link rel="stylesheet" href="button-effects.css?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('artsoul_theme') || 'classic';
            document.documentElement.className = theme;
            // Wait for body to be available
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.className = theme;
                });
            } else {
                document.body.className = theme;
            }
        })();
    </script>
    <script src="theme-sync.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script src="avatar-dropdown.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <script type="module" src="ipfs-client.js"></script>
    <script type="module" src="contracts-integration.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #a9ddd3;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        /* Button styles moved to unified-styles.css */

        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        /* Button hover effects moved to button-effects.css */

        /* Animation keyframes moved to button-effects.css */

        /* Logo styles */
        .site-logo {
            height: 100px;
            width: auto;
            display: block;
            transition: all 0.3s;
            border-radius: 12px;
        }

        .classic .site-logo {
            filter: drop-shadow(0 0 8px rgba(169, 221, 211, 0.4));
            animation: logoLevitate 4s ease-in-out infinite;
        }

        .future .site-logo {
            border: 3px solid transparent;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6), 0 0 40px rgba(191, 0, 255, 0.4);
            animation: logoBorderGlow 3s ease-in-out infinite, logoLevitate 4s ease-in-out infinite;
        }

        @keyframes logoLevitate {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes logoBorderGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 245, 255, 0.8), 0 0 40px rgba(191, 0, 255, 0.6), inset 0 0 20px rgba(0, 245, 255, 0.2);
                border-color: rgba(0, 245, 255, 0.6);
            }
            50% {
                box-shadow: 0 0 30px rgba(191, 0, 255, 0.8), 0 0 60px rgba(0, 245, 255, 0.6), inset 0 0 30px rgba(191, 0, 255, 0.2);
                border-color: rgba(191, 0, 255, 0.6);
            }
        }

        .logo-link:hover .site-logo {
            animation-play-state: paused;
        }

        .classic .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 15px rgba(169, 221, 211, 0.8));
        }

        .future .logo-link:hover .site-logo {
            box-shadow: 0 0 40px rgba(0, 245, 255, 1), 0 0 80px rgba(191, 0, 255, 0.8), inset 0 0 40px rgba(191, 0, 255, 0.4);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        header .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        /* Button effects for Future mode moved to button-effects.css */

        /* Glitch animation moved to button-effects.css */

        /* Gradient flow animation moved to unified-styles.css */

        /* Theme toggle styles moved to unified-styles.css */

        .network-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .classic .network-badge {
            background: rgba(232, 227, 213, 0.1);
            border: 1px solid var(--accent-classic);
        }

        .future .network-badge {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent-future);
            position: relative;
            overflow: hidden;
        }

        .future .network-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent);
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            .network-badge {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        .upload-zone {
            transition: all 0.3s;
            cursor: pointer;
        }

        .classic .upload-zone {
            border: 2px dashed var(--accent-classic);
            background: rgba(232, 227, 213, 0.03);
        }

        .classic .upload-zone:hover {
            border-color: var(--text-classic);
            background: rgba(232, 227, 213, 0.08);
        }

        .future .upload-zone {
            border: 2px dashed var(--accent-future);
            background: rgba(0, 245, 255, 0.05);
        }

        .future .upload-zone:hover {
            border-color: var(--neon-purple);
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.3);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: inherit;
            transition: all 0.3s;
        }

        .classic .form-input {
            background: rgba(232, 227, 213, 0.05);
            border: 1px solid var(--accent-classic);
        }

        .classic .form-input:focus {
            outline: none;
            border-color: var(--text-classic);
            background: rgba(232, 227, 213, 0.1);
        }

        .future .form-input {
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid var(--accent-future);
        }

        .future .form-input:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.3);
        }

        .icon-svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .classic .tooltip-text {
            background: var(--text-classic);
            color: var(--bg-classic);
        }

        .future .tooltip-text {
            background: var(--accent-future);
            color: #000000;
        }

        .tooltip-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        html {
            scroll-behavior: smooth;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .network-badge {
                font-size: 0.75rem;
                padding: 0.375rem 0.75rem;
            }
            .balance-amount {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="logo-link">
                        <img src="ARTSOULlogo.png" alt="ArtSoul" class="site-logo">
                    </a>
                    <div class="theme-toggle">
                        <button onclick="setTheme('classic')" id="classicBtn" class="theme-btn active-classic">
                            Classic
                        </button>
                        <button onclick="setTheme('future')" id="futureBtn" class="theme-btn">
                            Future
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="tooltip-wrap">
                        <a href="docs.html" class="p-2 inline-block">
                            <svg viewBox="0 0 24 24" fill="none" class="w-7 h-7" style="color: currentColor;">
                                <path d="M4 4L20 4L20 20L4 20L4 4M8 8L16 8M8 12L16 12M8 16L12 16" stroke="currentColor" class="icon-svg"/>
                            </svg>
                        </a>
                        <div class="tooltip-text">Documentation</div>
                    </div>
                    <div id="networkBadge"></div>
                    <div class="flex items-center gap-3" id="navButtons">
                        <!-- AppKit will populate this -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <a href="index.html" class="opacity-50 hover:opacity-100 mb-8 inline-block transition-opacity">← Back to Gallery</a>
        <h1 class="text-4xl font-light mb-8">Upload Masterpiece</h1>

        <div class="space-y-8">
            <div class="upload-zone rounded-xl p-12 text-center" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.gif" style="display: none;" onchange="handleFileSelect(event)">
                <svg viewBox="0 0 24 24" fill="none" class="w-16 h-16 mx-auto mb-4 opacity-50">
                    <path d="M12 3L12 21M12 3L6 9M12 3L18 9M3 15L3 21L21 21L21 15" stroke="currentColor" class="icon-svg"/>
                </svg>
                <p class="text-xl opacity-70 mb-2">Click or drag and drop your artwork</p>
                <p class="text-sm opacity-40">Supports JPG, PNG, MP4, GIF, MP3 (Max 100MB)</p>
                <p id="fileName" class="text-sm mt-4 opacity-70"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Title</label>
                    <input type="text" id="artTitle" class="form-input" placeholder="Name of your piece" required>
                </div>
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Creator Value (ETH)</label>
                    <input type="number" id="artPrice" step="0.01" class="form-input" placeholder="0.5" required>
                </div>
            </div>

            <div>
                <label class="block opacity-70 mb-2 font-medium">Description</label>
                <textarea id="artDescription" class="form-input h-32" placeholder="Describe your artwork..."></textarea>
            </div>

            <button onclick="handleUpload()" class="btn-main w-full">List on Marketplace</button>
        </div>
    </main>

    <script>
        let selectedFile = null;
        let uploading = false;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            }
        }

        async function handleUpload() {
            if (uploading) return;

            const title = document.getElementById('artTitle').value;
            const price = document.getElementById('artPrice').value;
            const description = document.getElementById('artDescription').value;

            // Validation
            if (!selectedFile) {
                alert('Please select a file to upload');
                return;
            }

            if (!title || !price) {
                alert('Please fill in title and price');
                return;
            }

            if (parseFloat(price) <= 0) {
                alert('Price must be greater than 0');
                return;
            }

            // Check wallet connection
            const walletAddress = window.getCurrentWalletAddress?.();
            if (!walletAddress) {
                alert('Please connect your wallet first');
                return;
            }

            // Check authentication
            const isAuth = await window.SupabaseAuth?.isAuthenticated();
            if (!isAuth) {
                const authenticated = await window.ensureAuthenticated?.();
                if (!authenticated) return;
            }

            uploading = true;
            const uploadBtn = document.querySelector('.btn-main');
            const originalText = uploadBtn.textContent;
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            try {
                // Step 1: Generate file hash for duplicate detection
                uploadBtn.textContent = 'Generating file hash...';
                const fileHash = await window.IPFSClient.generateFileHash(selectedFile);
                console.log('📝 File hash:', fileHash);

                // Step 2: Upload file to IPFS (currently Supabase)
                uploadBtn.textContent = 'Uploading file...';
                const fileUpload = await window.IPFSClient.uploadFile(selectedFile);
                console.log('📤 File uploaded:', fileUpload.ipfsHash);

                // Step 3: Create metadata
                uploadBtn.textContent = 'Creating metadata...';
                const metadata = window.IPFSClient.createMetadata({
                    title: title,
                    description: description,
                    imageUrl: fileUpload.url,
                    creator: walletAddress,
                    creatorValue: price
                });

                // Step 4: Upload metadata to IPFS
                const metadataUpload = await window.IPFSClient.uploadMetadata(metadata);
                console.log('📤 Metadata uploaded:', metadataUpload.ipfsHash);

                // Step 5: Initialize contracts
                uploadBtn.textContent = 'Connecting to blockchain...';
                if (!window.ArtSoulContracts.marketplaceContract) {
                    const provider = await window.web3Modal?.getWalletProvider();
                    if (!provider) throw new Error('No wallet provider');
                    await window.ArtSoulContracts.init(provider);
                }

                // Step 6: Upload to smart contract
                uploadBtn.textContent = 'Creating on blockchain...';
                const result = await window.ArtSoulContracts.uploadArtwork(
                    fileUpload.ipfsHash,
                    metadataUpload.url,
                    fileHash,
                    price
                );

                console.log('✅ Artwork created! ID:', result.artworkId);

                // Step 7: Save to Supabase for indexing
                uploadBtn.textContent = 'Saving to database...';
                await window.ArtSoulDB.createArtwork({
                    id: result.artworkId,
                    creator_id: walletAddress,
                    title: title,
                    description: description,
                    file_url: fileUpload.url,
                    file_type: selectedFile.type,
                    ipfs_hash: fileUpload.ipfsHash,
                    metadata_uri: metadataUpload.url,
                    creator_value: parseFloat(price),
                    status: 'draft',
                    tx_hash: result.txHash
                });

                // Success!
                alert(`✅ Artwork uploaded successfully!\n\nArtwork ID: ${result.artworkId}\nTransaction: ${result.txHash}\n\nYou can now create an auction in your profile.`);

                // Redirect to profile
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Upload failed:', error);

                let errorMessage = 'Upload failed: ';
                if (error.message?.includes('user rejected')) {
                    errorMessage += 'Transaction was rejected';
                } else if (error.message?.includes('Duplicate artwork')) {
                    errorMessage += 'This file has already been uploaded';
                } else if (error.message?.includes('Unsupported network')) {
                    errorMessage += 'Please switch to Base Sepolia network';
                } else {
                    errorMessage += error.message || 'Unknown error';
                }

                alert(errorMessage);
            } finally {
                uploading = false;
                uploadBtn.disabled = false;
                uploadBtn.textContent = originalText;
            }
        }
    </script>

    <!-- AppKit and wallet connection is now handled by appkit-init.js -->
</body>
</html>
