<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Artwork - ArtSoul</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="theme-sync.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="appkit-init.js"></script>
    <style>
        :root {
            --bg-classic: #010101;
            --text-classic: #a9ddd3;
            --accent-classic: #a9ddd3;
            --accent-future: #00f5ff;
            --neon-purple: #bf00ff;
        }

        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        .classic .btn-main {
            background: var(--text-classic);
            color: var(--bg-classic);
            border: 1px solid var(--text-classic);
            padding: 0.5rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .classic .btn-main:hover {
            background: transparent;
            color: var(--text-classic);
        }

        body.future {
            background: #000000;
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .future .btn-main {
            background: linear-gradient(135deg, var(--accent-future) 0%, var(--neon-purple) 100%);
            color: #000000;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            border: none;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .future .btn-main:hover {
            animation: neonPulse 0.3s infinite;
            transform: scale(1.05);
            filter: brightness(1.3);
        }

        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--neon-purple);
            }
            50% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
            }
        }

        /* Logo styles */
        .site-logo {
            height: 100px;
            width: auto;
            display: block;
            transition: all 0.3s;
        }

        .classic .site-logo {
            filter: drop-shadow(0 0 8px rgba(169, 221, 211, 0.4));
        }

        .future .site-logo {
            filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.6)) drop-shadow(0 0 20px rgba(191, 0, 255, 0.4));
        }

        .logo-link:hover .site-logo {
            transform: scale(1.05);
        }

        .classic .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 12px rgba(169, 221, 211, 0.6));
        }

        .future .logo-link:hover .site-logo {
            filter: drop-shadow(0 0 18px rgba(0, 245, 255, 0.8)) drop-shadow(0 0 30px rgba(191, 0, 255, 0.6));
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        header .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        /* Button effects for Future mode */
        .future .btn-main:active {
            animation: glitchButton 0.3s;
        }

        @keyframes glitchButton {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }

        /* Gradient text animation for headings in Future mode */
        .future h1, .future h2 {
            background: linear-gradient(90deg, var(--accent-future), var(--neon-purple), var(--accent-future));
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .theme-toggle {
            display: flex;
            gap: 0.5rem;
            padding: 0.25rem;
            border-radius: 0.5rem;
        }

        .classic .theme-toggle {
            background: rgba(232, 227, 213, 0.1);
        }

        .future .theme-toggle {
            background: rgba(0, 245, 255, 0.1);
        }

        .theme-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: all 0.3s;
            color: currentColor;
        }

        .classic .theme-btn.active-classic {
            background: var(--accent-classic);
            color: var(--bg-classic);
        }

        .future .theme-btn.active-future {
            background: linear-gradient(135deg, var(--accent-future), var(--neon-purple));
            color: #000000;
        }

        .network-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .classic .network-badge {
            background: rgba(232, 227, 213, 0.1);
            border: 1px solid var(--accent-classic);
        }

        .future .network-badge {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent-future);
            position: relative;
            overflow: hidden;
        }

        .future .network-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.3), transparent);
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            .network-badge {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        .upload-zone {
            transition: all 0.3s;
            cursor: pointer;
        }

        .classic .upload-zone {
            border: 2px dashed var(--accent-classic);
            background: rgba(232, 227, 213, 0.03);
        }

        .classic .upload-zone:hover {
            border-color: var(--text-classic);
            background: rgba(232, 227, 213, 0.08);
        }

        .future .upload-zone {
            border: 2px dashed var(--accent-future);
            background: rgba(0, 245, 255, 0.05);
        }

        .future .upload-zone:hover {
            border-color: var(--neon-purple);
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.3);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: inherit;
            transition: all 0.3s;
        }

        .classic .form-input {
            background: rgba(232, 227, 213, 0.05);
            border: 1px solid var(--accent-classic);
        }

        .classic .form-input:focus {
            outline: none;
            border-color: var(--text-classic);
            background: rgba(232, 227, 213, 0.1);
        }

        .future .form-input {
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid var(--accent-future);
        }

        .future .form-input:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.3);
        }

        .icon-svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .classic .tooltip-text {
            background: var(--text-classic);
            color: var(--bg-classic);
        }

        .future .tooltip-text {
            background: var(--accent-future);
            color: #000000;
        }

        .tooltip-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        html {
            scroll-behavior: smooth;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .network-badge {
                font-size: 0.75rem;
                padding: 0.375rem 0.75rem;
            }
            .balance-amount {
                display: none;
            }
        }
    </style>
</head>
<body class="classic">
    <header>
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="logo-link">
                        <img src="ARTSOULlogo.png" alt="ArtSoul" class="site-logo">
                    </a>
                    <div class="theme-toggle">
                        <button data-theme="classic" class="theme-btn active">
                            Classic
                        </button>
                        <button data-theme="future" class="theme-btn">
                            Future
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="tooltip-wrap">
                        <a href="docs.html" class="p-2 inline-block">
                            <svg viewBox="0 0 24 24" fill="none" class="w-7 h-7" style="color: currentColor;">
                                <path d="M4 4L20 4L20 20L4 20L4 4M8 8L16 8M8 12L16 12M8 16L12 16" stroke="currentColor" class="icon-svg"/>
                            </svg>
                        </a>
                        <div class="tooltip-text">Documentation</div>
                    </div>
                    <div id="networkBadge"></div>
                    <div class="flex items-center gap-3" id="navButtons">
                        <!-- AppKit will populate this -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <a href="index.html" class="opacity-50 hover:opacity-100 mb-8 inline-block transition-opacity">← Back to Gallery</a>
        <h1 class="text-4xl font-light mb-8">Upload Masterpiece</h1>

        <div class="space-y-8">
            <div class="upload-zone rounded-xl p-12 text-center" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.gif" style="display: none;" onchange="handleFileSelect(event)">
                <svg viewBox="0 0 24 24" fill="none" class="w-16 h-16 mx-auto mb-4 opacity-50">
                    <path d="M12 3L12 21M12 3L6 9M12 3L18 9M3 15L3 21L21 21L21 15" stroke="currentColor" class="icon-svg"/>
                </svg>
                <p class="text-xl opacity-70 mb-2">Click or drag and drop your artwork</p>
                <p class="text-sm opacity-40">Supports JPG, PNG, MP4, GIF, MP3 (Max 100MB)</p>
                <p id="fileName" class="text-sm mt-4 opacity-70"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Title</label>
                    <input type="text" id="artTitle" class="form-input" placeholder="Name of your piece" required>
                </div>
                <div>
                    <label class="block opacity-70 mb-2 font-medium">Creator Value (ETH)</label>
                    <input type="number" id="artPrice" step="0.01" class="form-input" placeholder="0.5" required>
                </div>
            </div>

            <div>
                <label class="block opacity-70 mb-2 font-medium">Description</label>
                <textarea id="artDescription" class="form-input h-32" placeholder="Describe your artwork..."></textarea>
            </div>

            <button onclick="handleUpload()" class="btn-main w-full">List on Marketplace</button>
        </div>
    </main>

    <script>
        let selectedFile = null;

        // Theme is now handled by theme-sync.js

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            }
        }

        function handleUpload() {
            const title = document.getElementById('artTitle').value;
            const price = document.getElementById('artPrice').value;
            const description = document.getElementById('artDescription').value;

            if (!selectedFile) {
                alert('Please select a file to upload');
                return;
            }

            if (!title || !price) {
                alert('Please fill in title and price');
                return;
            }

            alert(`Minting feature coming soon!\n\nYour artwork:\nTitle: ${title}\nPrice: ${price} ETH\nFile: ${selectedFile.name}\n\nThis will be integrated with smart contracts in the next update.`);
        }
    </script>

    <!-- AppKit and wallet connection is now handled by appkit-init.js -->
</body>
</html>
